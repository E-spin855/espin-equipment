<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Today’s Manual Plan</title>
<style>
:root{
  --brand-blue:#1F7BC8;
  --blue:#0066B2;
  --blue-dark:#155e9b;
  --blue-light:#2d8fe0;
  --secondary:#0a74c9;
  --gray:#666;
  --text:#1f2933;
  --muted:#6b7280;
  --line:#e0e7ef;
  --soft:#f5f8fb;
  --green:#20a66b;
  --yellow:#f4a100;
  --red:#ff3b30;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  background:#fff;
}
body{
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
}
.header{
  background:var(--blue);
  color:#fff;
  padding:calc(18px + env(safe-area-inset-top)) 16px 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:0;
  z-index:20;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.header h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  text-align:center;
  line-height:1.15;
}
.header .back{
  position:absolute;
  left:16px;
  top:calc(50% + env(safe-area-inset-top)/2);
  transform:translateY(-50%);
  color:#fff;
  text-decoration:none;
  font-size:32px;
  font-weight:700;
  line-height:1;
}
.container{
  max-width:420px;
  margin:0 auto;
  padding:18px 20px 22px;
}
.login-page{
  min-height:100vh;
  background:#1F7BC8;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 20px 86px;
}
.login-box{
  width:100%;
  max-width:400px;
  text-align:center;
}
.logo-circle{
  width:92px;
  height:92px;
  border-radius:26px;
  margin:0 auto 20px;
  background:#fff;
  color:var(--brand-blue);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:900;
  box-shadow:0 8px 22px rgba(0,0,0,.18);
}
.login-box h1{
  font-size:26px;
  margin:0 0 10px;
}
.login-box .subtitle{
  font-size:15px;
  opacity:.9;
  margin:0 0 25px;
  line-height:1.4;
}
input,select,textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--line);
  font-size:16px;
  color:#333;
  background:#fff;
  font-family:inherit;
  outline:none;
}
.login-page input{
  border:none;
  font-size:18px;
  margin-bottom:12px;
}
textarea{
  min-height:96px;
  resize:vertical;
}
label{
  display:block;
  font-size:13px;
  font-weight:800;
  color:var(--blue);
  margin:0 0 7px;
}
.field{margin-bottom:14px}
.section-title{
  font-size:22px;
  font-weight:700;
  margin:18px 0;
}
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:15px;
  margin-bottom:14px;
  box-shadow:0 3px 10px rgba(31,123,200,.08);
}
.card.soft{
  background:var(--soft);
  box-shadow:none;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
  margin-bottom:8px;
}
.sub{
  font-size:17px;
  font-weight:800;
  color:var(--blue);
}
.value{
  font-size:15px;
  font-weight:650;
  color:var(--blue);
  text-align:right;
}
.title{
  font-size:18px;
  font-weight:800;
  color:var(--blue);
  line-height:1.18;
}
.meta{
  color:var(--muted);
  font-size:14px;
  line-height:1.42;
  margin-top:5px;
}
.kicker{
  font-size:12px;
  font-weight:800;
  color:var(--blue);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.btn{
  width:100%;
  padding:14px;
  margin:9px 0;
  font-size:16px;
  font-weight:700;
  color:#fff;
  background:var(--blue);
  border:none;
  border-radius:14px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  text-decoration:none;
}
.login-page .btn{
  padding:18px;
  border-radius:16px;
  font-size:20px;
  font-weight:600;
  background:linear-gradient(var(--blue-light),var(--blue));
  box-shadow:0 5px 0 var(--blue-dark);
}
.btn.secondary{background:var(--secondary)}
.btn.white{
  background:#fff;
  color:var(--blue);
  border:1px solid var(--line);
}
.btn.green{background:var(--green)}
.btn.yellow{background:var(--yellow)}
.btn.red{background:var(--red)}
.btn.small{
  width:auto;
  padding:10px 12px;
  margin:0;
  font-size:14px;
}
.btn-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.btn-row .btn{margin:0;flex:1}
.badges{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:10px;
}
.badge{
  display:inline-flex;
  align-items:center;
  padding:5px 10px;
  border-radius:999px;
  background:#eaf4ff;
  color:var(--blue);
  font-size:12px;
  font-weight:800;
}
.badge.green{
  color:#0f7a49;
  background:#e7f8ef;
}
.badge.yellow{
  color:#895d00;
  background:#fff5d6;
}
.stop{
  display:grid;
  grid-template-columns:34px 1fr;
  gap:10px;
  padding:14px 0;
  border-bottom:1px solid var(--line);
}
.stop:last-child{border-bottom:none}
.num{
  width:30px;
  height:30px;
  border-radius:999px;
  background:var(--blue);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}
.stop.active .num{background:var(--green)}
.stop-actions{
  grid-column:1 / -1;
  display:flex;
  gap:9px;
  margin-top:8px;
}
.stop-actions .btn{
  margin:0;
  flex:1;
}
.alert{
  background:#f2f8ff;
  border:1px solid #d5eafa;
  color:var(--blue);
  padding:14px;
  border-radius:14px;
  margin-bottom:14px;
  font-weight:800;
}
.safe{
  margin-top:12px;
  padding:12px;
  border:1px solid #d5eafa;
  border-radius:14px;
  background:#f2f8ff;
  color:#315f87;
  font-size:12px;
  line-height:1.45;
}
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  display:flex;
  border-top:1px solid #ddd;
  padding:10px 0 calc(10px + env(safe-area-inset-bottom));
  z-index:2000;
}
.nav a{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:var(--gray);
  font-size:12px;
}
.nav a.active{
  color:var(--blue);
  font-weight:800;
}
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:14px 18px;
  text-align:center;
  font-size:11px;
  line-height:1.4;
  opacity:.75;
  background:#1F7BC8;
  color:#fff;
}
@media(min-width:700px){
  body:not(.login-body){
    background:#f4f8fc;
  }
}
</style>
</head>
<body>
<div class="header">
  
  <h1>Today’s Manual Plan</h1>
</div>
<div class="container">

<div class="card">
  <div class="row">
    <div>
      <div class="sub">Rep</div>
      <div class="meta" id="repName">—</div>
    </div>
    <div>
      <div class="sub">Stops</div>
      <div class="value" id="stopCount">0</div>
    </div>
  </div>
  <div class="badges">
    <span class="badge green" id="syncStatus">Waiting for Rep sync</span>
  </div>
</div>

<div class="section-title">Next Stop</div>
<div class="card" id="nextStopCard"></div>

<div class="section-title">Today’s Plan</div>
<div class="card" id="planList"></div>

<div class="safe">Rep controls stop selection, order, timing, reminders, and navigation. ESPIN LINK does not optimize routes or recommend stops.</div>



</div>

<div class="nav">
  <a href="today.html" class="active">🏠<br>Today</a>
  <a href="reminders.html" class="">⏰<br>Alerts</a>
  <a href="notes.html" class="">📝<br>Notes</a>
  <a href="settings.html" class="">⚙️<br>Settings</a>
</div>

<script>
const MOBILE_PLAN_KEY = "espin_rep_manual_day_plan_v1";

function loadMobilePlan(){
  try{
    const saved = JSON.parse(
      localStorage.getItem(MOBILE_PLAN_KEY) || "[]"
    );

    if(!Array.isArray(saved)) return [];

    return saved.map((stop, index) => ({
      id: String(stop.id || stop.recordId || `visit-${index + 1}`),
      recordId: String(stop.recordId || ""),
      name: String(stop.name || stop.facility || "Unnamed Account"),
      facility: String(stop.facility || stop.name || "Unnamed Account"),
      address: String(stop.address || ""),
      time: String(stop.time || ""),
      purpose: String(stop.purpose || "Equipment review"),
      note: String(stop.note || ""),
      status: String(stop.status || "Selected by Rep"),
      source: String(stop.source || "Rep Proximity View"),
      repName: String(
        stop.repName ||
        stop.rep_name ||
        stop.assigned_rep_name ||
        stop.rep ||
        ""
      ),
      projectId: String(stop.projectId || stop.project_id || ""),
      make: String(stop.make || stop.brand || ""),
      model: String(stop.model || ""),
      modality: String(stop.modality || ""),
      serialNumber: String(
        stop.serialNumber ||
        stop.serial_number ||
        stop.serial ||
        ""
      )
    }));
  }catch(error){
    console.error("Unable to load the mobile visit plan.", error);
    return [];
  }
}

let PLAN = loadMobilePlan();

function esc(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function maps(addr){
  if(!addr){
    alert("No address is available for this stop.");
    return;
  }

  window.location.href =
    "https://www.google.com/maps/search/?api=1&query=" +
    encodeURIComponent(addr);
}

function stopHtml(s, i, active=false){
  const timeText = s.time || "Time not set";
  const purposeText = s.purpose || "Equipment review";
  const addressText = s.address || "Address not available";
  const equipmentText = [
    s.modality,
    [s.make, s.model].filter(Boolean).join(" "),
    s.serialNumber ? `Serial: ${s.serialNumber}` : ""
  ].filter(Boolean).join(" · ");

  return `<div class="stop ${active ? "active" : ""}">
    <div class="num">${i + 1}</div>
    <div>
      <div class="title">${esc(s.name)}</div>
      <div class="meta">
        ${esc(timeText)} · ${esc(purposeText)}<br>
        ${esc(addressText)}
        ${equipmentText ? `<br>${esc(equipmentText)}` : ""}
      </div>
      <div class="stop-actions">
        <a
          class="btn small secondary"
          href="stop.html?id=${encodeURIComponent(s.id)}"
        >
          Open Stop
        </a>
        <button
          class="btn small"
          type="button"
          onclick='maps(${JSON.stringify(s.address)})'
        >
          Maps
        </button>
      </div>
    </div>
  </div>`;
}

function renderNextStop(){
  const card = document.getElementById("nextStopCard");

  if(!PLAN.length){
    card.innerHTML = `
      <div class="title">No visits added yet</div>
      <div class="meta">
        Return to the Rep page and click Add to Visit List.
      </div>
    `;
    return;
  }

  const s = PLAN[0];
  const timeText = s.time || "Time not set";
  const purposeText = s.purpose || "Equipment review";
  const addressText = s.address || "Address not available";
  const equipmentText = [
    s.modality,
    [s.make, s.model].filter(Boolean).join(" "),
    s.serialNumber ? `Serial: ${s.serialNumber}` : ""
  ].filter(Boolean).join(" · ");

  card.innerHTML = `
    <div class="title">${esc(s.name)}</div>
    <div class="meta">
      ${esc(timeText)} · ${esc(purposeText)}<br>
      ${esc(addressText)}
      ${equipmentText ? `<br>${esc(equipmentText)}` : ""}
    </div>
    <div class="btn-row">
      <button
        class="btn"
        type="button"
        onclick='maps(${JSON.stringify(s.address)})'
      >
        Maps
      </button>
      <a
        class="btn secondary"
        href="stop.html?id=${encodeURIComponent(s.id)}"
      >
        Open
      </a>
    </div>
  `;
}

function renderMobilePlan(){
  PLAN = loadMobilePlan();

  document.getElementById("stopCount").textContent =
    String(PLAN.length);

  const repNameEl = document.getElementById("repName");
  const syncStatusEl = document.getElementById("syncStatus");
  const syncedRepName = PLAN.find(stop => stop.repName)?.repName || "";

  if(repNameEl){
    repNameEl.textContent = syncedRepName || "—";
  }

  if(syncStatusEl){
    syncStatusEl.textContent =
      PLAN.length
        ? "Synced from Rep page"
        : "Waiting for Rep sync";
  }

  document.getElementById("planList").innerHTML =
    PLAN.length
      ? PLAN.map((s, i) => stopHtml(s, i, i === 0)).join("")
      : `
        <div class="meta" style="padding:4px 0;">
          No visits have been synced from the Rep page yet.
        </div>
      `;

  renderNextStop();
}

document.addEventListener("DOMContentLoaded", renderMobilePlan);

window.addEventListener("storage", event => {
  if(
    event.key === MOBILE_PLAN_KEY ||
    event.key === "espin_rep_manual_day_plan_ping_v1"
  ){
    renderMobilePlan();
  }
});

window.addEventListener("focus", renderMobilePlan);
</script>
</body>
</html>
