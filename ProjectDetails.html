<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Details | Espin Medical</title>
   <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <script>
const params = new URLSearchParams(window.location.search);

const projectId =
  params.get("projectId") ||
  params.get("id") ||
  localStorage.getItem("activeProjectId");

const auth = localStorage.getItem("espinAuth");
let userEmail = localStorage.getItem("espinUserEmail");

if (!projectId || auth !== "true" || !userEmail) {
  location.replace("/");
}

userEmail = String(userEmail).toLowerCase().trim();

/* PER-USER KEYS */
const BADGE_STORAGE_KEY = `badges_${projectId}`;
const BADGE_KV_KEY = `project:badges_details:${projectId}:${userEmail}`;
const UNREAD_KEY = `project:unread:${projectId}:${userEmail}`;
const UNREAD_IMAGES_KEY = `project:unread_images:${projectId}:${userEmail}`;

/* ---------- HELPERS ---------- */

function normalizeKeys(list) {
  return (list || [])
    .map(v => String(v || "").trim())
    .filter(Boolean);
}

function readBadges() {
  try {
    const raw =
      sessionStorage.getItem(BADGE_STORAGE_KEY) ||
      localStorage.getItem(BADGE_STORAGE_KEY);

    return normalizeKeys(JSON.parse(raw || "[]"));
  } catch {
    return [];
  }
}

function writeBadges(list) {
  const json = JSON.stringify(normalizeKeys(list));
  try { sessionStorage.setItem(BADGE_STORAGE_KEY, json); } catch (e) {}
  try { localStorage.setItem(BADGE_STORAGE_KEY, json); } catch (e) {}
}

async function clearAllProjectBadges() {
  try {
    sessionStorage.removeItem(BADGE_STORAGE_KEY);
    localStorage.removeItem(BADGE_STORAGE_KEY);

    await Promise.all([
      fetch("/api/kv-set", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: BADGE_KV_KEY, value: "[]" })
      }),
      fetch("/api/kv-set", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: UNREAD_KEY, value: 0 })
      }),
      fetch("/api/kv-set", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: UNREAD_IMAGES_KEY, value: 0 })
      })
    ]);
  } catch (e) {
    console.warn("Badge clear failed", e);
  }
}

async function readBadgesFromKV() {
  try {
    const r = await fetch("/api/kv-get", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key: BADGE_KV_KEY })
    });
    const j = await r.json();
    if (!j || !j.value) return [];
    const parsed = Array.isArray(j.value) ? j.value : JSON.parse(j.value);
    return normalizeKeys(parsed);
  } catch (e) {
    return [];
  }
}

async function writeBadgesToKV(list) {
  try {
    await fetch("/api/kv-set", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        key: BADGE_KV_KEY,
        value: JSON.stringify(normalizeKeys(list || []))
      })
    });
  } catch (e) {}
}

/* ===============================
   EXIT CLEAR (NEW pill only)
   ONLY when leaving via back button to Management
=============================== */
(function installProjectDetailsExitClear() {
  let cleared = false;

  function clearOnce() {
    if (cleared) return;
    cleared = true;

    try {
      sessionStorage.removeItem(BADGE_STORAGE_KEY);
      localStorage.removeItem(BADGE_STORAGE_KEY);

      fetch("/api/kv-set", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: BADGE_KV_KEY, value: "[]" }),
        keepalive: true
      });
    } catch (e) {}
  }

  document.addEventListener("DOMContentLoaded", function () {
    const backBtn = document.getElementById("backToManagement");
    if (backBtn) backBtn.addEventListener("click", clearOnce);
  });
})();
</script>

    <style>
        :root{
  --blue:#1F7BC8;
  --gray:#777;
  --bg:#f6f6f6;
  --danger:#d93025;
}
        body{
  margin:0;
  font-family:-apple-system,sans-serif;
  background:#ffffff;
  padding-bottom:140px;
  padding-top:95px;   /* offset for fixed header */
  -webkit-tap-highlight-color:transparent;
}
.topbar h1{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  margin:0;
  font-size:20px;
  font-weight:800;
}
      .topbar{
  background:var(--blue);
  color:#fff;

  padding:calc(18px + env(safe-area-inset-top)) 18px 18px 18px;

  display:flex;
  gap:14px;
  align-items:center;

  position:fixed;
  top:0;
  left:0;
  right:0;

  z-index:1000;
}
        .container{
  max-width:450px;
  margin:0 auto;
  padding:36px 18px 18px 18px;
}
        .group{background:#fff;border-radius:14px;margin-bottom:22px;border:1px solid #eee;overflow:hidden}
        .group-title{background:var(--blue);color:#fff;padding:14px 16px;font-weight:800}
        .field,.toggle{padding:16px;border-bottom:1px solid #f1f1f1;color:#000}
        .label{font-weight:700;margin-bottom:6px;display:flex;align-items:center;flex-wrap:wrap}
        input,textarea{width:100%;padding:14px;border-radius:10px;border:1px solid #ccc;font-size:16px;box-sizing:border-box;background:#fff;color:#000}
        .toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
        .toggle input{width:28px;height:28px;accent-color:var(--green);cursor:pointer}
        .btn-submit{width:100%;padding:20px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-weight:800;font-size:18px;cursor:pointer}
        .success{background:var(--green)!important}
        .new-pill { margin-left:8px; padding:2px 8px; font-size:11px; font-weight:800; border-radius:999px; background:var(--blue); color:#fff; display:inline-flex; align-items:center; }
        .toggle.locked { opacity: 0.45; pointer-events: none; }
        .toggle.disabled-checked { opacity:0.5; pointer-events:none; filter:grayscale(1); }
        .field-updated,.toggle.field-updated{ border-left:6px solid var(--blue); background:rgba(0,102,178,.06); }
        .field-updated .label{color:var(--blue);font-weight:800}
        .archived-banner{ background:#f1f1f1;color:#555;padding:12px;border-radius:12px; font-weight:800;text-align:center;margin-bottom:16px;display:none }
    </style>
</head>

<body>
    <div class="topbar">
      <div id="backToManagement" onclick="location.href='management.html'" style="cursor:pointer;font-size:30px;font-weight:700;line-height:1">←</div>
       <h1>Project Update</h1>
    </div>

    <div class="container">
        <div id="archiveBanner" class="archived-banner">🔒 Archived · Read-only</div>
        <div id="form-container">Loading…</div>
        <button class="btn-submit" id="submitBtn" onclick="saveData()">Save & Submit Update</button>
    </div>

    <script>
        var formData = {};
        var dirtyFields = new Set();

        function showConfirm(message, onOk, onCancel) {
            const overlay = document.getElementById("confirmOverlay");
            document.getElementById("confirmText").textContent = message;
            overlay.style.display = "flex";
            document.getElementById("confirmOk").onclick = () => { overlay.style.display = "none"; if (onOk) onOk(); };
            document.getElementById("confirmCancel").onclick = () => { overlay.style.display = "none"; if (onCancel) onCancel(); };
        }

        function applyChangedHighlightsOnce(fields){
            var missing = [];
            fields.forEach(key => {
                var el = document.querySelector('[data-key="' + key + '"]');
                if (!el) { missing.push(key); return; }
                el.classList.add("field-updated");
                var label = el.querySelector(".label");
                if (label && !label.querySelector(".new-pill")) {
                    var p = document.createElement("span");
                    p.className = "new-pill"; p.textContent = "NEW";
                    label.appendChild(p);
                }
            });
            return missing;
        }

        function applyChangedHighlightsWithRetry(fields, attemptsLeft = 12){
            fields = normalizeKeys(fields);
            if (!fields.length) return;
            setTimeout(() => {
                var missing = applyChangedHighlightsOnce(fields);
                if (missing.length && attemptsLeft > 0) applyChangedHighlightsWithRetry(missing, attemptsLeft - 1);
            }, 50);
        }

        function input(label, key, val, type = "datetime-local") {
            var d = document.createElement("div");
            d.className = "field"; d.dataset.key = key;
            d.innerHTML = '<div class="label">' + label + "</div>";
            var i = document.createElement("input");
            i.type = type;
            if (val) {
                if (type === "datetime-local") {
                    var v = String(val).replace(" ", "T").slice(0, 16);
                    i.value = v; formData[key] = v.replace("T", " ") + ":00";
                } else {
                    i.value = val; formData[key] = val;
                }
            }
            i.oninput = function () {
                formData[key] = (type === "datetime-local") ? i.value.replace("T", " ") + ":00" : i.value;
                dirtyFields.add(key);
            };
            d.appendChild(i);
            return d;
        }

        function toggle(label, key, val, customOnChange) {
            var d = document.createElement("div");
            d.className = "toggle"; d.dataset.key = key;
            var l = document.createElement("div");
            l.className = "label"; l.textContent = label;
            var c = document.createElement("input");
            c.type = "checkbox"; c.checked = !!val;
            if (!!val) { d.classList.add("locked"); c.disabled = true; }
            d.onclick = function(e) { if (d.classList.contains("locked")) return; if (e.target !== c) c.click(); };
            c.onchange = function() {
                if (typeof customOnChange === "function") { customOnChange(c); }
                else { formData[key] = c.checked; dirtyFields.add(key); if (c.checked) { d.classList.add("locked"); c.disabled = true; } }
            };
            d.appendChild(l); d.appendChild(c);
            return d;
        }

        function group(title) {
            var g = document.createElement("div");
            g.className = "group"; g.innerHTML = '<div class="group-title">' + title + "</div>";
            return g;
        }
    </script>

    <script>
        async function load() {
            try {
                var res = await fetch("/api/project-details?projectId=" + encodeURIComponent(projectId));
                var d = await res.json();
                window.__projectCompletedFromServer = !!d.project_completed;
                formData = Object.assign({}, d || {});
                var fc = document.getElementById("form-container");
                fc.innerHTML = "";

                var g1 = group("Project Timeline");
                g1.appendChild(input("Project Start Date", "project_start", d.project_start));
                g1.appendChild(input("Pathways Opening Date", "pathways_opening_start", d.pathways_opening_start));
                g1.appendChild(toggle("Pathways Opened", "pathways_opened", d.pathways_opened));
                g1.appendChild(input("Inspection Date", "inspection_date", d.inspection_date));
                fc.appendChild(g1);

                var g2 = group("Power Utility");
                g2.appendChild(input("Power Shut Down Date", "power_shutdown", d.power_shutdown));
                g2.appendChild(toggle("Power Completed", "power_shutdown_completed", d.power_shutdown_completed));
                fc.appendChild(g2);

                if (d.magnet_event === "ramp_down") {
                    var g3 = group("MRI Magnet (Ramp Down)");
                    g3.appendChild(input("Ramp Down Date", "magnet_ramp_down", d.magnet_ramp_down));
                    g3.appendChild(toggle("Ramp Down Completed", "magnet_ramp_completed", d.magnet_ramp_completed));
                    fc.appendChild(g3);
                } else if (d.magnet_event === "quench") {
                    var g3 = group("MRI Magnet (Quench)");
                    g3.appendChild(input("Quench Date", "magnet_quench_date", d.magnet_quench_date));
                    g3.appendChild(toggle("Quench Completed", "magnet_quench_completed", d.magnet_quench_completed));
                    fc.appendChild(g3);
                }

                var g5 = group("De-Installation & Rig-Out");
                g5.appendChild(input("De-Install Start Date", "deinstall_start", d.deinstall_start));
                g5.appendChild(toggle("De-Install Completed", "deinstall_completed", d.deinstall_completed));
                g5.appendChild(input("Rig-Out Date", "rigout_date", d.rigout_date));
                g5.appendChild(toggle("Rig-Out Completed", "rigout_completed", d.rigout_completed));
                fc.appendChild(g5);

                var g6 = group("Project Completion");
                var completionDate = input("Project Completion Date", "project_completion", d.project_completion);
                var projectedBy = input("Projected Completed By", "projected_completed_by", d.projected_completed_by, "text");
var acceptedBy = input("Project Completion Accepted By", "project_completion_accepted_by", d.project_completion_accepted_by, "text");

var projectedByInput = projectedBy.querySelector("input");
var acceptedByInput = acceptedBy.querySelector("input");

function applyLockStyle(el) {
  el.readOnly = true;
  el.style.backgroundColor = "#f2f2f2";
  el.style.color = "#666";
  el.style.cursor = "not-allowed";
}

/* LOCK RULE:
   - Projected Completed By: once filled (existing OR user fills) -> read-only
   - Accepted By: once filled (existing OR user fills) OR project is archived -> read-only
*/
function lockIfFilled(el) {
  if (el && el.value && el.value.trim() !== "") applyLockStyle(el);
}

/* initial locks on load */
lockIfFilled(projectedByInput);
lockIfFilled(acceptedByInput);
if (d.project_completed) applyLockStyle(acceptedByInput);

/* lock immediately after user fills (same session) */
projectedByInput.addEventListener("blur", function () { lockIfFilled(this); });
acceptedByInput.addEventListener("blur", function () { lockIfFilled(this); });

var completedToggle = toggle(
  "Project Completed",
  "project_completed",
  d.project_completed,
  function (cb) {
    if (!cb.checked || formData.project_completed) return;

    cb.checked = false;

    showConfirm(
      "This action will archive the project. Proceed?",
      () => {
        formData.project_completed = true;
        dirtyFields.add("project_completed");

        // archive implies acceptedBy must be locked (and everything else will lock globally)
        applyLockStyle(acceptedByInput);

        cb.checked = true;
        cb.disabled = true;
        cb.parentElement.classList.add("locked");

        setTimeout(() => {
          document.getElementById("submitBtn").click();
        }, 100);
      },
      () => {
        cb.checked = false;
      }
    );
  }
);

function reevaluateGate() {
  var tgl = completedToggle.querySelector("input");

  if (formData.project_completed || d.project_completed) {
    tgl.checked = true;
    tgl.disabled = true;
    completedToggle.classList.add("locked");
    return;
  }

  var isReady = projectedByInput.value.trim() && acceptedByInput.value.trim();
  completedToggle.classList.toggle("disabled-checked", !isReady);
  tgl.disabled = !isReady;
}

projectedByInput.addEventListener("input", reevaluateGate);
acceptedByInput.addEventListener("input", reevaluateGate);
projectedByInput.addEventListener("blur", reevaluateGate);
acceptedByInput.addEventListener("blur", reevaluateGate);
reevaluateGate();

g6.appendChild(completionDate);
g6.appendChild(projectedBy);
g6.appendChild(acceptedBy);
g6.appendChild(completedToggle);
fc.appendChild(g6);
                var gn = group("Notes");
                var nf = document.createElement("div"); nf.className = "field"; nf.dataset.key = "notes";
                nf.innerHTML = '<div class="label">Notes</div>';
                var tx = document.createElement("textarea"); tx.style.height = "100px"; tx.value = d.notes || "";
                tx.oninput = function () { formData.notes = tx.value; dirtyFields.add("notes"); };
                nf.appendChild(tx); gn.appendChild(nf); fc.appendChild(gn);

                var badges = readBadges();
                if (!badges.length) {
                    badges = await readBadgesFromKV();
                    if (badges.length) writeBadges(badges);
                }
                applyChangedHighlightsWithRetry(badges);

                if (d.project_completed) {
                    document.getElementById("archiveBanner").style.display = "block";
                    document.getElementById("submitBtn").style.display = "none";
                    document.querySelectorAll("input, textarea").forEach(el => { el.disabled = true; el.style.backgroundColor = "#f2f2f2"; });
                    document.querySelectorAll(".toggle").forEach(t => t.classList.add("locked"));
                }
            } catch (e) {
                document.getElementById("form-container").innerHTML = "Error loading project details.";
            }
        }
        load();
    </script>

    <script>
async function saveData() {
  if (!dirtyFields.size) return;

  let isArchivingNow = false;
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Saving...";

  const payload = {};
  dirtyFields.forEach(k => (payload[k] = formData[k]));
  dirtyFields.clear();

  try {
    const res = await fetch("/api/project-details", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ projectId, data: payload })
    });

    const result = await res.json();

    // ARCHIVE DETECTION
    if (payload.project_completed === true && window.__projectCompletedFromServer === false) {
      isArchivingNow = true;
      await clearAllProjectBadges();
      window.__projectCompletedFromServer = true;
    }

    // NORMAL UPDATE FLOW
    let fieldsToNotify = [];

    if (!isArchivingNow && !payload.project_completed) {
      const existing = readBadges();
      const serverChanged = normalizeKeys((result && result.changedFields) || []);

      fieldsToNotify = serverChanged.filter(k => !existing.includes(k));

      serverChanged.forEach(k => {
        if (!existing.includes(k)) existing.push(k);
      });

      writeBadges(existing);
await writeBadgesToKV(existing);
applyChangedHighlightsWithRetry(existing);

      if (fieldsToNotify.length) {
        await fetch("/api/update-task", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-user-email": userEmail
          },
          body: JSON.stringify({ projectId })
        });

        await fetch("/api/send-project-emails", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-user-email": userEmail
          },
          body: JSON.stringify({ projectId, changedFields: fieldsToNotify })
        });
      }
    }

    btn.innerText = isArchivingNow ? "✓ Archived" : "✓ Success";
    btn.classList.add("success");

    if (isArchivingNow) {
      setTimeout(() => location.reload(), 800);
    } else {
      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove("success");
        btn.innerText = "Save & Submit Update";
      }, 2000);
    }
  } catch (e) {
    btn.disabled = false;
    btn.innerText = "Error. Try again.";
  }
}
</script>

    <div id="confirmOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;padding:20px;border-radius:14px;max-width:320px;width:90%;font-family:-apple-system,sans-serif;">
    <div id="confirmText" style="font-weight:800;margin-bottom:16px;color:#000">Proceed?</div>
    <div style="display:flex;gap:12px">
      <button id="confirmCancel" style="flex:1;padding:12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer">Cancel</button>
      <button id="confirmOk" style="flex:1;padding:12px;font-weight:800;background:#0066B2;color:#fff;border:none;border-radius:8px;cursor:pointer">Confirm</button>
    </div>
  </div>
</div>

<script>
/* =========================================
   AUTO REFRESH WHEN APP RETURNS FROM PUSH
========================================= */

let espinLastRefresh = Date.now();

function espinAutoRefresh() {
  const now = Date.now();
  if (now - espinLastRefresh < 2000) return;
  espinLastRefresh = now;

  location.reload();
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    espinAutoRefresh();
  }
});

window.addEventListener("focus", espinAutoRefresh);
window.addEventListener("pageshow", espinAutoRefresh);
</script>

</body>
</html>
