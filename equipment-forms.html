<!-- MRI -->
<fieldset id="sec-MRI" class="section">
<legend>MRI Details</legend>

<div class="grid">

<div class="col-6">
<label>Manufacturer</label>
<input name="mri_manufacturer">
</div>

<div class="col-6">
<label>Model</label>
<input name="mri_model">
</div>

<div class="col-6">
<label>Magnet Strength</label>
<input name="mri_strength" placeholder="1.5T / 3T">
</div>

<div class="col-6">
<label>Bore Size</label>
<input name="mri_bore">
</div>

<div class="col-6">
<label>Year</label>
<input name="mri_year">
</div>

<div class="col-6">
<label>Number of Channels</label>
<input name="mri_channels">
</div>

</div>
</fieldset>

<!-- XRAY -->
<fieldset id="sec-XRAY" class="section">

<div class="grid">

<div class="col-6">
<label>Manufacturer</label>
<input name="xray_manufacturer">
</div>

<div class="col-6">
<label>Model</label>
<input name="xray_model">
</div>

<div class="col-6">
<label>Floor Mounted</label>
<select name="xray_floor">
<option value="">Select</option>

</select>

</select>
</div>

<option>No</option>
</select>
</div>

</div>
</fieldset>
