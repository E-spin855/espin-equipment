<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equipment Details | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script>

const params = new URLSearchParams(location.search)

const projectId =
params.get("projectId") ||
params.get("id") ||
localStorage.getItem("activeProjectId")

const modalityRaw =
params.get("modality") ||
localStorage.getItem("activeModality") ||
""

const modality = String(modalityRaw).toUpperCase().trim()

const modalityId =
params.get("modalityId") ||
localStorage.getItem("activeModalityId") ||
""

let userEmail = localStorage.getItem("espinUserEmail")
const auth = localStorage.getItem("espinAuth")

if(!projectId || auth !== "true" || !userEmail){
location.replace("/")
}

userEmail = String(userEmail).toLowerCase().trim()

</script>

<style>

:root{
--blue:#0066B2;
--green:#2e7d32;
--light:#f8f9fa;
--border:#e9ecef;
--text:#111;
--muted:#666;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--light);
color:var(--text);
padding-top:95px;
padding-bottom:140px;
}

.topbar{
background:var(--blue);
color:#fff;
padding:20px;
display:flex;
align-items:center;
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
}

.back-btn{
font-size:28px;
cursor:pointer;
}

.topbar h1{
flex:1;
text-align:center;
margin:0;
font-size:20px;
font-weight:800;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

.group{
background:#fff;
border:1px solid var(--border);
border-radius:14px;
margin-bottom:20px;
overflow:hidden;
}

.group-title{
background:var(--blue);
color:#fff;
padding:14px;
font-weight:800;
}

.field{
padding:14px;
border-bottom:1px solid #eee;
}

.field:last-child{
border-bottom:none;
}

label{
font-weight:700;
display:block;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

textarea{
min-height:110px;
}

.mod-btn{
width:100%;
padding:16px;
background:#fff;
border:1px solid #d9d9d9;
border-radius:12px;
font-size:16px;
font-weight:800;
cursor:pointer;
}

.mod-btn:hover{
background:#f3f7fb;
}

.btn-submit{
width:100%;
padding:20px;
background:var(--blue);
color:#fff;
border:none;
border-radius:14px;
font-weight:800;
font-size:18px;
cursor:pointer;
}

.success{
background:var(--green)!important;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back-btn" onclick="location.href='equipmentprojects.html'">←</div>
<h1 id="pageTitle"></h1>
</div>

<div class="container">

<div id="form-container"></div>

<button class="btn-submit" id="submitBtn" onclick="saveData()">
Save & Submit Update
</button>

</div>

<script>

let formData={}
let dirtyFields=new Set()

function group(title){
const g=document.createElement("div")
g.className="group"
g.innerHTML='<div class="group-title">'+title+'</div>'
return g
}

function field(label,key,value,type="text"){

const d=document.createElement("div")
d.className="field"

const l=document.createElement("label")
l.textContent=label

const i=document.createElement("input")
i.type=type
i.value=value||""

i.oninput=function(){
formData[key]=i.value
dirtyFields.add(key)
}

d.appendChild(l)
d.appendChild(i)

return d
}

function select(label,key,value,options){

const d=document.createElement("div")
d.className="field"

const l=document.createElement("label")
l.textContent=label

const s=document.createElement("select")

const ph=document.createElement("option")
ph.value=""
ph.textContent="— Choose —"
s.appendChild(ph)

options.forEach(opt=>{
const o=document.createElement("option")
o.value=opt
o.textContent=opt
if(value===opt)o.selected=true
s.appendChild(o)
})

s.onchange=function(){
formData[key]=s.value
dirtyFields.add(key)
}

d.appendChild(l)
d.appendChild(s)

return d
}

function textarea(label,key,value){

const d=document.createElement("div")
d.className="field"

const l=document.createElement("label")
l.textContent=label

const t=document.createElement("textarea")
t.value=value||""

t.oninput=function(){
formData[key]=t.value
dirtyFields.add(key)
}

d.appendChild(l)
d.appendChild(t)

return d
}

function renderModalitySelector(){

const fc=document.getElementById("form-container")
fc.innerHTML=""

const g=group("Select Modality")

const mods=[
{key:"CT",label:"CT Scanner"},
{key:"MRI",label:"MRI"},
{key:"XRAY",label:"X-Ray"},
{key:"CARM",label:"C-Arm"},
{key:"PETCT",label:"PET/CT"}
]

mods.forEach(m=>{
const d=document.createElement("div")
d.className="field"

const b=document.createElement("button")
b.type="button"
b.className="mod-btn"
b.textContent=m.label
b.onclick=function(){openModality(m.key)}

d.appendChild(b)
g.appendChild(d)
})

fc.appendChild(g)

document.getElementById("submitBtn").style.display="none"
}

function openModality(mod){
localStorage.setItem("activeProjectId",projectId)
localStorage.setItem("activeModality",mod)
location.href=`equipment-details.html?projectId=${projectId}&modality=${mod}`
}

function renderCT(d){

const fc=document.getElementById("form-container")
fc.innerHTML=""

const g=group("CT Scanner")

g.appendChild(field("Manufacturer","ct_manufacturer",d.ct_manufacturer))
g.appendChild(field("Model","ct_model",d.ct_model))
g.appendChild(field("Serial Number","ct_serial",d.ct_serial))
g.appendChild(field("Date Manufactured","ct_dom",d.ct_dom,"date"))
g.appendChild(field("Date Installed","ct_installed",d.ct_installed,"date"))
g.appendChild(field("# of Slices","ct_slices",d.ct_slices))
g.appendChild(field("Tube mAs / Scan/sec","ct_tube_mas",d.ct_tube_mas))

fc.appendChild(g)

}

async function load(){

if(!modality){
document.getElementById("pageTitle").textContent="Select Modality"
renderModalitySelector()
return
}

document.getElementById("pageTitle").textContent=modality+" Equipment Details"
document.getElementById("submitBtn").style.display="block"

const res = await fetch(`/api/equipment-details?projectId=${projectId}&modality=${modality}`,{
headers:{ "x-user-email":userEmail }
})

const d = await res.json()

formData=Object.assign({},d||{})

if(modality==="CT")renderCT(d)

}

load()

async function saveData(){

if(!dirtyFields.size)return

const btn=document.getElementById("submitBtn")

btn.disabled=true
btn.innerText="Saving..."

const payload={}
dirtyFields.forEach(k=>payload[k]=formData[k])

await fetch("/api/equipment-details",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-user-email":userEmail
},
body:JSON.stringify({
projectId,
modality,
modalityId,
data:payload
})
})

btn.innerText="✓ Success"
btn.classList.add("success")

setTimeout(()=>{
location.href =
`equipmentimages.html?projectId=${projectId}&modality=${modality}&modalityId=${modalityId}`
},800)

}

</script>

</body>
</html>
