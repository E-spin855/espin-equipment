<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Equipment Details | Espin Medical</title>

<style>
:root{
  --blue:#1F7BC8;
  --blue-dark:#1666aa;
  --bg:#f5f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#d9e2ec;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --safe-top:env(safe-area-inset-top, 0px);
  --accent:#0f7bff;
}

/* ===== RESET ===== */
*{
  box-sizing:border-box;
  max-width:100%;
}

html{
  margin:0;
  padding:0;
  height:100%;
  background:#fff; /* 🔥 FIX bottom blue */
}

body{
  margin:0;
  padding:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overflow-x:hidden;
}
body::after{
  content:"";
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:env(safe-area-inset-bottom, 0px);
  background:var(--bg);
  z-index:999;
}
/* ===== HEADER (OVERLAY FIXED) ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;

  background:var(--blue);
  color:#fff;

  height:calc(var(--safe-top) + 64px);
  padding-top:var(--safe-top);

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:0 4px 18px rgba(0,0,0,.12);
}

.header-inner{
  position:relative;
  width:100%;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-title{
  font-size:20px;
  font-weight:800;
  letter-spacing:.2px;
  line-height:1;
  margin:0;
}

.back{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:32px;
  font-weight:700;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;  /* 🔥 FIX line */
  line-height:1;         /* 🔥 FIX baseline artifact */

  -webkit-tap-highlight-color:transparent;
}
/* ===== CONTENT (SLIDES UNDER HEADER) ===== */
.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;

  padding:calc(var(--safe-top) + 64px + 16px) 16px 110px;
}

/* ===== FORM ===== */
label{
  display:block;
  font-weight:700;
  margin:14px 0 8px;
  font-size:15px;
  color:#111827;
}

input,select,textarea{
  width:100%;
  padding:14px 16px;
  border:1px solid #cfd9e3;
  border-radius:14px;
  font-size:16px;
  background:#fff;
  color:#111827;
}

input[type="date"]{
  -webkit-appearance:none;
  appearance:none;
}

/* ===== GROUP ===== */
.group{
  border:1px solid #e6ecf2;
  border-radius:18px;
  padding:18px;
  margin-top:14px;
  background:#fff;
  overflow:hidden;
}

.group-title{
  font-weight:800;
  margin-bottom:10px;
  font-size:18px;
}

/* ===== BUTTONS ===== */
.button-row{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}

button{
  width:100%;
  background:var(--accent);
  color:#fff;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
}

button.secondary{
  background:#0f172a;
}

button:disabled{
  opacity:.65;
}

/* ===== SEND STATES ===== */
.send-btn{
  background:#6b7280 !important;
  border-radius:16px;
  padding:16px 18px;
  font-size:16px;
  font-weight:800;
}

.send-btn.success{
  background:#155c30 !important;
}

.send-spinner{
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,0.4);
  border-top:2px solid #fff;
  border-radius:50%;
  display:inline-block;
  animation:spin 0.7s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* ===== CHANGE HIGHLIGHT ===== */
.field-changed{
  border:2px solid #1F7BC8 !important;
  color:#1F7BC8 !important;
  font-weight:700;
}

.field-changed::placeholder{
  color:#1F7BC8;
}

.label-changed{
  color:#1F7BC8 !important;
  font-weight:800;
}
input[type="month"]{
  max-width:180px;
  display:block;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <a id="backLink" class="back" href="equipmentprojects.html" aria-label="Go back">
  ←
</a>
    <h1 class="header-title">Equipment Details</h1>
  </div>
</div>

<div class="wrap">

  <label>Modality</label>
  <select id="modality">
    <option value="">Select</option>
    <option value="CT">CT</option>
    <option value="MRI">MRI</option>
 <option value="MAMMO">MAMMO</option>
    <option value="XRAY">X-Ray</option>
    <option value="CARM">C-Arm</option>
    <option value="PETCT">PET/CT</option>
  </select>

  <div id="form-container"></div>

  <div class="button-row">
    <button id="saveBtn" onclick="saveData()">Save and Continue to Images</button>
   <button id="sendEquipmentBtn" class="send-btn" onclick="sendEquipmentOnly()">
  Send Equipment Update Only
</button>
  </div>
<div id="formError" style="
  color:red;
  font-weight:700;
  display:none;
  margin-top:10px;
  text-align:center;
">
  Serial Number or Additional Identifier required
</div>
</div>

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_KEY = `${APP_PREFIX}activeModality`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;

const auth = localStorage.getItem(AUTH_KEY);
const userEmail = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();

if (auth !== "true" || !userEmail) {
  location.replace("Home.html");
}

const params = new URLSearchParams(location.search);

const projectId =
  params.get("projectId") ||
  params.get("id") ||
  localStorage.getItem(PROJECT_ID_KEY) ||
  "";

const source =
  String(params.get("source") || "").toLowerCase().trim();

const mode =
  String(params.get("mode") || "").toLowerCase().trim();

const isCreateMode =
  mode === "create" || (source === "projects" && !params.get("modalityId"));

let modalityId =
  isCreateMode
    ? ""
    : (
        params.get("modalityId") ||
        (projectId ? localStorage.getItem(`${MODALITY_ID_KEY}_${projectId}`) : "") ||
        ""
      );

let currentModality =
  isCreateMode
    ? String(params.get("modality") || "").toUpperCase().trim()
    : String(
        params.get("modality") ||
        localStorage.getItem(projectId ? `${MODALITY_KEY}_${projectId}` : MODALITY_KEY) ||
        ""
      ).toUpperCase().trim();

const DETAILS_BADGE_STORAGE_KEY = `equipmentDetailsChanged:${projectId}`;

if (!projectId) {
  alert("Missing project ID");
  throw new Error("No projectId");
}

localStorage.setItem(PROJECT_ID_KEY, projectId);

const backLink = document.getElementById("backLink");
const saveBtn = document.getElementById("saveBtn");
const sendEquipmentBtn = document.getElementById("sendEquipmentBtn");

function goBackTarget() {
  if (source === "index") {
    return `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
  }
  if (source === "projects") {
    return `equipmentprojects.html?projectId=${encodeURIComponent(projectId)}`;
  }
  if (document.referrer.includes("equipmentindex.html")) {
    return `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
  }
  return `equipmentprojects.html?projectId=${encodeURIComponent(projectId)}`;
}

backLink.href = goBackTarget();

backLink.addEventListener("click", async function(e){
  e.preventDefault();

  try {
    const ADMIN_EMAIL = "info@espinmedical.com";
    const rowId = String(modalityId || "").trim();

    if (rowId) {
      await fetch("/api/kv-set", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          key: `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}:fields`,
          value: []
        }),
        keepalive: true
      });
    }
  } catch {}

  location.href = goBackTarget();
});
let formData = {};
let dirtyFields = new Set();

function normalizeKeys(arr){
  if (!Array.isArray(arr)) return [];
  return [...new Set(
    arr
      .map(v => String(v || "").trim())
      .filter(Boolean)
  )];
}

function readDetailsChangedMap(){
  try {
    const raw =
      sessionStorage.getItem(DETAILS_BADGE_STORAGE_KEY) ||
      localStorage.getItem(DETAILS_BADGE_STORAGE_KEY);

    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
  } catch {
    return {};
  }
}

function writeDetailsChangedMap(map){
  const safeMap = map && typeof map === "object" && !Array.isArray(map) ? map : {};
  const json = JSON.stringify(safeMap);

  try { sessionStorage.setItem(DETAILS_BADGE_STORAGE_KEY, json); } catch {}
  try { localStorage.setItem(DETAILS_BADGE_STORAGE_KEY, json); } catch {}

  console.log("[DETAILS PAGE] storage after save", {
    key: DETAILS_BADGE_STORAGE_KEY,
    json,
    session: sessionStorage.getItem(DETAILS_BADGE_STORAGE_KEY),
    local: localStorage.getItem(DETAILS_BADGE_STORAGE_KEY)
  });
}
async function applyChangedFieldStyling(){
  const ADMIN_EMAIL = "info@espinmedical.com";
  const rowId = String(modalityId || "").trim();

  if (!rowId) return;

  try {
    const res = await fetch("/api/kv-get", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        key: `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}:fields`
      })
    });

    const json = await res.json().catch(() => ({}));

    let changedFields = [];

    if (json?.value) {
      const parsed = typeof json.value === "string"
        ? JSON.parse(json.value)
        : json.value;

      if (Array.isArray(parsed)) {
        changedFields = parsed;
      }
    }

    const normalizeKey = (k) =>
      String(k || "")
        .replace(/^ct_|^mri_|^xray_|^carm_|^pet_|^nm_|^us_|^mammo_|^other_/i, "")
        .replace(/_/g, "")
        .toLowerCase()
        .trim();

    const changedSet = new Set(
      changedFields.map(normalizeKey)
    );

    document.querySelectorAll("[data-key]").forEach(wrapper => {
      const key = wrapper.dataset.key;
      const input = wrapper.querySelector("input, select, textarea");
      const label = wrapper.querySelector("label");

      if (!input || !key) return;

      const isChanged = changedSet.has(normalizeKey(key));

      if (isChanged) {
        input.classList.add("field-changed");
        if (label) label.classList.add("label-changed");
      } else {
        input.classList.remove("field-changed");
        if (label) label.classList.remove("label-changed");
      }
    });

  } catch (err) {
    console.error("applyChangedFieldStyling error", err);
  }
}


// ✅ ADD THIS FUNCTION RIGHT AFTER
async function clearChangedFieldsForAdmin(){
  const ADMIN_EMAIL = "info@espinmedical.com";
  const rowId = String(modalityId || "").trim();

  if (!rowId) return;

  try {
    await fetch("/api/kv-set", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        key: `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}:fields`,
        value: []
      }),
      keepalive: true
    });

  } catch {}
}
async function loadData(){
  try {
    if (isCreateMode && !modalityId) {
      formData = {};
      dirtyFields = new Set();

      if (currentModality) {
        formData.modality = currentModality;
        document.getElementById("modality").value = currentModality;
        triggerRender(currentModality);
      } else {
        document.getElementById("modality").value = "";
        document.getElementById("form-container").innerHTML = "";
      }
      return;
    }

    const qs = new URLSearchParams();
    qs.set("projectId", projectId);
    if (modalityId) qs.set("modalityId", modalityId);
    if (currentModality) qs.set("modality", currentModality);

    const res = await fetch(`/api/equipment-details?${qs.toString()}`, {
      headers: { "x-user-email": userEmail }
    });

    const json = await res.json().catch(() => ({}));

    formData = (json && json.data && typeof json.data === "object") ? json.data : {};
    dirtyFields = new Set();

    if (json?.modalityId) {
      modalityId = String(json.modalityId).trim();
      localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, modalityId);
    }

    if (json?.modality) {
      currentModality = String(json.modality).toUpperCase().trim();
    } else if (formData.modality) {
      currentModality = String(formData.modality).toUpperCase().trim();
    }

    if (currentModality) {
      formData.modality = currentModality;
      document.getElementById("modality").value = currentModality;
      localStorage.setItem(`${MODALITY_KEY}_${projectId}`, currentModality);
      triggerRender(currentModality);
      return;
    }

    document.getElementById("modality").value = "";
    document.getElementById("form-container").innerHTML = "";
  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
}

function group(title){
  const g = document.createElement("div");
  g.className = "group";
  g.innerHTML = `<div class="group-title">${title}</div>`;
  return g;
}

function field(label,key,value,type="text"){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const i = document.createElement("input");
  i.type = (type === "date") ? "month" : type;
  i.value = formData[key] || value || "";
  i.required = false;

  i.oninput = () => {
    formData[key] = i.value;
    dirtyFields.add(key);

    // 🔥 CLEAR RED WHEN EITHER FIELD HAS VALUE
    const modality = String(formData.modality || currentModality || "").toUpperCase().trim();

    const serialKeyMap = {
      CT: "ct_serial",
      MRI: "mri_serial",
      MAMMO: "mamo_serial",
      XRAY: "xray_serial",
      CARM: "carm_serial",
      PETCT: "pet_serial"
    };

    const serialKey = serialKeyMap[modality];

    const serialInput = document.querySelector(`[data-key="${serialKey}"] input`);
    const identifierInput = document.querySelector(`[data-key="additional_identifier"] input`);
    const errorEl = document.getElementById("formError");

    const serialVal = String(serialInput?.value || "").trim();
    const identifierVal = String(identifierInput?.value || "").trim();

    if (serialVal || identifierVal) {
      [serialInput, identifierInput].forEach(el => {
        if (el) el.style.border = "";
      });

      if (errorEl) errorEl.style.display = "none";
    }
  };

  d.appendChild(l);
  d.appendChild(i);
  return d;
}
function selectField(label,key,value,opts){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const s = document.createElement("select");
  const ph = document.createElement("option");
  ph.value = "";
  ph.textContent = "Select";
  s.appendChild(ph);

  opts.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = o;
    if (o === (formData[key] || value)) opt.selected = true;
    s.appendChild(opt);
  });

  s.onchange = () => {
    formData[key] = s.value;
    dirtyFields.add(key);
    runDependencyCheck(key);
  };

  d.appendChild(l);
  d.appendChild(s);
  return d;
}

function textarea(label,key,value){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const t = document.createElement("textarea");
  t.value = formData[key] || value || "";

  t.oninput = () => {
    formData[key] = t.value;
    dirtyFields.add(key);
  };

  d.appendChild(l);
  d.appendChild(t);
  return d;
}

const dependencies = [
  { controller: "ct_upgrades", dependent: "ct_upgrades_desc", showOn: "Yes" },
  { controller: "ct_injector", dependent: "ct_injector_model", showOn: "Yes" },
  { controller: "ct_in_use", dependent: "ct_out_of_use_date", showOn: "No" },

  { controller: "mri_in_use", dependent: "mri_out_of_use_date", showOn: "No" },

  // ✅ ADD ALL BELOW
  { controller: "xray_in_use", dependent: "xray_out_of_use_date", showOn: "No" },
  { controller: "carm_in_use", dependent: "carm_out_of_use_date", showOn: "No" },
  { controller: "pet_in_use", dependent: "pet_out_of_use_date", showOn: "No" },
  { controller: "mamo_in_use", dependent: "mamo_out_of_use_date", showOn: "No" }
];
function runDependencyCheck(changedKey = null){
  dependencies.forEach(({controller, dependent, showOn}) => {
    if (changedKey && changedKey !== controller) return;

    const controllerEl = document.querySelector(`[data-key="${controller}"] select`);
    const dependentEl = document.querySelector(`[data-key="${dependent}"]`);

    if (!controllerEl || !dependentEl) return;

    const show = controllerEl.value === showOn;
    dependentEl.style.display = show ? "block" : "none";

    if (!show) {
      const input = dependentEl.querySelector("input, textarea, select");
      if (input) input.value = "";
      delete formData[dependent];
      dirtyFields.add(dependent);
    }
  });
}

function triggerRender(m){
  if (m === "CT") renderCT();
  if (m === "MRI") renderMRI();
  if (m === "MAMMO") renderMAMMO(); // ✅ FIX
  if (m === "XRAY") renderXRAY();
  if (m === "CARM") renderCARM();
  if (m === "PETCT") renderPETCT();
  setTimeout(applyChangedFieldStyling, 50);
}
function appendCommonIdentifierFields(groupEl, serialKey){
  groupEl.appendChild(field("Serial Number", serialKey));
const identifierField = field("Additional Identifier", "additional_identifier");
identifierField.querySelector("input").placeholder = "e.g. Room 2, Asset Tag 123, Hospital ID";
groupEl.appendChild(identifierField);
}

function renderCT(){
  const fc = document.getElementById("form-container");
  fc.innerHTML = "";
  const g = group("CT Scanner");

  g.appendChild(field("Manufacturer","ct_manufacturer"));
  g.appendChild(field("Model","ct_model"));
  appendCommonIdentifierFields(g, "ct_serial");

  g.appendChild(field("Date Manufactured","ct_dom","", "date"));
  g.appendChild(field("Date Installed","ct_installed","", "date"));
  g.appendChild(field("# of Slices","ct_slices"));
  g.appendChild(field("Tube mAs / Scan/sec","ct_tube_mas"));
  g.appendChild(field("Tube Size (mHu)","ct_mhu"));
  g.appendChild(field("Tube DOM","ct_tube_dom","", "date"));
  g.appendChild(field("Tube Installation Date","ct_tube_installation_date","", "date"));

  g.appendChild(field("SW Version","ct_sw_version"));
  g.appendChild(field("GOC Version","ct_goc_version"));

  g.appendChild(selectField("Upgrades","ct_upgrades","",["Yes","No"]));
  g.appendChild(textarea("Upgrades Description","ct_upgrades_desc"));

  g.appendChild(selectField("Injector","ct_injector","",["Yes","No"]));
  g.appendChild(field("Injector Model","ct_injector_model"));

  g.appendChild(selectField("Chiller","ct_chiller","",["Yes","No"]));

  g.appendChild(selectField("System In Use","ct_in_use","",["Yes","No"]));
  g.appendChild(field("Date Removed From Service","ct_out_of_use_date","", "date"));

  g.appendChild(textarea("Describe Removal Pathways","ct_removal_pathways"));
  g.appendChild(selectField("Loading Dock Available","ct_loading_dock","",["Yes","No"]));
  g.appendChild(selectField("Will Hard Drives Be Removed","ct_hard_drive_removed","",["Yes","No"]));
  g.appendChild(field("Availability Time Frame","ct_availability_timeframe"));

  fc.appendChild(g);
  runDependencyCheck();
}

  g.appendChild(textarea("Describe Removal Pathways","mamo_removal_pathways"));
  g.appendChild(selectField("Loading Dock Available","mamo_loading_dock","",["Yes","No"]));
  g.appendChild(selectField("Will Hard Drives Be Removed","mamo_hard_drive_removed","",["Yes","No"]));
  g.appendChild(field("Availability Time Frame","mamo_availability_timeframe"));

  fc.appendChild(g);

function renderXRAY(){
  const fc = document.getElementById("form-container");
  fc.innerHTML = "";
  const g = group("X-Ray System");

  g.appendChild(field("Manufacturer","xray_manufacturer"));
  g.appendChild(field("Model","xray_model"));

document.getElementById("modality").onchange = function () {
  const m = String(this.value || "").toUpperCase().trim();
  currentModality = m;

  if (m) {
    localStorage.setItem(`${MODALITY_KEY}_${projectId}`, m);
  } else {
    localStorage.removeItem(`${MODALITY_KEY}_${projectId}`);
  }

  formData = { modality: m };
  dirtyFields = new Set(["modality"]);

  if (!m) {
    document.getElementById("form-container").innerHTML = "";
    return;
  }

  triggerRender(m);
};

function getEffectiveSerialValue(modality){
  const map = {
  CT: "ct_serial",
  MRI: "mri_serial",
  MAMMO: "mamo_serial", // ✅ ADD THIS
  XRAY: "xray_serial",
  CARM: "carm_serial",
  PETCT: "pet_serial"
};

  const key = map[modality] || "serial_number";
  return String(formData[key] || "").trim();
}

function validateBeforeSave(){
  if (!currentModality && !formData.modality) {
    throw new Error("Select modality");
  }

  const effectiveModality = String(formData.modality || currentModality || "").toUpperCase().trim();
  const serialValue = getEffectiveSerialValue(effectiveModality);
  const additionalIdentifier = String(formData.additional_identifier || "").trim();

  const serialKeyMap = {
    CT: "ct_serial",
    MRI: "mri_serial",
    MAMMO: "mamo_serial",
    XRAY: "xray_serial",
    CARM: "carm_serial",
    PETCT: "pet_serial"
  };

  const serialKey = serialKeyMap[effectiveModality];
  const serialInput = document.querySelector(`[data-key="${serialKey}"] input`);
  const identifierInput = document.querySelector(`[data-key="additional_identifier"] input`);
  const errorEl = document.getElementById("formError");

  // 🔴 RESET FIRST
  [serialInput, identifierInput].forEach(el => {
    if (el) el.style.border = "";
  });
  if (errorEl) errorEl.style.display = "none";

  // 🔴 VALIDATION
  if (!serialValue && !additionalIdentifier) {
    if (serialInput) serialInput.style.border = "2px solid red";
    if (identifierInput) identifierInput.style.border = "2px solid red";

    if (errorEl) errorEl.style.display = "block";

    serialInput?.scrollIntoView({ behavior: "smooth", block: "center" });

    throw new Error("Missing identifier");
  }

  return {
    effectiveModality,
    payload: { ...formData, modality: effectiveModality }
  };
}
function setButtonState(mode){
  if (mode === "save") {
    saveBtn.disabled = true;
    sendEquipmentBtn.disabled = true;
    saveBtn.innerText = "Saving...";
    sendEquipmentBtn.innerText = "Send Equipment Update Only";
    return;
  }

  if (mode === "sendEquipment") {
    saveBtn.disabled = true;
    sendEquipmentBtn.disabled = true;
    saveBtn.innerText = "Save and Continue to Images";
    sendEquipmentBtn.innerText = "Saving & Sending...";
    return;
  }

  saveBtn.disabled = false;
  sendEquipmentBtn.disabled = false;
  saveBtn.innerText = "Save and Continue to Images";
  sendEquipmentBtn.innerText = "Send Equipment Update Only";
}

async function saveDetailsOnly(){
  const { effectiveModality, payload } = validateBeforeSave();

  console.log("[SEND-EQUIPMENT-FRONT] saveDetailsOnly start", {
    projectId,
    modalityId,
    effectiveModality,
    dirtyFields: Array.from(dirtyFields),
    payloadKeys: Object.keys(payload || {})
  });

  const res = await fetch("/api/equipment-details/equipment-save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-email": userEmail
    },
    body: JSON.stringify({
      projectId,
      modalityId,
      modality: effectiveModality,
      data: payload
    })
  });

  const json = await res.json().catch(() => ({}));

  console.log("[SEND-EQUIPMENT-FRONT] save response", {
    ok: res.ok,
    status: res.status,
    json
  });

  if (!res.ok) {
    throw new Error(json?.error || json?.message || "Save failed");
  }

  if (json?.modalityId) {
    modalityId = String(json.modalityId).trim();
    localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, modalityId);
  }

  localStorage.setItem(`${MODALITY_KEY}_${projectId}`, effectiveModality);
  currentModality = effectiveModality;
  formData.modality = effectiveModality;

  const changedFields = Array.isArray(json?.changedFields)
    ? normalizeKeys(json.changedFields)
    : normalizeKeys(Array.from(dirtyFields));

  const stableModalityId = String(modalityId || json?.modalityId || "").trim();

  if (stableModalityId && changedFields.length) {
    const currentMap = readDetailsChangedMap();

    currentMap[stableModalityId] = {
      changedFields,
      ts: Date.now(),
      modality: effectiveModality
    };

    writeDetailsChangedMap(currentMap);
setTimeout(() => applyChangedFieldStyling(), 50);

    console.log("[SEND-EQUIPMENT-FRONT] local changed map write", {
      storageKey: DETAILS_BADGE_STORAGE_KEY,
      modalityId: stableModalityId,
      changedFields,
      mapKeys: Object.keys(currentMap)
    });
  }

  dirtyFields = new Set();

  return {
    effectiveModality,
    saved: true,
    changedFields
  };
}

async function saveData(){
  setButtonState("save");

  try {
    const { effectiveModality } = await saveDetailsOnly();

    const target = new URL("equipmentimages.html", window.location.href);
    target.searchParams.set("projectId", projectId);
    if (modalityId) target.searchParams.set("modalityId", modalityId);
    target.searchParams.set("modality", effectiveModality);
    location.href = target.toString();

  } catch (err) {
    console.error("SAVE ERROR:", err);
    alert(err?.message || "Network / server error");
    setButtonState("idle");
  }
}

async function sendEquipmentOnly(){
  if (sendEquipmentBtn.classList.contains("loading") || sendEquipmentBtn.classList.contains("success")) return;

  // 🔄 LOADING STATE
  sendEquipmentBtn.classList.add("loading");
  sendEquipmentBtn.innerHTML = `<span class="send-spinner"></span> Sending...`;
  saveBtn.disabled = true;

  try {
    const result = await saveDetailsOnly();

    const res = await fetch("/api/send-equipment-emails", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        projectId,
        modalityId,
        changedFields: result.changedFields || []
      })
    });

    const json = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(json?.error || json?.message || "Failed to send equipment update");
    }

    // ✅ SUCCESS STATE
   sendEquipmentBtn.classList.remove("loading");
sendEquipmentBtn.classList.add("success");
sendEquipmentBtn.innerHTML = "Update Sent";

// reset after delay
setTimeout(() => {
  sendEquipmentBtn.classList.remove("success");
  sendEquipmentBtn.innerHTML = "Send Equipment Update Only";
  saveBtn.disabled = false;
}, 3000);

  } catch (err) {
    console.error("SEND EQUIPMENT ONLY ERROR:", err);

    // ❌ RESET
    sendEquipmentBtn.classList.remove("loading");
    sendEquipmentBtn.innerHTML = "Send Equipment Update Only";
    saveBtn.disabled = false;

    alert(err?.message || "Network / server error");
  }
}
