<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equipment Details | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script>

const params=new URLSearchParams(location.search)

const projectId=
params.get("projectId")||
params.get("id")||
localStorage.getItem("activeProjectId")

const modality=
String(
params.get("modality")||
localStorage.getItem("activeModality")||
"CT"
).toUpperCase().trim()

const modalityId=
params.get("modalityId")||
localStorage.getItem("activeModalityId")||
""

let userEmail=localStorage.getItem("espinUserEmail")
const auth=localStorage.getItem("espinAuth")

if(!projectId||auth!=="true"||!userEmail){
location.replace("/")
}

userEmail=String(userEmail).toLowerCase().trim()

const BADGE_STORAGE_KEY=`badges_${projectId}`
const BADGE_KV_KEY=`project:badges_details:${projectId}:${userEmail}`
const UNREAD_KEY=`project:unread:${projectId}:${userEmail}`
const UNREAD_IMAGES_KEY=`project:unread_images:${projectId}:${userEmail}`

</script>

<style>

:root{
--blue:#0066B2;
--green:#2e7d32;
--light:#f8f9fa;
--border:#e9ecef;
--text:#111;
--muted:#666;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--light);
color:var(--text);
padding-top:95px;
padding-bottom:140px;
}

.topbar{
background:var(--blue);
color:#fff;
padding:20px;
display:flex;
align-items:center;
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
}

.back-btn{
font-size:28px;
cursor:pointer;
}

.topbar h1{
flex:1;
text-align:center;
margin:0;
font-size:20px;
font-weight:800;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

.group{
background:#fff;
border:1px solid var(--border);
border-radius:14px;
margin-bottom:20px;
overflow:hidden;
}

.group-title{
background:var(--blue);
color:#fff;
padding:14px;
font-weight:800;
}

.field{
padding:14px;
border-bottom:1px solid #eee;
}

.field:last-child{
border-bottom:none;
}

label{
font-weight:700;
display:block;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

textarea{
min-height:110px;
}

.row-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.btn-submit{
width:100%;
padding:20px;
background:var(--blue);
color:#fff;
border:none;
border-radius:14px;
font-weight:800;
font-size:18px;
cursor:pointer;
}

.success{
background:var(--green)!important;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back-btn" onclick="location.href='management.html'">←</div>
<h1 id="pageTitle"></h1>
</div>

<div class="container">

<div id="form-container"></div>

<button class="btn-submit" id="submitBtn" onclick="saveData()">
Save & Submit Update
</button>

</div>

<script>

let formData={}
let dirtyFields=new Set()

function group(title){
const g=document.createElement("div")
g.className="group"
g.innerHTML='<div class="group-title">'+title+'</div>'
return g
}

function field(label,key,value,type="text"){

const d=document.createElement("div")
d.className="field"

const l=document.createElement("label")
l.textContent=label

const i=document.createElement("input")
i.type=type
i.value=value||""

i.oninput=function(){
formData[key]=i.value
dirtyFields.add(key)
}

d.appendChild(l)
d.appendChild(i)

return d
}

function select(label,key,value,options){

const d=document.createElement("div")
d.className="field"

const l=document.createElement("label")
l.textContent=label

const s=document.createElement("select")

const ph=document.createElement("option")
ph.value=""
ph.textContent="— Choose —"
s.appendChild(ph)

options.forEach(opt=>{
const o=document.createElement("option")
o.value=opt
o.textContent=opt
if(value===opt)o.selected=true
s.appendChild(o)
})

s.onchange=function(){
formData[key]=s.value
dirtyFields.add(key)
}

d.appendChild(l)
d.appendChild(s)

return d
}

function textarea(label,key,value){

const d=document.createElement("div")
d.className="field"

const l=document.createElement("label")
l.textContent=label

const t=document.createElement("textarea")
t.value=value||""

t.oninput=function(){
formData[key]=t.value
dirtyFields.add(key)
}

d.appendChild(l)
d.appendChild(t)

return d
}

function renderCARM(d){

const fc=document.getElementById("form-container")
fc.innerHTML=""

const g=group("C-Arm System")

g.appendChild(field("Manufacturer","carm_manufacturer",d.carm_manufacturer))
g.appendChild(field("Model","carm_model",d.carm_model))
g.appendChild(field("Year of Manufacture","carm_dom",d.carm_dom))
g.appendChild(field("Serial Number","carm_serial",d.carm_serial))

g.appendChild(select("Monitor Type","carm_monitors",d.carm_monitors,[
"Single","Dual","Flat Screen"
]))

g.appendChild(field("Image Intensifier Size","carm_image_intensifier",d.carm_image_intensifier))

g.appendChild(field("SW Version","carm_sw_version",d.carm_sw_version))

g.appendChild(select("Serviced By","carm_servicing",d.carm_servicing,[
"OEM","Biomed","3rd Party"
]))

g.appendChild(field("Service Company","carm_service_name",d.carm_service_name))

g.appendChild(select("System In Use","carm_in_use",d.carm_in_use,[
"Yes","No"
]))

g.appendChild(field("Date Removed From Service","carm_out_of_use_date",d.carm_out_of_use_date,"date"))

fc.appendChild(g)

}
function renderCT(d){

const fc=document.getElementById("form-container")
fc.innerHTML=""

const g=group("CT Scanner")

g.appendChild(field("Manufacturer","ct_manufacturer",d.ct_manufacturer))
g.appendChild(field("Model","ct_model",d.ct_model))
g.appendChild(field("Serial Number","ct_serial",d.ct_serial))
g.appendChild(field("Date Manufactured","ct_dom",d.ct_dom,"date"))
g.appendChild(field("Date Installed","ct_installed",d.ct_installed,"date"))
g.appendChild(field("# of Slices","ct_slices",d.ct_slices))
g.appendChild(field("Tube mAs / Scan/sec","ct_tube_mas",d.ct_tube_mas))
g.appendChild(field("Tube Size (mHu)","ct_mhu",d.ct_mhu))
g.appendChild(field("Tube DOM","ct_tube_dom",d.ct_tube_dom,"date"))
g.appendChild(field("Tube Installation Date","ct_tube_installation_date",d.ct_tube_installation_date,"date"))
g.appendChild(field("SW Version","ct_sw_version",d.ct_sw_version))
g.appendChild(field("GOC Version","ct_goc_version",d.ct_goc_version))

g.appendChild(select("Upgrades","ct_upgrades",d.ct_upgrades,["Yes","No"]))
g.appendChild(textarea("Upgrades Description","ct_upgrades_desc",d.ct_upgrades_desc))

g.appendChild(select("Injector","ct_injector",d.ct_injector,["Yes","No"]))
g.appendChild(field("Injector Model","ct_injector_model",d.ct_injector_model))

g.appendChild(select("Chiller","ct_chiller",d.ct_chiller,["Yes","No"]))

g.appendChild(select("System In Use","ct_in_use",d.ct_in_use,["Yes","No"]))
g.appendChild(field("Date Removed From Service","ct_out_of_use_date",d.ct_out_of_use_date,"date"))

fc.appendChild(g)

}

function renderMRI(d){

const fc=document.getElementById("form-container")
fc.innerHTML=""

const g=group("MRI System")

g.appendChild(field("Manufacturer","mri_manufacturer",d.mri_manufacturer))
g.appendChild(field("Model","mri_model",d.mri_model))
g.appendChild(field("Year of Manufacture","mri_yom",d.mri_yom))
g.appendChild(field("Magnet Type","mri_magnet_type",d.mri_magnet_type))
g.appendChild(field("Bore Size (cm)","mri_bore_size_cm",d.mri_bore_size_cm))
g.appendChild(field("# Channels","mri_num_channels",d.mri_num_channels))
g.appendChild(field("Gradient","mri_gradient",d.mri_gradient))
g.appendChild(field("SW Version","mri_sw_version",d.mri_sw_version))
g.appendChild(field("SW Options","mri_sw_options",d.mri_sw_options))

g.appendChild(select("TIM","mri_tim",d.mri_tim,["Yes","No"]))

g.appendChild(textarea("Coils","mri_coils",d.mri_coils))

g.appendChild(select("Service","mri_service",d.mri_service,["OEM","Biomed","3rd Party"]))
g.appendChild(field("Service Company","mri_service_name",d.mri_service_name))

g.appendChild(select("Under Contract","mri_under_contract",d.mri_under_contract,["Yes","No"]))
g.appendChild(field("Last PM","mri_last_pm",d.mri_last_pm,"date"))

g.appendChild(select("System In Use","mri_in_use",d.mri_in_use,["Yes","No"]))
g.appendChild(field("Date Removed From Service","mri_out_of_use_date",d.mri_out_of_use_date,"date"))

fc.appendChild(g)

}

function renderXRAY(d){

const fc=document.getElementById("form-container")
fc.innerHTML=""

const g=group("X-Ray")

g.appendChild(field("Manufacturer","xray_manufacturer",d.xray_manufacturer))
g.appendChild(field("Model","xray_model",d.xray_model))
g.appendChild(field("Date Manufactured","xray_dom",d.xray_dom,"date"))

g.appendChild(select("Floor Mounted","xray_floor_mounted",d.xray_floor_mounted,["Yes","No"]))
g.appendChild(select("Ceiling Mounted","xray_ceiling_mounted",d.xray_ceiling_mounted,["Yes","No"]))
g.appendChild(select("Is RF","xray_is_rf",d.xray_is_rf,["Yes","No"]))

g.appendChild(select("System In Use","xray_in_use",d.xray_in_use,["Yes","No"]))
g.appendChild(field("Date Removed From Service","xray_out_of_use_date",d.xray_out_of_use_date,"date"))

fc.appendChild(g)

}


function renderPETCT(d){

const fc=document.getElementById("form-container")
fc.innerHTML=""

const g=group("PET/CT System")

g.appendChild(field("Manufacturer","pet_manufacturer",d.pet_manufacturer))
g.appendChild(field("Model","pet_model",d.pet_model))

g.appendChild(field("Date Manufactured","pet_dom",d.pet_dom,"date"))

g.appendChild(field("CT Slice Count","pet_ct_slices",d.pet_ct_slices))

g.appendChild(field("Tube DOM","pet_tube_dom",d.pet_tube_dom,"date"))

g.appendChild(field("Tube mAs / Scan/sec","pet_tube_mas",d.pet_tube_mas))

g.appendChild(field("SW Version","pet_sw_version",d.pet_sw_version))

g.appendChild(field("Installed Options","pet_installed_options",d.pet_installed_options))

g.appendChild(select("System In Use","pet_in_use",d.pet_in_use,[
"Yes","No"
]))

g.appendChild(field("Date Removed From Service","pet_out_of_use_date",d.pet_out_of_use_date,"date"))

fc.appendChild(g)

}
async function load(){
document.getElementById("pageTitle").textContent=modality+" Equipment Details"

const res=await fetch("/api/project-details/save?projectId="+projectId+"&modality="+modality,{
headers:{ "x-user-email":userEmail }
})

const d=await res.json()

formData=Object.assign({},d||{})

if(modality==="CT")renderCT(d)
if(modality==="MRI")renderMRI(d)
if(modality==="XRAY")renderXRAY(d)
if(modality==="CARM")renderCARM(d)
if(modality==="PETCT")renderPETCT(d)
}

load()

async function saveData(){

if(!dirtyFields.size)return

const btn=document.getElementById("submitBtn")

btn.disabled=true
btn.innerText="Saving..."

const payload={}
dirtyFields.forEach(k=>payload[k]=formData[k])

await fetch("/api/project-details",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-user-email":userEmail
},
body:JSON.stringify({
projectId,
modality,
modalityId,
data:payload
})
})

btn.innerText="✓ Success"
btn.classList.add("success")

setTimeout(()=>{
btn.disabled=false
btn.classList.remove("success")
btn.innerText="Save & Submit Update"
},2000)

}

</script>

</body>
</html>
