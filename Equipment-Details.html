<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Equipment Details | Espin Medical</title>

<style>
:root{
  --blue:#1F7BC8;
  --blue-dark:#1666aa;
  --bg:#f5f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#d9e2ec;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --safe-top:env(safe-area-inset-top, 0px);
  --accent:#0f7bff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
  min-height:100vh;
}

/* ===============================
   TOP BAR MATCHED TO EQUIPMENT RECORDS
=============================== */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--blue);
  color:#fff;
  height:calc(var(--safe-top) + 64px);
  padding-top:var(--safe-top);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
}

.header-inner{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-title{
  font-size:20px;
  font-weight:800;
  letter-spacing:.2px;
  line-height:1;
  color:#fff;
  margin:0;
}

.back{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:34px;
  line-height:1;
  cursor:pointer;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  margin:0;
  z-index:1001;
  text-decoration:none;
  -webkit-appearance:none;
  appearance:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.back:active{
  opacity:.65;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:20px 16px 110px;
}

label{
  display:block;
  font-weight:700;
  margin:14px 0 8px;
  font-size:15px;
  color:#111827;
}

input,select,textarea{
  width:100%;
  padding:14px 16px;
  border:1px solid #cfd9e3;
  border-radius:14px;
  font-size:16px;
  background:#fff;
  color:#111827;
}

button{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
  margin-top:20px;
  font-size:16px;
  font-weight:700;
}

.group{
  border:1px solid #e6ecf2;
  border-radius:18px;
  padding:18px;
  margin-top:18px;
  background:#fff;
}

.group-title{
  font-weight:800;
  margin-bottom:10px;
  font-size:18px;
  color:#000;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <a id="backLink" class="back" href="equipmentprojects.html" aria-label="Go back">←</a>
    <h1 class="header-title">Equipment Details</h1>
  </div>
</div>

<div class="wrap">

  <label>Modality</label>
  <select id="modality">
    <option value="">Select</option>
    <option value="CT">CT</option>
    <option value="MRI">MRI</option>
    <option value="XRAY">X-Ray</option>
    <option value="CARM">C-Arm</option>
    <option value="PETCT">PET/CT</option>
  </select>

  <div id="form-container"></div>

  <button id="saveBtn" onclick="saveData()">Save & Submit Update</button>
</div>

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_KEY = `${APP_PREFIX}activeModality`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;

const auth = localStorage.getItem(AUTH_KEY);
const userEmail = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();

if (auth !== "true" || !userEmail) {
  location.replace("Home.html");
}

const params = new URLSearchParams(location.search);

const projectId =
  params.get("projectId") ||
  params.get("id") ||
  localStorage.getItem(PROJECT_ID_KEY) ||
  "";

const source =
  String(params.get("source") || "").toLowerCase().trim();

const mode =
  String(params.get("mode") || "").toLowerCase().trim();

const isCreateMode =
  mode === "create" || (source === "projects" && !params.get("modalityId"));

const isEditMode =
  mode === "edit" || (source === "index" && !!params.get("modalityId"));

let modalityId =
  isCreateMode
    ? ""
    : (
        params.get("modalityId") ||
        (projectId ? localStorage.getItem(`${MODALITY_ID_KEY}_${projectId}`) : "") ||
        ""
      );

let currentModality =
  isCreateMode
    ? String(params.get("modality") || "").toUpperCase().trim()
    : String(
        params.get("modality") ||
        localStorage.getItem(projectId ? `${MODALITY_KEY}_${projectId}` : MODALITY_KEY) ||
        ""
      ).toUpperCase().trim();

if (!projectId) {
  alert("Missing project ID");
  throw new Error("No projectId");
}

localStorage.setItem(PROJECT_ID_KEY, projectId);

const backLink = document.getElementById("backLink");

function goBackTarget() {
  if (source === "index") {
    return `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
  }

  if (source === "projects") {
    return `equipmentprojects.html?projectId=${encodeURIComponent(projectId)}`;
  }

  if (document.referrer.includes("equipmentindex.html")) {
    return `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
  }

  return `equipmentprojects.html?projectId=${encodeURIComponent(projectId)}`;
}

backLink.href = goBackTarget();

backLink.addEventListener("click", function(e){
  e.preventDefault();
  location.href = goBackTarget();
});

let formData = {};
let dirtyFields = new Set();

/* ------------------ LOAD DATA ------------------ */

async function loadData(){
  try {
    if (isCreateMode && !modalityId) {
      formData = {};
      dirtyFields = new Set();

      if (currentModality) {
        formData.modality = currentModality;
        document.getElementById("modality").value = currentModality;
        triggerRender(currentModality);
      } else {
        document.getElementById("modality").value = "";
        document.getElementById("form-container").innerHTML = "";
      }
      return;
    }

    const qs = new URLSearchParams();
    qs.set("projectId", projectId);
    if (modalityId) qs.set("modalityId", modalityId);
    if (currentModality) qs.set("modality", currentModality);

    const res = await fetch(`/api/equipment-details?${qs.toString()}`, {
      headers: {
        "x-user-email": userEmail
      }
    });

    const json = await res.json().catch(() => ({}));

    formData = (json && json.data && typeof json.data === "object") ? json.data : {};
    dirtyFields = new Set();

    if (json?.modalityId) {
      modalityId = String(json.modalityId).trim();
      localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, modalityId);
    }

    if (json?.modality) {
      currentModality = String(json.modality).toUpperCase().trim();
    } else if (formData.modality) {
      currentModality = String(formData.modality).toUpperCase().trim();
    }

    if (currentModality) {
      formData.modality = currentModality;
      document.getElementById("modality").value = currentModality;
      localStorage.setItem(`${MODALITY_KEY}_${projectId}`, currentModality);
      triggerRender(currentModality);
      return;
    }

    document.getElementById("modality").value = "";
    document.getElementById("form-container").innerHTML = "";

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
}

/* ------------------ HELPERS ------------------ */

function group(title){
  const g = document.createElement("div");
  g.className = "group";
  g.innerHTML = `<div class="group-title">${title}</div>`;
  return g;
}

function field(label,key,value,type="text"){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const i = document.createElement("input");
  i.type = type;
  i.value = formData[key] || value || "";

  i.oninput = () => {
    formData[key] = i.value;
    dirtyFields.add(key);
  };

  d.appendChild(l);
  d.appendChild(i);
  return d;
}

function selectField(label,key,value,opts){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const s = document.createElement("select");

  const ph = document.createElement("option");
  ph.value = "";
  ph.textContent = "Select";
  s.appendChild(ph);

  opts.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = o;
    if (o === (formData[key] || value)) opt.selected = true;
    s.appendChild(opt);
  });

  s.onchange = () => {
    formData[key] = s.value;
    dirtyFields.add(key);
    runDependencyCheck(key);
  };

  d.appendChild(l);
  d.appendChild(s);
  return d;
}

function textarea(label,key,value){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const t = document.createElement("textarea");
  t.value = formData[key] || value || "";

  t.oninput = () => {
    formData[key] = t.value;
    dirtyFields.add(key);
  };

  d.appendChild(l);
  d.appendChild(t);
  return d;
}

/* ------------------ DEPENDENCY SYSTEM ------------------ */

const dependencies = [
  { controller: "ct_upgrades", dependent: "ct_upgrades_desc", showOn: "Yes" },
  { controller: "ct_injector", dependent: "ct_injector_model", showOn: "Yes" },
  { controller: "ct_in_use", dependent: "ct_out_of_use_date", showOn: "No" },
  { controller: "mri_in_use", dependent: "mri_out_of_use_date", showOn: "No" }
];

function runDependencyCheck(changedKey = null){
  dependencies.forEach(({controller, dependent, showOn}) => {
    if (changedKey && changedKey !== controller) return;

    const controllerEl = document.querySelector(`[data-key="${controller}"] select`);
    const dependentEl = document.querySelector(`[data-key="${dependent}"]`);

    if (!controllerEl || !dependentEl) return;

    const show = controllerEl.value === showOn;
    dependentEl.style.display = show ? "block" : "none";

    if (!show) {
      const input = dependentEl.querySelector("input, textarea, select");
      if (input) input.value = "";
      delete formData[dependent];
      dirtyFields.add(dependent);
    }
  });
}

/* ------------------ RENDER SWITCH ------------------ */

function triggerRender(m){
  if (m === "CT") renderCT();
  if (m === "MRI") renderMRI();
  if (m === "XRAY") renderXRAY();
  if (m === "CARM") renderCARM();
  if (m === "PETCT") renderPETCT();
}

/* ------------------ COMMON IDENTIFIER BLOCK ------------------ */

function appendCommonIdentifierFields(groupEl, serialKey){
  groupEl.appendChild(field("Serial Number", serialKey));
  groupEl.appendChild(field("Additional Identifier", "additional_identifier"));
}

/* ------------------ RENDERERS ------------------ */

function renderCT(){
  const fc = document.getElementById("form-container");
  fc.innerHTML = "";

  const g = group("CT Scanner");
  g.appendChild(field("Manufacturer","ct_manufacturer"));
  g.appendChild(field("Model","ct_model"));
  appendCommonIdentifierFields(g, "ct_serial");
  g.appendChild(field("Date Manufactured","ct_dom","", "date"));
  g.appendChild(field("Date Installed","ct_installed","", "date"));
  g.appendChild(field("# of Slices","ct_slices"));
  g.appendChild(field("Tube mAs / Scan/sec","ct_tube_mas"));
  g.appendChild(field("Tube Size (mHu)","ct_mhu"));
  g.appendChild(field("Tube DOM","ct_tube_dom","", "date"));
  g.appendChild(field("Tube Installation Date","ct_tube_installation_date","", "date"));
  g.appendChild(field("SW Version","ct_sw_version"));
  g.appendChild(field("GOC Version","ct_goc_version"));
  g.appendChild(selectField("Upgrades","ct_upgrades","",["Yes","No"]));
  g.appendChild(textarea("Upgrades Description","ct_upgrades_desc"));
  g.appendChild(selectField("Injector","ct_injector","",["Yes","No"]));
  g.appendChild(field("Injector Model","ct_injector_model"));
  g.appendChild(selectField("Chiller","ct_chiller","",["Yes","No"]));
  g.appendChild(selectField("System In Use","ct_in_use","",["Yes","No"]));
  g.appendChild(field("Date Removed From Service","ct_out_of_use_date","", "date"));

  fc.appendChild(g);
  runDependencyCheck();
}

function renderMRI(){
  const fc = document.getElementById("form-container");
  fc.innerHTML = "";

  const g = group("MRI System");
  g.appendChild(field("Manufacturer","mri_manufacturer"));
  g.appendChild(field("Model","mri_model"));
  appendCommonIdentifierFields(g, "mri_serial");
  g.appendChild(field("Year of Manufacture","mri_yom"));
  g.appendChild(field("Magnet Type","mri_magnet_type"));
  g.appendChild(field("Bore Size (cm)","mri_bore_size_cm"));
  g.appendChild(field("# Channels","mri_num_channels"));
  g.appendChild(field("Gradient","mri_gradient"));
  g.appendChild(field("SW Version","mri_sw_version"));
  g.appendChild(textarea("Coils","mri_coils"));
  g.appendChild(selectField("Service","mri_service","",["OEM","Biomed","3rd Party"]));
  g.appendChild(field("Service Company","mri_service_name"));
  g.appendChild(selectField("System In Use","mri_in_use","",["Yes","No"]));
  g.appendChild(field("Date Removed From Service","mri_out_of_use_date","", "date"));

  fc.appendChild(g);
  runDependencyCheck();
}

function renderXRAY(){
  const fc = document.getElementById("form-container");
  fc.innerHTML = "";

  const g = group("X-Ray System");
  g.appendChild(field("Manufacturer","xray_manufacturer"));
  g.appendChild(field("Model","xray_model"));
  appendCommonIdentifierFields(g, "xray_serial");
  g.appendChild(selectField("Floor Mounted","xray_floor_mounted","",["Yes","No"]));
  g.appendChild(selectField("Ceiling Mounted","xray_ceiling_mounted","",["Yes","No"]));

  fc.appendChild(g);
}

function renderCARM(){
  const fc = document.getElementById("form-container");
  fc.innerHTML = "";

  const g = group("C-Arm System");
  g.appendChild(field("Manufacturer","carm_manufacturer"));
  g.appendChild(field("Model","carm_model"));
  appendCommonIdentifierFields(g, "carm_serial");
  g.appendChild(selectField("Monitor Type","carm_monitors","",["Single","Dual","Flat Screen"]));
  g.appendChild(field("Image Intensifier Size","carm_image_intensifier"));

  fc.appendChild(g);
}

function renderPETCT(){
  const fc = document.getElementById("form-container");
  fc.innerHTML = "";

  const g = group("PET / CT System");
  g.appendChild(field("Manufacturer","pet_manufacturer"));
  g.appendChild(field("Model","pet_model"));
  appendCommonIdentifierFields(g, "pet_serial");
  g.appendChild(field("CT Slice Count","pet_ct_slices"));
  g.appendChild(field("Tube DOM","pet_tube_dom","", "date"));
  g.appendChild(field("Tube mAs / Scan/sec","pet_tube_mas"));

  fc.appendChild(g);
}

/* ------------------ MODALITY ------------------ */

document.getElementById("modality").onchange = function () {
  const m = String(this.value || "").toUpperCase().trim();

  currentModality = m;

  if (m) {
    localStorage.setItem(`${MODALITY_KEY}_${projectId}`, m);
  } else {
    localStorage.removeItem(`${MODALITY_KEY}_${projectId}`);
  }

  formData = { modality: m };
  dirtyFields = new Set(["modality"]);

  if (!m) {
    document.getElementById("form-container").innerHTML = "";
    return;
  }

  triggerRender(m);
};

/* ------------------ VALIDATION ------------------ */

function getEffectiveSerialValue(modality){
  const map = {
    CT: "ct_serial",
    MRI: "mri_serial",
    XRAY: "xray_serial",
    CARM: "carm_serial",
    PETCT: "pet_serial"
  };

  const key = map[modality] || "serial_number";
  return String(formData[key] || "").trim();
}

/* ------------------ SAVE ------------------ */

async function saveData(){
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.innerText = "Saving...";

  try {
    if (!currentModality && !formData.modality) {
      alert("Select modality");
      btn.disabled = false;
      btn.innerText = "Save & Submit Update";
      return;
    }

    const effectiveModality = String(formData.modality || currentModality || "").toUpperCase().trim();
    const serialValue = getEffectiveSerialValue(effectiveModality);
    const additionalIdentifier = String(formData.additional_identifier || "").trim();

    if (!serialValue && !additionalIdentifier) {
      alert("Enter either Serial Number or Additional Identifier.");
      btn.disabled = false;
      btn.innerText = "Save & Submit Update";
      return;
    }

    const payload = { ...formData, modality: effectiveModality };

    if (!dirtyFields.size && modalityId) {
      const target = new URL("equipmentimages.html", window.location.href);
      target.searchParams.set("projectId", projectId);
      if (modalityId) target.searchParams.set("modalityId", modalityId);
      target.searchParams.set("modality", effectiveModality);
      location.href = target.toString();
      return;
    }

    const res = await fetch("/api/equipment-details", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        projectId,
        modalityId,
        modality: effectiveModality,
        data: payload
      })
    });

    const json = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(json?.error || json?.message || "Save failed");
    }

    if (json?.modalityId) {
      modalityId = String(json.modalityId).trim();
      localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, modalityId);
    }

    localStorage.setItem(`${MODALITY_KEY}_${projectId}`, effectiveModality);

    const target = new URL("equipmentimages.html", window.location.href);
    target.searchParams.set("projectId", projectId);
    if (modalityId) target.searchParams.set("modalityId", modalityId);
    target.searchParams.set("modality", effectiveModality);
    location.href = target.toString();

  } catch (err) {
    console.error("SAVE ERROR:", err);
    alert(err?.message || "Network / server error");
    btn.disabled = false;
    btn.innerText = "Save & Submit Update";
  }
}

loadData();
</script>

</body>
</html>
