<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Equipment Details | Espin Medical</title>

<style>
:root{
  --blue:#1F7BC8;
  --blue-dark:#1666aa;
  --bg:#f5f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#d9e2ec;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --safe-top:env(safe-area-inset-top, 0px);
  --accent:#0f7bff;
}

/* ===== RESET ===== */
*{
  box-sizing:border-box;
  max-width:100%;
}

html{
  margin:0;
  padding:0;
  height:100%;
  background:#fff; /* 🔥 FIX bottom blue */
}

body{
  margin:0;
  padding:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overflow-x:hidden;
}
body::after{
  content:"";
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:env(safe-area-inset-bottom, 0px);
  background:var(--bg);
  z-index:999;
}
/* ===== HEADER (OVERLAY FIXED) ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;

  background:var(--blue);
  color:#fff;

  height:calc(var(--safe-top) + 64px);
  padding-top:var(--safe-top);

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:0 4px 18px rgba(0,0,0,.12);
}

.header-inner{
  position:relative;
  width:100%;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-title{
  font-size:20px;
  font-weight:800;
  letter-spacing:.2px;
  line-height:1;
  margin:0;
}

.back{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:32px;
  font-weight:700;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;  /* 🔥 FIX line */
  line-height:1;         /* 🔥 FIX baseline artifact */

  -webkit-tap-highlight-color:transparent;
}
/* ===== CONTENT (SLIDES UNDER HEADER) ===== */
.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;

  padding:calc(var(--safe-top) + 64px + 16px) 16px 110px;
}

/* ===== FORM ===== */
label{
  display:block;
  font-weight:700;
  margin:14px 0 8px;
  font-size:15px;
  color:#111827;
}

input,select,textarea{
  width:100%;
  padding:14px 16px;
  border:1px solid #cfd9e3;
  border-radius:14px;
  font-size:16px;
  background:#fff;
  color:#111827;
}

input[type="date"]{
  -webkit-appearance:none;
  appearance:none;
}

/* ===== GROUP ===== */
.group{
  border:1px solid #e6ecf2;
  border-radius:18px;
  padding:18px;
  margin-top:14px;
  background:#fff;
  overflow:hidden;
}

.group-title{
  font-weight:800;
  margin-bottom:10px;
  font-size:18px;
}

/* ===== BUTTONS ===== */
.button-row{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}

button{
  width:100%;
  background:var(--accent);
  color:#fff;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
}

button.secondary{
  background:#0f172a;
}

button:disabled{
  opacity:.65;
}

/* ===== SEND STATES ===== */
.send-btn{
  background:#6b7280 !important;
  border-radius:16px;
  padding:16px 18px;
  font-size:16px;
  font-weight:800;
}

.send-btn.success{
  background:#155c30 !important;
}

.send-spinner{
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,0.4);
  border-top:2px solid #fff;
  border-radius:50%;
  display:inline-block;
  animation:spin 0.7s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* ===== CHANGE HIGHLIGHT ===== */
.field-changed{
  border:2px solid #1F7BC8 !important;
  color:#1F7BC8 !important;
  font-weight:700;
}

.field-changed::placeholder{
  color:#1F7BC8;
}

.label-changed{
  color:#1F7BC8 !important;
  font-weight:800;
}
input[type="month"]{
  max-width:180px;
  display:block;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <a id="backLink" class="back" href="equipmentprojects.html" aria-label="Go back">
  ←
</a>
    <h1 class="header-title">Equipment Details</h1>

<div class="wrap">

 <option value="MAMMO">MAMMO</option>

  <div id="form-container"></div>

 <div class="button-row">

  <button id="sendEquipmentBtn" class="send-btn" onclick="sendEquipmentOnly()">

  <button id="downloadEquipmentBtn" class="secondary" onclick="downloadEquipment()" style="display:none;">

<div id="formError" style="
  color:red;
  font-weight:700;
  display:none;
  margin-top:10px;

">

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_KEY = `${APP_PREFIX}activeModality`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;

const userEmail = String(
  localStorage.getItem(EMAIL_KEY) ||
  localStorage.getItem("espinUserEmail") ||
  "info@espinmedical.com"
).toLowerCase().trim();
localStorage.setItem(AUTH_KEY, "true");
localStorage.setItem(EMAIL_KEY, userEmail);

const params = new URLSearchParams(location.search);
[
  "sales_rep_first",
  "sales_rep_last",
  "sales_rep_company",
  "sales_rep_phone",
  "sales_rep_email"
].forEach(key => {
  const value = params.get(key);
  if (value) {
    localStorage.setItem(`axis_${key}`, value);
  }
});
const AXIS_CONTEXT = {
  axis_record_id:
    params.get("axis_record_id") ||
    localStorage.getItem("axis_record_id") ||
    "",

  axis_parent_record_id:
    params.get("axis_parent_record_id") ||
    params.get("axis_record_id") ||
    localStorage.getItem("axis_parent_record_id") ||
    localStorage.getItem("axis_record_id") ||
    "",

  axis_project_id:
    params.get("axis_project_id") ||
    localStorage.getItem("axis_project_id") ||
    "",

  axis_serial_number:
    params.get("axis_serial_number") ||
    localStorage.getItem("axis_serial_number") ||
    "",

  axis_parent_project_type:
    params.get("axis_parent_project_type") ||
    localStorage.getItem("axis_parent_project_type") ||
    "",

  axis_parent_project_name:
    params.get("axis_parent_project_name") ||
    localStorage.getItem("axis_parent_project_name") ||
    "",

  axis_source:
    params.get("axis_source") ||
    localStorage.getItem("axis_source") ||
    "",

  sync_mode:
    params.get("sync_mode") ||
    localStorage.getItem("sync_mode") ||
    "",

  sales_rep_first:
    params.get("sales_rep_first") ||
    localStorage.getItem("axis_sales_rep_first") ||
    "",

  sales_rep_last:
    params.get("sales_rep_last") ||
    localStorage.getItem("axis_sales_rep_last") ||
    "",

  sales_rep_company:
    params.get("sales_rep_company") ||
    localStorage.getItem("axis_sales_rep_company") ||
    "",

  sales_rep_phone:
    params.get("sales_rep_phone") ||
    localStorage.getItem("axis_sales_rep_phone") ||
    "",

  sales_rep_email:
    params.get("sales_rep_email") ||
    localStorage.getItem("axis_sales_rep_email") ||
    ""
};
Object.entries(AXIS_CONTEXT).forEach(([key, value]) => {
  if (value) localStorage.setItem(key, value);
});

console.log("AXIS CONTEXT LOADED:", AXIS_CONTEXT);
function normalizeAxisHandoffModality(value) {
  const m = String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "");

  if (m === "CATH" || m === "CARM") return "CARM";
  if (m === "XRAY" || m === "XR") return "XRAY";
  if (m === "PETCT" || m === "PET") return "PETCT";
  if (m === "MAMMO" || m === "MAMOGRAPHY" || m === "MAMMOGRAPHY") return "MAMMO";
  if (m === "MRI") return "MRI";
  if (m === "CT") return "CT";

  return m;
}

function readAxisTradeInHandoffForDetails() {
  const params = new URLSearchParams(window.location.search);

  const source = String(params.get("source") || "").toLowerCase().trim();
  const hasAxisUrl =
    source === "axis" ||
    params.get("handoff") === "axis_tradein_handoff_v1" ||
    params.has("axis_record_id") ||
    params.has("axis_project_id");

  let handoff = null;

  const possibleKeys = [
    "axis_tradein_handoff_v1",
    `${APP_PREFIX}axisTradeInHandoff`
  ];

  for (const key of possibleKeys) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) continue;

      handoff = JSON.parse(raw);
      if (handoff && typeof handoff === "object") break;
    } catch (e) {
      console.warn("Invalid AXIS handoff key:", key, e);
    }
  }

  if (!handoff) {
    console.warn("No AXIS trade-in handoff found on Equipment Details page.", {
      source,
      hasAxisUrl,
      url: location.href,
      axis_tradein_handoff_v1: localStorage.getItem("axis_tradein_handoff_v1"),
      espinEquipment_axisTradeInHandoff: localStorage.getItem(`${APP_PREFIX}axisTradeInHandoff`)
    });
    return null;
  }

  console.log("AXIS handoff found on Equipment Details:", {
    source,
    hasAxisUrl,
    handoff
  });

  return handoff;
}
function applyAxisTradeInHandoffToFormData() {
  const handoff = readAxisTradeInHandoffForDetails();

  if (!handoff) return false;
console.log("RAW HANDOFF ABOUT TO APPLY:", handoff);
  const equipmentPayload =
    handoff.equipment_payload && typeof handoff.equipment_payload === "object"
      ? handoff.equipment_payload
      : {};

  const rawModality =
    handoff.modality ||
    equipmentPayload.modality ||
    "";

  const normalizedModality = normalizeAxisHandoffModality(rawModality);

  if (!normalizedModality) {
    console.warn("AXIS handoff has no usable modality:", handoff);
    return false;
  }

  const mappedData = {
    modality: normalizedModality,
    axis_lifecycle_project_id:
      handoff.axis_project_id ||
      handoff.axis_record_id ||
      ""
  };

  /*
    Direct same-name fields first.
    This handles CT/MRI/XRAY/PETCT if AXIS already sent matching IDs.
  */
  Object.entries(equipmentPayload).forEach(([key, value]) => {
    if (key === "modality") return;
    mappedData[key] = value || "";
  });

  /*
    CATH from AXIS maps to CARM in this Trade-In form.
  */
  if (rawModality && String(rawModality).toUpperCase().includes("CATH")) {
    mappedData.carm_manufacturer =
      equipmentPayload.cath_manufacturer ||
      handoff.make ||
      handoff.manufacturer ||
      "";

    mappedData.carm_model =
      equipmentPayload.cath_model ||
      handoff.model ||
      "";

    mappedData.carm_serial =
      equipmentPayload.cath_serial ||
      handoff.serial_number ||
      handoff.axis_serial_number ||
      "";

    mappedData.carm_hard_drive_removed =
      equipmentPayload.cath_hard_drive_removed ||
      "";

    mappedData.carm_availability_timeframe =
      equipmentPayload.cath_availability_timeframe ||
      "";
  }

  /*
    Generic fallbacks.
  */
  if (normalizedModality === "CT") {
    mappedData.ct_manufacturer = mappedData.ct_manufacturer || handoff.make || handoff.manufacturer || "";
    mappedData.ct_model = mappedData.ct_model || handoff.model || "";
    mappedData.ct_serial = mappedData.ct_serial || handoff.serial_number || handoff.axis_serial_number || "";
    mappedData.ct_dom = mappedData.ct_dom || handoff.dom || "";
  }

  if (normalizedModality === "MRI") {
    mappedData.mri_manufacturer = mappedData.mri_manufacturer || handoff.make || handoff.manufacturer || "";
    mappedData.mri_model = mappedData.mri_model || handoff.model || "";
    mappedData.mri_serial = mappedData.mri_serial || handoff.serial_number || handoff.axis_serial_number || "";
    mappedData.mri_yom = mappedData.mri_yom || handoff.dom || "";
  }

  if (normalizedModality === "XRAY") {
    mappedData.xray_manufacturer = mappedData.xray_manufacturer || handoff.make || handoff.manufacturer || "";
    mappedData.xray_model = mappedData.xray_model || handoff.model || "";
    mappedData.xray_serial = mappedData.xray_serial || handoff.serial_number || handoff.axis_serial_number || "";
  }

  if (normalizedModality === "PETCT") {
    mappedData.pet_manufacturer = mappedData.pet_manufacturer || handoff.make || handoff.manufacturer || "";
    mappedData.pet_model = mappedData.pet_model || handoff.model || "";
    mappedData.pet_serial = mappedData.pet_serial || handoff.serial_number || handoff.axis_serial_number || "";
    mappedData.pet_tube_dom = mappedData.pet_tube_dom || handoff.dom || "";
  }

  if (normalizedModality === "MAMMO") {
    mappedData.mamo_manufacturer = mappedData.mamo_manufacturer || handoff.make || handoff.manufacturer || "";
    mappedData.mamo_model = mappedData.mamo_model || handoff.model || "";
    mappedData.mamo_serial = mappedData.mamo_serial || handoff.serial_number || handoff.axis_serial_number || "";
    mappedData.mamo_dom = mappedData.mamo_dom || handoff.dom || "";
  }

  // Keep AXIS context alive for sync-back.
  AXIS_CONTEXT.axis_record_id = handoff.axis_record_id || AXIS_CONTEXT.axis_record_id || "";
  AXIS_CONTEXT.axis_parent_record_id = handoff.axis_parent_record_id || AXIS_CONTEXT.axis_parent_record_id || AXIS_CONTEXT.axis_record_id || "";
  AXIS_CONTEXT.axis_project_id = handoff.axis_project_id || AXIS_CONTEXT.axis_project_id || "";
  AXIS_CONTEXT.axis_serial_number = handoff.axis_serial_number || handoff.serial_number || AXIS_CONTEXT.axis_serial_number || "";
  AXIS_CONTEXT.axis_parent_project_type = handoff.axis_parent_project_type || AXIS_CONTEXT.axis_parent_project_type || "";
  AXIS_CONTEXT.axis_parent_project_name = handoff.axis_parent_project_name || AXIS_CONTEXT.axis_parent_project_name || "";
  AXIS_CONTEXT.axis_source = handoff.axis_source || AXIS_CONTEXT.axis_source || "existing_axis_equipment";
  AXIS_CONTEXT.sync_mode = handoff.sync_mode || AXIS_CONTEXT.sync_mode || "update_existing_axis_record";

  AXIS_CONTEXT.sales_rep_first = handoff.sales_rep_first || AXIS_CONTEXT.sales_rep_first || "";
  AXIS_CONTEXT.sales_rep_last = handoff.sales_rep_last || AXIS_CONTEXT.sales_rep_last || "";
  AXIS_CONTEXT.sales_rep_company = handoff.sales_rep_company || AXIS_CONTEXT.sales_rep_company || "";
  AXIS_CONTEXT.sales_rep_phone = handoff.sales_rep_phone || AXIS_CONTEXT.sales_rep_phone || "";
  AXIS_CONTEXT.sales_rep_email = handoff.sales_rep_email || AXIS_CONTEXT.sales_rep_email || "";

  Object.entries(AXIS_CONTEXT).forEach(([key, value]) => {
    if (value) localStorage.setItem(key, value);
  });

  currentModality = normalizedModality;
  formData = {
    ...formData,
    ...mappedData,
    modality: normalizedModality
  };

  dirtyFields = new Set(Object.keys(mappedData));

  localStorage.setItem(`${MODALITY_KEY}_${projectId}`, normalizedModality);

  console.log("AXIS handoff applied to Equipment Details:", {
    rawModality,
    normalizedModality,
    mappedData,
    handoff
  });

  return true;
}
const AXIS_DEMO_SYNC_ENABLED = true;
const ADMIN_DOWNLOAD_EXCEL_ENABLED = false;

const AXIS_TRADE_DESK_INBOX_KEY = "axis_trade_desk_inbox_v1";
const AXIS_MANAGER_PING_KEY = "axis_manager_sync_ping_v1";

const projectId =
  params.get("projectId") ||
  params.get("id") ||
  localStorage.getItem(PROJECT_ID_KEY) ||
  "";

const source =
  String(params.get("source") || "").toLowerCase().trim();

const mode =
  String(params.get("mode") || "").toLowerCase().trim();

const isCreateMode =
  mode === "create" || (source === "projects" && !params.get("modalityId"));

if (isCreateMode) {
  if ("scrollRestoration" in history) {
    history.scrollRestoration = "manual";
  }

  const bringModalitySelectionToTop = () => {
    window.scrollTo(0, 0);
  };

  bringModalitySelectionToTop();
  requestAnimationFrame(bringModalitySelectionToTop);
  window.addEventListener("pageshow", bringModalitySelectionToTop);
  window.setTimeout(bringModalitySelectionToTop, 120);
}

let modalityId =
  isCreateMode
    ? ""
    : (
        params.get("modalityId") ||
        (projectId ? localStorage.getItem(`${MODALITY_ID_KEY}_${projectId}`) : "") ||
        ""
      );

let currentModality =
  isCreateMode
    ? String(params.get("modality") || "").toUpperCase().trim()
    : String(
        params.get("modality") ||
        localStorage.getItem(projectId ? `${MODALITY_KEY}_${projectId}` : MODALITY_KEY) ||
        ""
      ).toUpperCase().trim();

const DETAILS_BADGE_STORAGE_KEY = `equipmentDetailsChanged:${projectId}`;

if (!projectId) {
  alert("Missing project ID");
  throw new Error("No projectId");
}

localStorage.setItem(PROJECT_ID_KEY, projectId);

const backLink = document.getElementById("backLink");
const saveBtn = document.getElementById("saveBtn");
const sendEquipmentBtn = document.getElementById("sendEquipmentBtn");

function goBackTarget() {
  if (source === "index") {
    return `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
  }
  if (source === "projects") {
    return `equipmentprojects.html?projectId=${encodeURIComponent(projectId)}`;
  }
  if (document.referrer.includes("equipmentindex.html")) {
    return `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
  }
  return `equipmentprojects.html?projectId=${encodeURIComponent(projectId)}`;
}

backLink.href = goBackTarget();

backLink.addEventListener("click", async function(e){
  e.preventDefault();

  try {
    const ADMIN_EMAIL = "info@espinmedical.com";
    const rowId = String(modalityId || "").trim();

    if (rowId) {
      await fetch("/api/kv-set", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          key: `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}:fields`,
          value: []
        }),

      });

  location.href = goBackTarget();
});
let formData = {};
let dirtyFields = new Set();

function normalizeKeys(arr){
  if (!Array.isArray(arr)) return [];
  return [...new Set(
    arr
      .map(v => String(v || "").trim())
      .filter(Boolean)
  )];
}

function readDetailsChangedMap(){
  try {
    const raw =
      sessionStorage.getItem(DETAILS_BADGE_STORAGE_KEY) ||
      localStorage.getItem(DETAILS_BADGE_STORAGE_KEY);

    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
  } catch {
    return {};
  }
}

function writeDetailsChangedMap(map){
  const safeMap = map && typeof map === "object" && !Array.isArray(map) ? map : {};
  const json = JSON.stringify(safeMap);

  try { sessionStorage.setItem(DETAILS_BADGE_STORAGE_KEY, json); } catch {}
  try { localStorage.setItem(DETAILS_BADGE_STORAGE_KEY, json); } catch {}

  console.log("[DETAILS PAGE] storage after save", {
    key: DETAILS_BADGE_STORAGE_KEY,
    json,
    session: sessionStorage.getItem(DETAILS_BADGE_STORAGE_KEY),
    local: localStorage.getItem(DETAILS_BADGE_STORAGE_KEY)
  });
}
async function applyChangedFieldStyling(){
  const ADMIN_EMAIL = "info@espinmedical.com";
  const rowId = String(modalityId || "").trim();

  if (!rowId) return;

  try {
    const res = await fetch("/api/kv-get", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        key: `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}:fields`
      })
    });

    const json = await res.json().catch(() => ({}));

    let changedFields = [];

    if (json?.value) {
      const parsed = typeof json.value === "string"
        ? JSON.parse(json.value)
        : json.value;

      if (Array.isArray(parsed)) {
        changedFields = parsed;
      }
    }

    const normalizeKey = (k) =>
      String(k || "")
        .replace(/^ct_|^mri_|^xray_|^carm_|^pet_|^nm_|^us_|^mammo_|^other_/i, "")
        .replace(/_/g, "")
        .toLowerCase()
        .trim();

    const changedSet = new Set(
      changedFields.map(normalizeKey)
    );

    document.querySelectorAll("[data-key]").forEach(wrapper => {
      const key = wrapper.dataset.key;
      const input = wrapper.querySelector("input, select, textarea");
      const label = wrapper.querySelector("label");

      if (!input || !key) return;

      const isChanged = changedSet.has(normalizeKey(key));

      if (isChanged) {
        input.classList.add("field-changed");
        if (label) label.classList.add("label-changed");
      } else {
        input.classList.remove("field-changed");
        if (label) label.classList.remove("label-changed");
      }
    });

  } catch (err) {
    console.error("applyChangedFieldStyling error", err);
  }
}

function initDownloadButton() {

function group(title){
  const g = document.createElement("div");
  g.className = "group";

  return g;
}

function field(label,key,value,type="text"){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const i = document.createElement("input");
  i.type = (type === "date") ? "month" : type;
  i.value = formData[key] || value || "";
  i.required = false;

  i.oninput = () => {
    formData[key] = i.value;
    dirtyFields.add(key);

    // 🔥 CLEAR RED WHEN EITHER FIELD HAS VALUE
    const modality = String(formData.modality || currentModality || "").toUpperCase().trim();

    const serialKeyMap = {
      CT: "ct_serial",
      MRI: "mri_serial",
      MAMMO: "mamo_serial",
      XRAY: "xray_serial",
      CARM: "carm_serial",
      PETCT: "pet_serial"
    };

    const serialKey = serialKeyMap[modality];

    const serialInput = document.querySelector(`[data-key="${serialKey}"] input`);
    const identifierInput = document.querySelector(`[data-key="additional_identifier"] input`);
    const errorEl = document.getElementById("formError");

    const serialVal = String(serialInput?.value || "").trim();
    const identifierVal = String(identifierInput?.value || "").trim();

    if (serialVal || identifierVal) {
      [serialInput, identifierInput].forEach(el => {
        if (el) el.style.border = "";
      });

      if (errorEl) errorEl.style.display = "none";
    }
  };

  d.appendChild(l);
  d.appendChild(i);
  return d;
}
function selectField(label,key,value,opts){
  const d = document.createElement("div");
  d.dataset.key = key;

  const l = document.createElement("label");
  l.textContent = label;

  const s = document.createElement("select");
  const ph = document.createElement("option");
  ph.value = "";
  ph.textContent = "Select";
  s.appendChild(ph);

  opts.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = o;
    if (o === (formData[key] || value)) opt.selected = true;
    s.appendChild(opt);
  });

  s.onchange = () => {
    formData[key] = s.value;
    dirtyFields.add(key);
    runDependencyCheck(key);
  };

  d.appendChild(l);
  d.appendChild(s);
  return d;
}

const dependencies = [
  { controller: "ct_upgrades", dependent: "ct_upgrades_desc", showOn: "Yes" },
  { controller: "ct_injector", dependent: "ct_injector_model", showOn: "Yes" },
  { controller: "ct_in_use", dependent: "ct_out_of_use_date", showOn: "No" },

  { controller: "mri_in_use", dependent: "mri_out_of_use_date", showOn: "No" },

  { controller: "mamo_in_use", dependent: "mamo_out_of_use_date", showOn: "No" }
];
function runDependencyCheck(changedKey = null){
  dependencies.forEach(({controller, dependent, showOn}) => {
    if (changedKey && changedKey !== controller) return;

    const controllerEl = document.querySelector(`[data-key="${controller}"] select`);
    const dependentEl = document.querySelector(`[data-key="${dependent}"]`);

    if (!controllerEl || !dependentEl) return;

    const show = controllerEl.value === showOn;
    dependentEl.style.display = show ? "block" : "none";

    if (!show) {
      const input = dependentEl.querySelector("input, textarea, select");
      if (input) input.value = "";
      delete formData[dependent];
      dirtyFields.add(dependent);
    }
  });
}

function getEffectiveSerialValue(modality){
  const map = {
  CT: "ct_serial",
  MRI: "mri_serial",
  MAMMO: "mamo_serial", // ✅ ADD THIS
  XRAY: "xray_serial",
  CARM: "carm_serial",
  PETCT: "pet_serial"
};

  const key = map[modality] || "serial_number";
  return String(formData[key] || "").trim();
}

function validateBeforeSave(){
  if (!currentModality && !formData.modality) {
    throw new Error("Select modality");
  }

  const effectiveModality = String(formData.modality || currentModality || "").toUpperCase().trim();
  const serialValue = getEffectiveSerialValue(effectiveModality);
  const additionalIdentifier = String(formData.additional_identifier || "").trim();

  const serialKeyMap = {
    CT: "ct_serial",
    MRI: "mri_serial",
    MAMMO: "mamo_serial",
    XRAY: "xray_serial",
    CARM: "carm_serial",
    PETCT: "pet_serial"
  };

  const serialKey = serialKeyMap[effectiveModality];
  const serialInput = document.querySelector(`[data-key="${serialKey}"] input`);
  const identifierInput = document.querySelector(`[data-key="additional_identifier"] input`);
  const errorEl = document.getElementById("formError");

  // 🔴 RESET FIRST
  [serialInput, identifierInput].forEach(el => {
    if (el) el.style.border = "";
  });
  if (errorEl) errorEl.style.display = "none";

  // 🔴 VALIDATION
  if (!serialValue && !additionalIdentifier) {
    if (serialInput) serialInput.style.border = "2px solid red";
    if (identifierInput) identifierInput.style.border = "2px solid red";

    if (errorEl) errorEl.style.display = "block";

    serialInput?.scrollIntoView({ behavior: "smooth", block: "center" });

    throw new Error("Missing identifier");
  }

  return {
    effectiveModality,
    payload: { ...formData, modality: effectiveModality }
  };
}

    winning_bidder: "",
    winning_bid_terms: "",
    winning_bid_selected_at: "",

    quote_sync_status: "Pending Bid",
    quote_id: newRecord.project_id || projectId,
    trade_in_credit: "",
    tradein_credit: "",

    crm_status: "New Trade-In Field Update",

    createdAt: new Date().toISOString()
  };

  const matchIndex = inbox.findIndex(r =>
    (
      tradeDeskRecord.axis_parent_record_id &&
      String(r.axis_parent_record_id || "") === String(tradeDeskRecord.axis_parent_record_id)
    ) ||
    (
      tradeDeskRecord.axis_record_id &&
      String(r.axis_record_id || "") === String(tradeDeskRecord.axis_record_id)
    ) ||
    (
      String(r.project_id || "") === String(tradeDeskRecord.project_id || "") &&
      String(r.modality_id || "") === String(tradeDeskRecord.modality_id || "") &&
      String(r.serial_number || "") === String(tradeDeskRecord.serial_number || "")
    )
  );

  if (matchIndex >= 0) {
    inbox[matchIndex] = {
      ...inbox[matchIndex],
      ...tradeDeskRecord,
      id: inbox[matchIndex].id,
      bids: inbox[matchIndex].bids || [],
      winningBid: inbox[matchIndex].winningBid || null,
      winning_bid_amount: inbox[matchIndex].winning_bid_amount || "",
      winning_bidder: inbox[matchIndex].winning_bidder || "",
      winning_bid_terms: inbox[matchIndex].winning_bid_terms || "",
      winning_bid_selected_at: inbox[matchIndex].winning_bid_selected_at || "",
      trade_in_credit: inbox[matchIndex].trade_in_credit || "",
      tradein_credit: inbox[matchIndex].tradein_credit || ""
    };
  } else {
    inbox.unshift(tradeDeskRecord);
  }

  localStorage.setItem(AXIS_TRADE_DESK_INBOX_KEY, JSON.stringify(inbox));
  localStorage.setItem("axis_trade_desk_demo_v1", JSON.stringify(inbox));
  localStorage.setItem(AXIS_MANAGER_PING_KEY, String(Date.now()));

  console.log("AXIS TRADE DESK SYNC RECORD:", tradeDeskRecord);

  return tradeDeskRecord;
}

async function sendEquipmentOnly() {
  if (
    sendEquipmentBtn.classList.contains("loading") ||
    sendEquipmentBtn.classList.contains("success")
  ) {
    return;
  }

  sendEquipmentBtn.classList.add("loading");
  sendEquipmentBtn.innerHTML = `<span class="send-spinner"></span> Sending...`;
  saveBtn.disabled = true;

  try {
    const result = await saveDetailsOnly();

    if (AXIS_DEMO_SYNC_ENABLED) {
      syncTradeInToAxisDemo(result);
      syncTradeInToAxisTradeDesk(result);
    }

    const res = await fetch("/api/send-equipment-emails", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        projectId,
        modalityId,
        changedFields: result.changedFields || []
      })
    });

    const json = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(json?.error || json?.message || "Failed to send equipment update");
    }

    sendEquipmentBtn.classList.remove("loading");
    sendEquipmentBtn.classList.add("success");
    sendEquipmentBtn.innerHTML = "Update Sent";

    setTimeout(() => {
      sendEquipmentBtn.classList.remove("success");
      sendEquipmentBtn.innerHTML = "Send Equipment Update Only";
      saveBtn.disabled = false;
    }, 3000);

  } catch (err) {
    console.error("SEND EQUIPMENT ONLY ERROR:", err);

    sendEquipmentBtn.classList.remove("loading");
    sendEquipmentBtn.classList.remove("success");
    sendEquipmentBtn.innerHTML = "Send Equipment Update Only";
    saveBtn.disabled = false;

    alert(err?.message || "Network / server error");
  }
}

/* ===============================
   AXIS → TRADE-IN PREFILL PATCH
   Append-only safety patch
=============================== */

function getAxisTradeInHandoffPatch() {
  try {
    const handoff = JSON.parse(localStorage.getItem("axis_tradein_handoff_v1") || "null");
    if (!handoff || typeof handoff !== "object") return null;
    if (String(handoff.source || "").toLowerCase() !== "axis") return null;
    return handoff;
  } catch {
    return null;
  }
}

function normalizeAxisHandoffModalityPatch(value) {
  let m = String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "");

  if (m === "CATH") m = "CARM";
  if (m === "CARMOBILE") m = "CARM";
  if (m === "XR") m = "XRAY";
  if (m === "XRAYSYSTEM") m = "XRAY";
  if (m === "PET") m = "PETCT";

  return m;
}

function setAxisFieldPatch(key, value) {
  if (!key) return;

  const finalValue = String(value || "").trim();

  if (!finalValue) return;

  formData[key] = finalValue;
  dirtyFields.add(key);

  const el = document.querySelector(
    `[data-key="${key}"] input, [data-key="${key}"] select, [data-key="${key}"] textarea`
  );

  if (el) {
    el.value = finalValue;
    el.dispatchEvent(new Event("input", { bubbles: true }));
    el.dispatchEvent(new Event("change", { bubbles: true }));
  }
}

function applyAxisTradeInPrefillPatch() {
  const handoff = getAxisTradeInHandoffPatch();

  if (!handoff) return false;

  const payload =
    handoff.equipment_payload && typeof handoff.equipment_payload === "object"
      ? handoff.equipment_payload
      : {};

  const modality = normalizeAxisHandoffModalityPatch(
    handoff.modality || payload.modality
  );

  if (!modality) return false;

  currentModality = modality;
  formData.modality = modality;
  dirtyFields.add("modality");

  localStorage.setItem(`${MODALITY_KEY}_${projectId}`, modality);

  const modalitySelect = document.getElementById("modality");
  if (modalitySelect) {
    modalitySelect.value = modality;
  }

  /*
    Force correct form section to exist.
    This is important because the page may load in blank create mode first.
  */
  triggerRender(modality);

  setTimeout(() => {
    setAxisFieldPatch(
      "axis_lifecycle_project_id",
      handoff.axis_project_id || handoff.project_identifier || handoff.axis_record_id || ""
    );

    if (modality === "MRI") {
      setAxisFieldPatch("mri_manufacturer", payload.mri_manufacturer || handoff.make || handoff.manufacturer);
      setAxisFieldPatch("mri_model", payload.mri_model || handoff.model);
      setAxisFieldPatch("mri_serial", payload.mri_serial || handoff.serial_number || handoff.serial || handoff.axis_serial_number);
      setAxisFieldPatch("mri_yom", payload.mri_yom || handoff.dom || handoff.year);
      setAxisFieldPatch("mri_in_use", payload.mri_in_use);
      setAxisFieldPatch("mri_hard_drive_removed", payload.mri_hard_drive_removed);
      setAxisFieldPatch("mri_availability_timeframe", payload.mri_availability_timeframe);
    }

    if (modality === "CT") {
      setAxisFieldPatch("ct_manufacturer", payload.ct_manufacturer || handoff.make || handoff.manufacturer);
      setAxisFieldPatch("ct_model", payload.ct_model || handoff.model);
      setAxisFieldPatch("ct_serial", payload.ct_serial || handoff.serial_number || handoff.serial || handoff.axis_serial_number);
      setAxisFieldPatch("ct_dom", payload.ct_dom || handoff.dom || handoff.year);
      setAxisFieldPatch("ct_in_use", payload.ct_in_use);
      setAxisFieldPatch("ct_loading_dock", payload.ct_loading_dock);
      setAxisFieldPatch("ct_hard_drive_removed", payload.ct_hard_drive_removed);
      setAxisFieldPatch("ct_availability_timeframe", payload.ct_availability_timeframe);
    }

    if (modality === "CARM") {
      setAxisFieldPatch("carm_manufacturer", payload.carm_manufacturer || payload.cath_manufacturer || handoff.make || handoff.manufacturer);
      setAxisFieldPatch("carm_model", payload.carm_model || payload.cath_model || handoff.model);
      setAxisFieldPatch("carm_serial", payload.carm_serial || payload.cath_serial || handoff.serial_number || handoff.serial || handoff.axis_serial_number);
      setAxisFieldPatch("carm_in_use", payload.carm_in_use || payload.cath_in_use);
      setAxisFieldPatch("carm_hard_drive_removed", payload.carm_hard_drive_removed || payload.cath_hard_drive_removed);
      setAxisFieldPatch("carm_availability_timeframe", payload.carm_availability_timeframe || payload.cath_availability_timeframe);
    }

    if (modality === "XRAY") {
      setAxisFieldPatch("xray_manufacturer", payload.xray_manufacturer || handoff.make || handoff.manufacturer);
      setAxisFieldPatch("xray_model", payload.xray_model || handoff.model);
      setAxisFieldPatch("xray_serial", payload.xray_serial || handoff.serial_number || handoff.serial || handoff.axis_serial_number);
      setAxisFieldPatch("xray_in_use", payload.xray_in_use);
      setAxisFieldPatch("xray_loading_dock", payload.xray_loading_dock);
      setAxisFieldPatch("xray_availability_timeframe", payload.xray_availability_timeframe);
    }

    if (modality === "PETCT") {
      setAxisFieldPatch("pet_manufacturer", payload.pet_manufacturer || handoff.make || handoff.manufacturer);
      setAxisFieldPatch("pet_model", payload.pet_model || handoff.model);
      setAxisFieldPatch("pet_serial", payload.pet_serial || handoff.serial_number || handoff.serial || handoff.axis_serial_number);
      setAxisFieldPatch("pet_tube_dom", payload.pet_tube_dom || handoff.dom || handoff.year);
      setAxisFieldPatch("pet_in_use", payload.pet_in_use);
      setAxisFieldPatch("pet_loading_dock", payload.pet_loading_dock);
      setAxisFieldPatch("pet_hard_drive_removed", payload.pet_hard_drive_removed);
      setAxisFieldPatch("pet_availability_timeframe", payload.pet_availability_timeframe);
    }

    if (modality === "MAMMO") {
      setAxisFieldPatch("mamo_manufacturer", payload.mamo_manufacturer || handoff.make || handoff.manufacturer);
      setAxisFieldPatch("mamo_model", payload.mamo_model || handoff.model);
      setAxisFieldPatch("mamo_serial", payload.mamo_serial || handoff.serial_number || handoff.serial || handoff.axis_serial_number);
      setAxisFieldPatch("mamo_dom", payload.mamo_dom || handoff.dom || handoff.year);
      setAxisFieldPatch("mamo_in_use", payload.mamo_in_use);
      setAxisFieldPatch("mamo_loading_dock", payload.mamo_loading_dock);
      setAxisFieldPatch("mamo_hard_drive_removed", payload.mamo_hard_drive_removed);
      setAxisFieldPatch("mamo_availability_timeframe", payload.mamo_availability_timeframe);
    }

    console.log("AXIS TRADE-IN PREFILL PATCH APPLIED:", {
      modality,
      handoff,
      formData,
      mri_manufacturer: document.querySelector('[data-key="mri_manufacturer"] input')?.value,
      mri_model: document.querySelector('[data-key="mri_model"] input')?.value,
      mri_serial: document.querySelector('[data-key="mri_serial"] input')?.value,
      carm_manufacturer: document.querySelector('[data-key="carm_manufacturer"] input')?.value,
      carm_model: document.querySelector('[data-key="carm_model"] input')?.value,
      carm_serial: document.querySelector('[data-key="carm_serial"] input')?.value
    });

    applyChangedFieldStyling();
  }, 250);

  return true;
}
/*
  First load normal saved project/equipment data.
  Then apply AXIS handoff prefill if this page was opened from AXIS.
*/
loadData().then(() => {
  setTimeout(() => {
    applyAxisTradeInPrefillPatch();
    applyChangedFieldStyling();
  }, 300);
});

/*
  Retry because Equipment-Details.html may render after async loadData(),
  especially on Safari/iPhone.
*/
let axisPrefillPatchTries = 0;
const axisPrefillPatchTimer = setInterval(() => {
  axisPrefillPatchTries += 1;

  const applied = applyAxisTradeInPrefillPatch();

  if (applied || axisPrefillPatchTries >= 20) {
    clearInterval(axisPrefillPatchTimer);
  }
}, 300);
