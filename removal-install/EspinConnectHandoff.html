<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Creating Espin Connect Project</title>
  <style>
    :root{
      --blue:#0066B2;
      --green:#2e7d32;
      --red:#b00020;
      --light:#f8f9fa;
      --text:#17202a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--light);
      color:var(--text);
    }
    .card{
      width:min(560px,100%);
      padding:28px;
      border-radius:18px;
      background:#fff;
      border:1px solid #e5e7eb;
      box-shadow:0 18px 50px rgba(0,0,0,.10);
    }
    h1{margin:0 0 12px;font-size:27px;color:var(--blue)}
    p{font-size:17px;line-height:1.5;margin:8px 0}
    .spinner{
      width:42px;height:42px;margin:22px auto;
      border:5px solid #dce7f1;border-top-color:var(--blue);
      border-radius:50%;animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .error h1{color:var(--red)}
    .success h1{color:var(--green)}
    button{
      width:100%;margin-top:16px;padding:14px;
      border:0;border-radius:12px;background:var(--blue);
      color:#fff;font-size:16px;font-weight:800;cursor:pointer;
    }
    pre{
      white-space:pre-wrap;overflow-wrap:anywhere;
      padding:12px;border-radius:10px;background:#f3f4f6;
      font-size:12px;color:#333;
    }
  </style>
</head>
<body>
  <main class="card" id="card">
    <h1>Creating Espin Connect project</h1>
    <p id="status">Please wait while the project is added to Espin Connect.</p>
    <div class="spinner" id="spinner"></div>
    <pre id="details" style="display:none"></pre>
    <button id="retryBtn" style="display:none">Try Again</button>
  </main>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const card = document.getElementById("card");
  const status = document.getElementById("status");
  const spinner = document.getElementById("spinner");
  const details = document.getElementById("details");
  const retryBtn = document.getElementById("retryBtn");

  const clean = value => String(value || "").trim();
  const boolParam = value => ["true","1","yes","on"].includes(clean(value).toLowerCase());

  function showError(message, extra) {
    card.classList.add("error");
    spinner.style.display = "none";
    retryBtn.style.display = "block";
    card.querySelector("h1").textContent = "Espin Connect sync failed";
    status.textContent = message || "The project could not be created.";
    if (extra) {
      details.style.display = "block";
      details.textContent = extra;
    }
  }

  async function createProject() {
    card.classList.remove("error","success");
    spinner.style.display = "block";
    retryBtn.style.display = "none";
    details.style.display = "none";
    card.querySelector("h1").textContent = "Creating Espin Connect project";
    status.textContent =
      clean(params.get("project_type")).toLowerCase() === "install"
        ? "Please wait while the installation project is added to Espin Connect."
        : "Please wait while the project is added to Espin Connect.";

    const storedEmail = clean(localStorage.getItem("espinUserEmail")).toLowerCase();
    const repEmail = clean(params.get("sales_rep_email") || storedEmail).toLowerCase();

    const projectType =
      clean(params.get("project_type")).toLowerCase() === "install"
        ? "install"
        : "disposal";

    const payload = {
      project_name:
        clean(params.get("project_name")) ||
        (projectType === "install"
          ? "ESPIN LINK Installation Project"
          : "ESPIN LINK Disposal Project"),
      site_address: clean(params.get("site_address")),
      zip_code: clean(params.get("zip_code")),
      equipment: clean(params.get("equipment")),
      modality: clean(params.get("modality")).toUpperCase() || "OTHER",
      magnet_event: clean(params.get("magnet_event")),
      disposal_required: boolParam(params.get("disposal_required")),
      sales_rep_first: clean(params.get("sales_rep_first")),
      sales_rep_last: clean(params.get("sales_rep_last")),
      sales_rep_company: clean(params.get("sales_rep_company")) || "ESPIN LINK",
      sales_rep_phone: clean(params.get("sales_rep_phone")),
      sales_rep_email: repEmail,
      contact_name: clean(params.get("contact_name")),
      contact_title: clean(params.get("contact_title")),
      contact_phone: clean(params.get("contact_phone")),
      contact_email: clean(params.get("contact_email")),
      project_type: projectType,
      source:
        projectType === "install"
          ? "espin_link_installation_project"
          : "espin_link_disposal_review"
    };

    try {
      const response = await fetch("/api/removal-install/projects", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(repEmail ? {"x-user-email": repEmail} : {})
        },
        body: JSON.stringify(payload)
      });

      const raw = await response.text();
      let result = null;
      try { result = raw ? JSON.parse(raw) : null; } catch {}

      if (!response.ok) {
        throw new Error(result?.error || result?.message || raw || `HTTP ${response.status}`);
      }

      const projectId = clean(result?.id || result?.projectId);
      if (!projectId) throw new Error("Project was created without a project ID.");

      localStorage.setItem("activeProjectId", projectId);

      card.classList.add("success");
      card.querySelector("h1").textContent = "Project created";
      status.textContent = "Opening the new project in Espin Connect…";

      const destination = new URL(
        "/removal-install/project_type.html",
        location.origin
      );

      destination.searchParams.set("projectId", projectId);
      destination.searchParams.set("id", projectId);
      destination.searchParams.set("created_type", projectType);
      destination.searchParams.set("source", "espin_link");
      destination.searchParams.set(
        "handoff",
        projectType === "install"
          ? "installation_project"
          : "disposal_review"
      );

      destination.searchParams.set(
        "axis_record_id",
        clean(params.get("axis_record_id"))
      );
      destination.searchParams.set(
        "axis_project_id",
        clean(params.get("axis_project_id"))
      );

      setTimeout(() => location.replace(destination.toString()), 500);
    } catch (error) {
      console.error("Espin Connect handoff failed:", error);
      showError(error?.message || "Load failed");
    }
  }

  retryBtn.addEventListener("click", createProject);
  createProject();
})();
</script>
</body>
</html>
