<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Espin Medical – Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const KEEP_KEY = `${APP_PREFIX}keepSignedIn`;

(() => {
  const auth = localStorage.getItem(AUTH_KEY);
  const email = localStorage.getItem(EMAIL_KEY);
  if (auth !== "true" || !email) {
    location.replace("equipmentindex.html");
  }
})();
</script>

<style>
:root{
  --blue:#0066B2;
  --blue-dark:#004f8a;
  --blue-light:#1a7fd1;
  --gray:#666;
  --logout-top:#4f6f8f;
  --logout-bottom:#3b5874;
  --logout-shadow:#2a4156;
  --logout-gap:40px;
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#fff;
}

#container{
  max-width:400px;
  margin:0 auto;
  padding:60px 20px 110px;
  text-align:center;
  display:flex;
  flex-direction:column;
  height:100%;
}

.logo-container{
  margin:20px 0 50px;
  padding:10px;
  display:flex;
  justify-content:center;
}

.logo-container img{
  width:100%;
  max-width:320px;
}

p{
  font-size:16px;
  line-height:1.4;
  color:#333;
  margin:0 0 40px;
}

.link{
  color:var(--blue);
  font-weight:700;
  text-decoration:none;
}

.btn-wrapper{
  display:block;
  margin-bottom:20px;
  text-decoration:none;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  font-size:18px;
  font-weight:600;
  color:#fff;
  background:linear-gradient(var(--blue-light),var(--blue));
  border:none;
  box-shadow:0 5px 0 var(--blue-dark),0 8px 15px rgba(0,0,0,.15);
  cursor:pointer;
}

.logout-wrapper{
  margin-top:var(--logout-gap);
}

.btn-logout{
  width:100%;
  padding:10px;
  font-size:14px;
  font-weight:600;
  border-radius:10px;
  background:linear-gradient(var(--logout-top),var(--logout-bottom));
  box-shadow:0 4px 0 var(--logout-shadow),0 6px 12px rgba(0,0,0,.15);
  color:#fff;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fdfdfd;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:8px 0 calc(12px + env(safe-area-inset-bottom));
}

.nav a{
  flex:1;
  text-align:center;
  font-size:12px;
  color:var(--gray);
  text-decoration:none;
}

.nav a.active{
  color:var(--blue);
  font-weight:700;
}

.nav-icon{
  font-size:20px;
  display:block;
}
</style>
</head>

<body>

<div id="container">

<div class="logo-container">
<img src="/Espin main Logo.png" alt="Espin Medical Logo">
</div>

<p>
Welcome to Espin Medical
your trusted partner for imaging equipment purchase, removal, and disposal.
</p>

<a href="tel:+12067551768" class="btn btn-wrapper">📞 Call Espin</a>

<a href="sms:+12067551768" class="btn-wrapper">
<button class="btn">💬 Text Espin</button>
</a>

<a href="mailto:info@espinmedical.com" class="btn-wrapper">
<button class="btn">✉️ E-Mail Espin</button>
</a>

<div class="logout-wrapper">
<button class="btn btn-logout" id="logoutBtn">🚪 Log Out</button>
</div>

</div>

<div class="nav">
<a href="Home.html" class="active">
<span class="nav-icon">🏠</span>
Home
</a>

<a href="equipmentprojects.html">
<span class="nav-icon">🛠</span>
Projects
</a>
</div>

<script>
document.getElementById("logoutBtn").onclick=()=>{
  localStorage.removeItem(AUTH_KEY);
  localStorage.removeItem(EMAIL_KEY);
  localStorage.removeItem(KEEP_KEY);
  location.replace("equipmentindex.html");
};
</script>

</body>
</html>
