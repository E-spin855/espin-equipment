<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script>
document.title = "";
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script>
(() => {
  if (localStorage.getItem("espinAuth") !== "true") {
    location.replace("index.html");
  }
})();
</script>

<style>
:root{
  --blue:#1F7BC8;
  --gray:#777;
  --bg:#f6f6f6;
  --danger:#d93025;
}

/* LOCK PAGE */
html, body{
  margin:0;
  padding:0;
  min-height:100%;
  overflow-x:hidden;
  overscroll-behavior:none;
}

body{
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background:#fff;
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
}

.header{
  background:var(--blue);
  color:#fff;
  padding:calc(18px + env(safe-area-inset-top)) 16px 18px 16px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.header h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  text-align:center;
}

/* hide title until loaded */
#projectName{
  opacity:0;
  transition:opacity .15s ease;
}

.header a{
  position:absolute;
  left:16px;
  top:calc(50% + env(safe-area-inset-top)/2);
  transform:translateY(-50%);
  color:#fff;
  text-decoration:none;
  font-size:32px;
  font-weight:700;
  line-height:1;
}

.container{
  max-width:420px;
  margin:0 auto;
  padding:20px;
}

.section-title{
  font-size:22px;
  font-weight:700;
  margin:18px 0;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.sub{
  font-size:18px;
  font-weight:800;
  color:var(--blue);
}

.value{
  font-size:16px;
  font-weight:600;
  color:var(--blue);
}

.btn{
  width:100%;
  padding:14px;
  margin:10px 0;
  font-size:16px;
  font-weight:700;
  color:#fff;
  background:var(--blue);
  border:none;
  border-radius:14px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  position:relative;
}
.btn.secondary { background: #0a74c9; }
.btn.disabled { background: #ccc !important; color: #777 !important; cursor: not-allowed; pointer-events: none; }
.badge-dot {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: #ff3b30;
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 999px;
  display: none;
  line-height: 1;
  letter-spacing: .4px;
  box-shadow: 0 3px 8px rgba(0,0,0,.25);
}

.archive-banner {
  background: #f2f2f2; border: 1px solid #ddd; color: #444; padding: 14px;
  border-radius: 14px; margin-bottom: 18px; font-weight: 800; display: none; align-items: center; gap: 10px;
}
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;

  background:#fff;
  display:flex;
  border-top:1px solid #ddd;

  padding:10px 0;
  z-index:2000;
}

.nav a{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:var(--gray);
  font-size:12px;
}

.nav a.active{
  color:var(--blue);
  font-weight:800;
}
</style>
</head>

<body>

<div class="header">
  <a href="Projects.html" onclick="localStorage.removeItem('activeProjectId')">←</a>
  <h1 id="projectName"></h1>
</div>

<div class="container">
  <div id="archiveBanner" class="archive-banner">🔒 Project archived (Read-Only)</div>

  <div class="section-title">Project Management</div>
  <div class="row"><div class="sub">Project Manager</div><div id="pmName" class="value">—</div></div>
  <button class="btn" id="callPmBtn">📞 Call PM</button>
  <button class="btn secondary" id="textPmBtn">💬 Text PM</button>

  <div class="section-title">De-Installation Team</div>
  <div class="row"><div class="sub">Team Leader</div><div id="tlName" class="value">—</div></div>
  <button class="btn" id="callTlBtn">📞 Call Leader</button>
  <button class="btn secondary" id="textTlBtn">💬 Text Leader</button>

  <button class="btn" id="detailsBtn">⚡ Project Details <span id="detailsBadge" class="badge-dot">NEW</span></button>
  <button class="btn secondary" id="imagesBtn">🖼 Project Images <span id="imagesBadge" class="badge-dot">NEW</span></button>
<button class="btn" id="manageUsersBtn">👥 Add / Manage Users</button>
</div>

<div class="nav">
  <a href="Home.html">🏠<br>Home</a>
  <a href="Projects.html" style="color:var(--blue);font-weight:700;">🛠<br>Projects</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const API_BASE = "https://espin-medical-app.vercel.app";
  const params = new URLSearchParams(location.search);

  const projectId =
    params.get("id") ||
    params.get("projectId") ||
    localStorage.getItem("activeProjectId");

  let userEmail = localStorage.getItem("espinUserEmail");

  if (!projectId || !userEmail) {
    console.error("CRITICAL ERROR: ID or Email missing", { projectId, userEmail });
    alert("Project reference lost. Returning to list.");
    location.href = "Projects.html";
    return;
  }

  localStorage.setItem("activeProjectId", projectId);
  userEmail = userEmail.toLowerCase().trim();

  let pmPhone = "";
  let tlPhone = "";

  /* ───────────────────────────────
     NAVIGATION (DO NOT CLEAR IMAGES HERE)
     - tasks can be cleared here (optional)
     - images must be cleared ONLY inside ProjectImages.html when user exits
  ─────────────────────────────── */
 async function clearAndGo(url, type) {
  try {
    await fetch(`${API_BASE}/api/project-mark-read`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail,
        "x-clear-source": "management"
      },
      body: JSON.stringify({
        projectId: projectId,
        type: type
      }),
      keepalive: true
    });
  } catch (e) {
    console.warn("mark-read failed:", e);
  }

  window.location.href = url;
}

 /* Buttons */

document.getElementById("detailsBtn").onclick = () =>
  clearAndGo(`ProjectDetails.html?id=${projectId}`, "tasks");

document.getElementById("imagesBtn").onclick = async () => {
  try {
    await fetch(`${API_BASE}/api/project-mark-read`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail,
        "x-clear-source": "management"
      },
      body: JSON.stringify({
        projectId: projectId,
        type: "images"
      }),
      keepalive: true
    });

    await fetch(`${API_BASE}/api/ios-clear-badge`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      keepalive: true
    });

  } catch (e) {
    console.warn("Image badge clear failed:", e);
  }

  setTimeout(() => {
    window.location.href = `ProjectImages.html?id=${projectId}`;
  }, 300);
};
document.getElementById("manageUsersBtn").onclick = () => {
  window.location.href = `https://espin-medical-app.vercel.app/AdminProjectContacts.html?id=${projectId}`;
};
document.getElementById("callPmBtn").onclick = () => {
  if (pmPhone) location.href = `tel:${pmPhone}`;
};

document.getElementById("textPmBtn").onclick = () => {
  if (pmPhone) location.href = `sms:${pmPhone}`;
};

document.getElementById("callTlBtn").onclick = () => {
  if (tlPhone) location.href = `tel:${tlPhone}`;
};

document.getElementById("textTlBtn").onclick = () => {
  if (tlPhone) location.href = `sms:${tlPhone}`;
};
  /* ───────────────────────────────
     LOAD PROJECT DATA
  ─────────────────────────────── */
  async function loadData() {
    try {
      const pr = await fetch(`${API_BASE}/api/projects?id=${projectId}`, {
        headers: { "x-user-email": userEmail }
      });

      if (pr.ok) {
        let p = await pr.json();
        if (Array.isArray(p)) p = p[0] || {};
const title = document.getElementById("projectName");

title.textContent = p.project_name || "";
document.title = p.project_name || "";

title.style.opacity = "1";

        if (p.project_completed) {
          document.getElementById("archiveBanner").style.display = "flex";
          ["callPmBtn","textPmBtn","callTlBtn","textTlBtn"]
            .forEach(id => document.getElementById(id).classList.add("disabled"));
        }
      }

      const cr = await fetch(
        `${API_BASE}/api/project-contacts/management?projectId=${projectId}`,
        { headers: { "x-user-email": userEmail } }
      );

      if (cr.ok) {
        const d = await cr.json();

        const pmData = d.contacts.find(c => c.role === "project_manager");
        const tlData = d.contacts.find(c => c.role === "team_leader");

        document.getElementById("pmName").textContent = pmData?.full_name || "—";
        document.getElementById("tlName").textContent = tlData?.full_name || "—";

        pmPhone = pmData?.phone;
        tlPhone = tlData?.phone;
      }
    } catch (e) {
      console.error("UI Load failed:", e);
    }
  }

  /* ───────────────────────────────
     LOAD BADGES (DOTS)
     - shows NEW on management page
     - does NOT clear anything
  ─────────────────────────────── */
  async function loadBadges() {
    try {
      const [taskRes, imageRes] = await Promise.all([
        fetch(`${API_BASE}/api/kv-get?key=project:unread:${projectId}:${userEmail}`),
        fetch(`${API_BASE}/api/kv-get?key=project:unread_images:${projectId}:${userEmail}`)
      ]);

      if (taskRes.ok) {
        const t = await taskRes.json();
        if ((t.value || 0) > 0)
          document.getElementById("detailsBadge").style.display = "block";
      }

      if (imageRes.ok) {
        const i = await imageRes.json();
        if ((i.value || 0) > 0)
          document.getElementById("imagesBadge").style.display = "block";
      }
    } catch (e) {
      console.warn("Badge check failed:", e);
    }
  }

  loadData();
  loadBadges();
});

</script>
<script>
/* =========================================
   AUTO REFRESH WHEN APP RETURNS FROM PUSH
   ========================================= */

let espinLastRefresh = Date.now();

function espinAutoRefresh() {
  const now = Date.now();

  /* prevent rapid loops */
  if (now - espinLastRefresh < 2000) return;

  espinLastRefresh = now;

  console.log("ESPIN AUTO REFRESH");

  location.reload();
}

/* iOS PWA / Safari resume */
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    espinAutoRefresh();
  }
});

/* browser focus */
window.addEventListener("focus", espinAutoRefresh);

/* iOS PWA resume */
window.addEventListener("pageshow", espinAutoRefresh);
</script>
</body>
</html>
