<!-- FILE: bidder_portal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AXIS Bidder Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#07111f;
  color:#eef6ff;
  margin:0;
  padding:20px;
}

h1,h2,h3{
  margin:0 0 12px;
}

.panel{
  background:#0b1830;
  border:1px solid #23415f;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.card{
  background:#101f38;
  border:1px solid #2b4a68;
  border-radius:14px;
  padding:16px;
  margin:12px 0;
}

.package-card{
  background:#101f38;
  border:1px solid #2b4a68;
  border-radius:14px;
  padding:16px;
  margin:12px 0;
}

.package-card.open{
  border:2px solid #1d8cff;
  box-shadow:0 0 22px rgba(29,140,255,.25);
}

input,textarea,button{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #345;
  color:#fff;
  background:#10233f;
  font-size:16px;
}

textarea{
  min-height:95px;
  resize:vertical;
}

button{
  background:#1d8cff;
  cursor:pointer;
  border:none;
  font-weight:bold;
}

button.green{
  background:#18a558;
}

button.secondary{
  background:#263f5f;
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.small{
  color:#9db6d2;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  background:#263f5f;
  margin:4px 4px 4px 0;
  font-size:13px;
  font-weight:800;
}

.blue{background:#1d8cff}
.greenBadge{background:#18a558}
.gold{background:#b8860b}
.redBadge{background:#c0392b}

.kv{
  margin:7px 0;
  font-size:15px;
}

.kv strong{
  color:#ffffff;
}

hr{
  border:0;
  border-top:1px solid #2b4a68;
  margin:18px 0;
}

.package-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin-top:12px;
}

.package-box{
  border:1px solid #2b4a68;
  background:#07111f;
  border-radius:12px;
  padding:12px;
}

.package-box strong{
  display:block;
  margin-bottom:6px;
}

.image-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:8px;
}

.image-box{
  border:1px solid #2b4a68;
  border-radius:10px;
  padding:6px;
  background:#07111f;
  width:150px;
}

.image-box img{
  width:100%;
  height:105px;
  object-fit:cover;
  border-radius:8px;
  display:block;
}

.success-box{
  display:none;
  background:rgba(24,165,88,.14);
  border:1px solid rgba(24,165,88,.55);
  color:#b9ffd6;
  padding:14px;
  border-radius:12px;
  margin:14px 0;
  font-weight:800;
}

.error-box{
  display:none;
  background:rgba(192,57,43,.14);
  border:1px solid rgba(192,57,43,.55);
  color:#ffd1d1;
  padding:14px;
  border-radius:12px;
  margin:14px 0;
  font-weight:800;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:14px;
}

.package-head{
  display:grid;
  grid-template-columns:1.4fr .7fr .7fr .7fr;
  gap:12px;
  align-items:center;
}

.package-title{
  font-size:17px;
  font-weight:900;
}

.package-actions{
  min-width:140px;
}

.deadline-box{
  background:linear-gradient(90deg,#064e3b,#059669,#10b981);
  border:2px solid #34d399;
  color:#ecfdf5;
  padding:14px;
  border-radius:12px;
  font-weight:900;
  margin:12px 0;
  box-shadow:0 0 24px rgba(16,185,129,.45);
  text-shadow:0 0 8px rgba(52,211,153,.45);
}

.form-title{
  color:#ffffff;
  font-weight:900;
  margin-top:8px;
}

@media(max-width:900px){
  .package-head{
    grid-template-columns:1fr;
  }

  .top-bar{
    flex-direction:column;
  }
}
.image-preview-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  padding:20px;
}

.image-preview-box{
  width:100%;
  max-width:900px;
  max-height:90vh;
  background:#0b1830;
  border:1px solid #2b4a68;
  border-radius:18px;
  padding:16px;
  box-shadow:0 20px 70px rgba(0,0,0,.55);
}

.image-preview-box img{
  width:100%;
  max-height:72vh;
  object-fit:contain;
  border-radius:12px;
  background:#07111f;
  display:block;
}

.image-preview-title{
  margin-top:12px;
  color:#eef6ff;
  font-size:18px;
  font-weight:900;
}

.image-preview-close{
  margin-top:12px;
  background:#1d8cff;
  color:#fff;
}
</style>
</head>

<body>

<div class="top-bar">
  <div>
    <h1>AXIS Bidder Portal</h1>
    <p class="small">
      Authorized bidder view. Open an assigned package and submit your bid. Other bidders cannot see your amount.
    </p>
  </div>
</div>

<div id="packageRoot"></div>
<div id="imagePreviewOverlay" class="image-preview-overlay" onclick="closeImagePreview()">
  <div class="image-preview-box" onclick="event.stopPropagation();">
    <img id="imagePreviewImg" src="" alt="Image preview">
    <div id="imagePreviewTitle" class="image-preview-title"></div>
    <button class="image-preview-close" onclick="closeImagePreview()">Close Preview</button>
  </div>
</div>
<script>
const TRADE_DESK_KEY = "axis_trade_desk_demo_v1";
const TRADEIN_SYNC_KEY = "axis_tradein_sync_records_v1";
const LAST_SYNC_KEY = "axis_tradein_last_sync_v1";
const MANAGER_PING_KEY = "axis_manager_sync_ping_v1";
const BIDDER_PORTAL_KEY = "axis_bidder_portal_packages_v1";

const params = new URLSearchParams(window.location.search);

const packageIdFromUrl = params.get("packageId") || "";
const recordIdFromUrl = params.get("recordId") || "";

const approvedBidderCompany =
  params.get("company") ||
  localStorage.getItem("axis_bidder_company_v1") ||
  "Espin Medical";

const approvedBidderEmail =
  params.get("email") ||
  localStorage.getItem("axis_bidder_email_v1") ||
  "info@espinmedical.com";

localStorage.setItem("axis_bidder_company_v1", approvedBidderCompany);
localStorage.setItem("axis_bidder_email_v1", approvedBidderEmail);

let openPackageId = "";
let activeRecordId = "";
let userManuallyClosedPackage = false;
const bidDrafts = {};

function uid(prefix){
  return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
}

function htmlSafe(v){
  return String(v || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
function openImagePreview(url, title){
  const overlay = document.getElementById("imagePreviewOverlay");
  const img = document.getElementById("imagePreviewImg");
  const titleEl = document.getElementById("imagePreviewTitle");

  if (!overlay || !img || !titleEl) return;

  img.src = url || "";
  titleEl.textContent = title || "Equipment Image";
  overlay.style.display = "flex";
}

function closeImagePreview(){
  const overlay = document.getElementById("imagePreviewOverlay");
  const img = document.getElementById("imagePreviewImg");

  if (img) img.src = "";
  if (overlay) overlay.style.display = "none";
}
function idSafe(v){
  return String(v || "").replace(/[^a-zA-Z0-9_-]/g, "_");
}

function money(n){
  return "$" + Number(n || 0).toLocaleString();
}

function loadArray(key){
  try {
    const data = JSON.parse(localStorage.getItem(key) || "[]");
    return Array.isArray(data) ? data : [];
  } catch {
    return [];
  }
}

function saveArray(key, data){
  localStorage.setItem(key, JSON.stringify(Array.isArray(data) ? data : []));
}

function getBidPackageId(rec){
  return String(
    rec.bid_package_id ||
    `PKG-${String(rec.modality || "EQ").toUpperCase()}-${String(rec.serial_number || rec.axis_serial_number || rec.id || Date.now()).replace(/[^a-z0-9]/gi,"").slice(-8)}`
  );
}

function getBidDeadline(rec){
  return String(
    rec.bid_deadline ||
    rec.bidding_ends_at ||
    rec.bid_package?.bid_deadline ||
    rec.bid_package?.bidding_ends_at ||
    rec.bid_expires_at ||
    ""
  ).trim();
}

function formatBidDeadline(rec){
  const raw = getBidDeadline(rec);

  if (!raw) return "Not set";

  const d = new Date(raw);

  if (!Number.isNaN(d.getTime())) {
    return d.toLocaleString();
  }

  return raw;
}

function getOpenPackages(){
  const records = loadArray(TRADE_DESK_KEY);

  return records.filter(r =>
    r.bidder_portal_visible === true ||
    r.bid_package_open === true ||
    String(r.bid_status || "") === "Open for Bids" ||
    String(r.bid_status || "") === "Bids Received"
  );
}

function getVisiblePackages(){
  const openPackages = getOpenPackages();

  if (recordIdFromUrl) {
    return openPackages.filter(r => String(r.id || "") === String(recordIdFromUrl));
  }

  if (packageIdFromUrl) {
    return openPackages.filter(r =>
      String(r.bid_package_id || "") === String(packageIdFromUrl) ||
      String(getBidPackageId(r)) === String(packageIdFromUrl)
    );
  }

  return openPackages;
}

function isBidFormFocused(){
  const active = document.activeElement;

  return (
    active &&
    (
      active.id?.startsWith("bidderCompany_") ||
      active.id?.startsWith("bidAmount_") ||
      active.id?.startsWith("bidTerms_") ||
      active.id?.startsWith("bidExpires_")
    )
  );
}

function getDraft(recordId){
  if (!bidDrafts[recordId]) {
    bidDrafts[recordId] = {
      bidder_company: approvedBidderCompany,
      amount: "",
      terms: "",
      expires: ""
    };
  }

  return bidDrafts[recordId];
}

function syncDraftFromInputs(recordId){
  const safeId = idSafe(recordId);
  const draft = getDraft(recordId);

  draft.bidder_company = String(document.getElementById(`bidderCompany_${safeId}`)?.value || draft.bidder_company || "").trim();
  draft.amount = String(document.getElementById(`bidAmount_${safeId}`)?.value || draft.amount || "").trim();
  draft.terms = String(document.getElementById(`bidTerms_${safeId}`)?.value || draft.terms || "").trim();
  draft.expires = String(document.getElementById(`bidExpires_${safeId}`)?.value || draft.expires || "").trim();
}

function togglePackage(recordId){
  const id = String(recordId || "").trim();
  if (!id) return;

  if (openPackageId === id) {
    openPackageId = "";
    userManuallyClosedPackage = true;
    render();
    return;
  }

  openPackageId = id;
  userManuallyClosedPackage = false;
  render();
}

function imageHtml(rec){
  if (!Array.isArray(rec.images) || !rec.images.length) {
    return `<p class="small">No images included yet.</p>`;
  }

  return `
    <div class="image-row">
      ${rec.images.map(img => {
        const url = htmlSafe(img.url || "");
        const title = htmlSafe(img.title || img.type || "Equipment Image");

        return `
          <div class="image-box" onclick="openImagePreview('${url}', '${title}')" style="cursor:pointer;">
            <img src="${url}" alt="${title}">
            <div class="small">${title}</div>
            <div class="small" style="color:#41ff9c;font-weight:800;margin-top:4px;">
              Click to preview
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}
function tradeInFieldRows(rec){
  const getV = (...keys) => {
    for (const key of keys) {
      const v = rec[key];
      if (v !== undefined && v !== null && String(v).trim() !== "") return v;
    }
    return "";
  };

  const yesNo = (v) => {
    const s = String(v || "").trim().toLowerCase();
    if (["yes", "y", "true", "1"].includes(s)) return "Yes";
    if (["no", "n", "false", "0"].includes(s)) return "No";
    return v;
  };

  const shouldShow = (key, value) => {
    const isYes = (v) => ["y", "yes", "true", "1"].includes(String(v ?? "").trim().toLowerCase());
    const isNo = (v) => ["n", "no", "false", "0"].includes(String(v ?? "").trim().toLowerCase());

    if (key === "ct_injector_model") return isYes(getV("ct_injector"));
    if (key === "ct_upgrades_desc") return isYes(getV("ct_upgrades"));
    if (key === "ct_out_of_use_date") return isNo(getV("ct_in_use", "in_use_status", "tradein_in_use_status"));

    if (key === "mri_service_name") return isYes(getV("mri_service"));
    if (key === "mri_out_of_use_date") return isNo(getV("mri_in_use", "in_use_status", "tradein_in_use_status"));

    if (key === "xray_out_of_use_date") return isNo(getV("xray_in_use", "in_use_status", "tradein_in_use_status"));

    if (key === "carm_service_name") return isYes(getV("carm_servicing"));
    if (key === "carm_out_of_use_date") return isNo(getV("carm_in_use", "in_use_status", "tradein_in_use_status"));

    if (key === "pet_out_of_use_date") return isNo(getV("pet_in_use", "in_use_status", "tradein_in_use_status"));

    if (key === "mamo_out_of_use_date") return isNo(getV("mamo_in_use", "in_use_status", "tradein_in_use_status"));

    return value !== undefined && value !== null && String(value).trim() !== "";
  };

  const city = getV("city");
  const state = getV("state");
  const zip = getV("zip_code", "zip");
  const location = [city, state, zip].filter(Boolean).join(" ");

  const modality = String(
    getV("modality", "tradein_equipment_modality")
  ).toUpperCase();

  const rows = [
    ["Location", location, "location"],
    ["Modality", getV("modality", "tradein_equipment_modality"), "modality"]
  ];

  if (modality === "CT") {
    rows.push(
      ["CT Model", getV("ct_model", "model", "tradein_equipment_model"), "ct_model"],
      ["CT Manufacturer", getV("ct_manufacturer", "make", "tradein_equipment_make"), "ct_manufacturer"],
      ["CT Serial", getV("ct_serial", "serial_number", "axis_serial_number", "tradein_equipment_serial_number"), "ct_serial"],
      ["CT Installed", getV("ct_installed", "installed_date"), "ct_installed"],
      ["CT Dom", getV("ct_dom", "dom", "tradein_equipment_dom"), "ct_dom"],
      ["CT Tube Dom", getV("ct_tube_dom"), "ct_tube_dom"],
      ["CT Mhu", getV("ct_mhu"), "ct_mhu"],
      ["CT Tube Mas", getV("ct_tube_mas"), "ct_tube_mas"],
      ["CT Slices", getV("ct_slices"), "ct_slices"],
      ["CT In Use", yesNo(getV("ct_in_use", "in_use_status", "tradein_in_use_status")), "ct_in_use"],
      ["CT Out Of Use Date", getV("ct_out_of_use_date", "out_of_use_date", "tradein_out_of_use_date"), "ct_out_of_use_date"],
      ["CT Injector", yesNo(getV("ct_injector")), "ct_injector"],
      ["CT Injector Model", getV("ct_injector_model"), "ct_injector_model"],
      ["CT Upgrades", yesNo(getV("ct_upgrades")), "ct_upgrades"],
      ["CT Upgrades Description", getV("ct_upgrades_desc", "upgrade_notes", "tradein_upgrade_notes"), "ct_upgrades_desc"],
      ["CT Hard Drives Removed", yesNo(getV("ct_hard_drive_removed", "hard_drive_removed", "tradein_hard_drive_removed")), "ct_hard_drive_removed"],
      ["CT Removal Pathways", getV("ct_removal_pathways", "removal_pathways", "tradein_removal_pathways"), "ct_removal_pathways"],
      ["CT Loading Dock", getV("ct_loading_dock", "loading_dock", "tradein_loading_dock"), "ct_loading_dock"],
      ["CT Software Version", getV("ct_sw_version", "software_version", "tradein_software_version"), "ct_sw_version"],
      ["CT GOC Version", getV("ct_goc_version"), "ct_goc_version"],
      ["CT Chiller", getV("ct_chiller"), "ct_chiller"],
      ["CT Availability Time Frame", getV("ct_availability_timeframe", "availability_timeframe", "tradein_availability_timeframe"), "ct_availability_timeframe"]
    );
  }

  if (modality === "MRI") {
    rows.push(
      ["MRI Manufacturer", getV("mri_manufacturer", "make", "tradein_equipment_make"), "mri_manufacturer"],
      ["MRI Model", getV("mri_model", "model", "tradein_equipment_model"), "mri_model"],
      ["MRI Serial", getV("mri_serial", "serial_number", "axis_serial_number", "tradein_equipment_serial_number"), "mri_serial"],
      ["MRI Year", getV("mri_yom", "dom", "tradein_equipment_dom"), "mri_yom"],
      ["MRI Magnet Type", getV("mri_magnet_type"), "mri_magnet_type"],
      ["MRI Bore Size", getV("mri_bore_size_cm"), "mri_bore_size_cm"],
      ["MRI Channels", getV("mri_num_channels"), "mri_num_channels"],
      ["MRI Gradient", getV("mri_gradient"), "mri_gradient"],
      ["MRI Software Version", getV("mri_sw_version", "software_version", "tradein_software_version"), "mri_sw_version"],
      ["MRI Software Options", getV("mri_sw_options"), "mri_sw_options"],
      ["MRI TIM", getV("mri_tim"), "mri_tim"],
      ["MRI Coils", getV("mri_coils", "upgrade_notes", "tradein_upgrade_notes"), "mri_coils"],
      ["MRI Service", yesNo(getV("mri_service")), "mri_service"],
      ["MRI Service Name", getV("mri_service_name"), "mri_service_name"],
      ["MRI Under Contract", yesNo(getV("mri_under_contract")), "mri_under_contract"],
      ["MRI Last PM", getV("mri_last_pm"), "mri_last_pm"],
      ["MRI In Use", yesNo(getV("mri_in_use", "in_use_status", "tradein_in_use_status")), "mri_in_use"],
      ["MRI Out Of Use Date", getV("mri_out_of_use_date", "out_of_use_date", "tradein_out_of_use_date"), "mri_out_of_use_date"],
      ["MRI Hard Drives Removed", yesNo(getV("mri_hard_drive_removed", "hard_drive_removed", "tradein_hard_drive_removed")), "mri_hard_drive_removed"],
      ["MRI Removal Pathways", getV("mri_removal_pathways", "removal_pathways", "tradein_removal_pathways"), "mri_removal_pathways"],
      ["MRI Availability Time Frame", getV("mri_availability_timeframe", "availability_timeframe", "tradein_availability_timeframe"), "mri_availability_timeframe"]
    );
  }

  if (modality === "XRAY" || modality === "X-RAY") {
    rows.push(
      ["X-Ray Manufacturer", getV("xray_manufacturer", "make", "tradein_equipment_make"), "xray_manufacturer"],
      ["X-Ray Model", getV("xray_model", "model", "tradein_equipment_model"), "xray_model"],
      ["X-Ray Serial", getV("xray_serial", "serial_number", "axis_serial_number", "tradein_equipment_serial_number"), "xray_serial"],
      ["X-Ray DOM", getV("xray_dom", "dom", "tradein_equipment_dom"), "xray_dom"],
      ["X-Ray Floor Mounted", yesNo(getV("xray_floor_mounted")), "xray_floor_mounted"],
      ["X-Ray Ceiling Mounted", yesNo(getV("xray_ceiling_mounted")), "xray_ceiling_mounted"],
      ["X-Ray RF", yesNo(getV("xray_is_rf")), "xray_is_rf"],
      ["X-Ray In Use", yesNo(getV("xray_in_use", "in_use_status", "tradein_in_use_status")), "xray_in_use"],
      ["X-Ray Out Of Use Date", getV("xray_out_of_use_date", "out_of_use_date", "tradein_out_of_use_date"), "xray_out_of_use_date"],
      ["X-Ray Removal Pathways", getV("xray_removal_pathways", "removal_pathways", "tradein_removal_pathways"), "xray_removal_pathways"],
      ["X-Ray Loading Dock", getV("xray_loading_dock", "loading_dock", "tradein_loading_dock"), "xray_loading_dock"],
      ["X-Ray Availability Time Frame", getV("xray_availability_timeframe", "availability_timeframe", "tradein_availability_timeframe"), "xray_availability_timeframe"]
    );
  }

  if (modality === "CARM" || modality === "C-ARM") {
    rows.push(
      ["C-Arm Manufacturer", getV("carm_manufacturer", "make", "tradein_equipment_make"), "carm_manufacturer"],
      ["C-Arm Model", getV("carm_model", "model", "tradein_equipment_model"), "carm_model"],
      ["C-Arm Serial", getV("carm_serial", "serial_number", "axis_serial_number", "tradein_equipment_serial_number"), "carm_serial"],
      ["C-Arm DOM", getV("carm_dom", "dom", "tradein_equipment_dom"), "carm_dom"],
      ["C-Arm Monitors", getV("carm_monitors"), "carm_monitors"],
      ["C-Arm Image Intensifier", getV("carm_image_intensifier"), "carm_image_intensifier"],
      ["C-Arm Software Version", getV("carm_sw_version", "software_version", "tradein_software_version"), "carm_sw_version"],
      ["C-Arm Servicing", yesNo(getV("carm_servicing")), "carm_servicing"],
      ["C-Arm Service Name", getV("carm_service_name"), "carm_service_name"],
      ["C-Arm In Use", yesNo(getV("carm_in_use", "in_use_status", "tradein_in_use_status")), "carm_in_use"],
      ["C-Arm Out Of Use Date", getV("carm_out_of_use_date", "out_of_use_date", "tradein_out_of_use_date"), "carm_out_of_use_date"],
      ["C-Arm Hard Drives Removed", yesNo(getV("carm_hard_drive_removed", "hard_drive_removed", "tradein_hard_drive_removed")), "carm_hard_drive_removed"],
      ["C-Arm Availability Time Frame", getV("carm_availability_timeframe", "availability_timeframe", "tradein_availability_timeframe"), "carm_availability_timeframe"]
    );
  }

  if (modality === "PET" || modality === "PETCT") {
    rows.push(
      ["PET Manufacturer", getV("pet_manufacturer", "make", "tradein_equipment_make"), "pet_manufacturer"],
      ["PET Model", getV("pet_model", "model", "tradein_equipment_model"), "pet_model"],
      ["PET Serial", getV("pet_serial", "serial_number", "axis_serial_number", "tradein_equipment_serial_number"), "pet_serial"],
      ["PET DOM", getV("pet_dom", "dom", "tradein_equipment_dom"), "pet_dom"],
      ["PET Tube DOM", getV("pet_tube_dom"), "pet_tube_dom"],
      ["PET Tube mAs", getV("pet_tube_mas"), "pet_tube_mas"],
      ["PET/CT Slice Count", getV("pet_ct_slices"), "pet_ct_slices"],
      ["PET In Use", yesNo(getV("pet_in_use", "in_use_status", "tradein_in_use_status")), "pet_in_use"],
      ["PET Out Of Use Date", getV("pet_out_of_use_date", "out_of_use_date", "tradein_out_of_use_date"), "pet_out_of_use_date"],
      ["PET Removal Pathways", getV("pet_removal_pathways", "removal_pathways", "tradein_removal_pathways"), "pet_removal_pathways"],
      ["PET Hard Drives Removed", yesNo(getV("pet_hard_drive_removed", "hard_drive_removed", "tradein_hard_drive_removed")), "pet_hard_drive_removed"],
      ["PET Loading Dock", getV("pet_loading_dock", "loading_dock", "tradein_loading_dock"), "pet_loading_dock"],
      ["PET Availability Time Frame", getV("pet_availability_timeframe", "availability_timeframe", "tradein_availability_timeframe"), "pet_availability_timeframe"]
    );
  }

  if (modality === "MAMMO") {
    rows.push(
      ["Mammo Manufacturer", getV("mamo_manufacturer", "make", "tradein_equipment_make"), "mamo_manufacturer"],
      ["Mammo Model", getV("mamo_model", "model", "tradein_equipment_model"), "mamo_model"],
      ["Mammo Serial", getV("mamo_serial", "serial_number", "axis_serial_number", "tradein_equipment_serial_number"), "mamo_serial"],
      ["Mammo DOM", getV("mamo_dom", "dom", "tradein_equipment_dom"), "mamo_dom"],
      ["Mammo 2D/3D", getV("mamo_dimensionality"), "mamo_dimensionality"],
      ["Mammo Stereotactic", getV("mamo_stereotactic_options"), "mamo_stereotactic_options"],
      ["Mammo CAD", getV("mamo_cad"), "mamo_cad"],
      ["Mammo In Use", yesNo(getV("mamo_in_use", "in_use_status", "tradein_in_use_status")), "mamo_in_use"],
      ["Mammo Out Of Use Date", getV("mamo_out_of_use_date", "out_of_use_date", "tradein_out_of_use_date"), "mamo_out_of_use_date"],
      ["Mammo Removal Pathways", getV("mamo_removal_pathways", "removal_pathways", "tradein_removal_pathways"), "mamo_removal_pathways"],
      ["Mammo Hard Drives Removed", yesNo(getV("mamo_hard_drive_removed", "hard_drive_removed", "tradein_hard_drive_removed")), "mamo_hard_drive_removed"],
      ["Mammo Loading Dock", getV("mamo_loading_dock", "loading_dock", "tradein_loading_dock"), "mamo_loading_dock"],
      ["Mammo Availability Time Frame", getV("mamo_availability_timeframe", "availability_timeframe", "tradein_availability_timeframe"), "mamo_availability_timeframe"]
    );
  }

  if (modality === "OTHER") {
    rows.push(
      ["Other Manufacturer", getV("other_manufacturer", "make", "tradein_equipment_make"), "other_manufacturer"],
      ["Other Model", getV("other_model", "model", "tradein_equipment_model"), "other_model"],
      ["Other Serial", getV("other_serial", "serial_number", "axis_serial_number", "tradein_equipment_serial_number"), "other_serial"]
    );
  }

  return rows
    .filter(([, value, rawKey]) => shouldShow(rawKey, value))
    .map(([label, value]) => `
      <div class="kv">
        <strong>${htmlSafe(label)}:</strong> ${htmlSafe(value || "-")}
      </div>
    `)
    .join("");
}
function renderPackageCard(rec){
  const recordId = String(rec.id || "");
  const safeRecordId = idSafe(recordId);
  const packageId = getBidPackageId(rec);
  const isOpen = openPackageId === recordId;
  const draft = getDraft(recordId);

  return `
    <div class="package-card ${isOpen ? "open" : ""}">
      <div class="package-head">
        <div>
          <div class="small">BID PACKAGE</div>
          <div class="package-title">${htmlSafe(packageId)}</div>
          <div class="small">
            ${htmlSafe(rec.modality || "-")} — ${htmlSafe(rec.make || "-")} ${htmlSafe(rec.model || "")}
          </div>
        </div>

        <div>
          <span class="badge blue">${htmlSafe(rec.bid_status || "Open for Bids")}</span>
        </div>

        <div>
          <strong>${htmlSafe(rec.availability_timeframe || "-")}</strong>
          <div class="small">Availability</div>
        </div>

        <div class="package-actions">
          <button onclick="togglePackage('${htmlSafe(recordId)}')">
            ${isOpen ? "Close Package" : "Open Package"}
          </button>
        </div>
      </div>

      <div class="package-grid">
        <div class="package-box">
          <strong>Make / Model</strong>
          ${htmlSafe(rec.make || "-")} ${htmlSafe(rec.model || "")}
        </div>

        <div class="package-box">
          <strong>Serial</strong>
          ${htmlSafe(rec.serial_number || rec.axis_serial_number || "-")}
        </div>

        <div class="package-box">
          <strong>Location</strong>
          ${htmlSafe(rec.site || rec.axis_parent_project_name || rec.project_name || "-")}<br>
          ${htmlSafe([rec.city, rec.state].filter(Boolean).join(", ") || "")}
        </div>

        <div class="package-box">
          <strong>Bidding Ends</strong>
          ${htmlSafe(formatBidDeadline(rec))}
        </div>
      </div>

      ${
        isOpen
          ? `
            <div class="deadline-box">
              BIDDING ENDS: ${htmlSafe(formatBidDeadline(rec))}
            </div>

            <hr>

            <h2>Equipment Details</h2>
            ${tradeInFieldRows(rec)}

            <hr>

            <h2>Images</h2>
            ${imageHtml(rec)}

            <hr>

            <h2>Submit Bid</h2>
            <p class="small">
              Your bid is submitted back to AXIS Trade Desk. Other bidders cannot see your amount.
            </p>

            <div id="successBox_${safeRecordId}" class="success-box">
              Bid submitted successfully to AXIS Trade Desk.
            </div>

            <div id="errorBox_${safeRecordId}" class="error-box">
              Enter company name and bid amount.
            </div>

            <label class="form-title">Company Name</label>
            <input
              id="bidderCompany_${safeRecordId}"
              value="${htmlSafe(draft.bidder_company || approvedBidderCompany)}"
              placeholder="Company Name"
              autocomplete="organization"
              oninput="syncDraftFromInputs('${htmlSafe(recordId)}')"
            >

            <label class="form-title">Bid Amount</label>
            <input
              id="bidAmount_${safeRecordId}"
              type="number"
              value="${htmlSafe(draft.amount)}"
              placeholder="Bid Amount"
              autocomplete="off"
              oninput="syncDraftFromInputs('${htmlSafe(recordId)}')"
            >

            <label class="form-title">Terms / Pickup Notes</label>
            <textarea
              id="bidTerms_${safeRecordId}"
              placeholder="Terms / pickup notes"
              oninput="syncDraftFromInputs('${htmlSafe(recordId)}')"
            >${htmlSafe(draft.terms)}</textarea>

            <label class="form-title">Bid Valid Until</label>
            <input
              id="bidExpires_${safeRecordId}"
              type="date"
              value="${htmlSafe(draft.expires)}"
              autocomplete="off"
              oninput="syncDraftFromInputs('${htmlSafe(recordId)}')"
            >

            <button class="green" onclick="submitBid('${htmlSafe(recordId)}')">
              Submit Bid
            </button>
          `
          : ""
      }
    </div>
  `;
}

function render(){
  if (isBidFormFocused()) return;

  const root = document.getElementById("packageRoot");
  const packages = getVisiblePackages();

  if (!packages.length) {
    root.innerHTML = `
      <div class="panel">
        <h2>No open bid package found</h2>
        <p class="small">
          Open this page from the bid package email link, or release a package from AXIS Trade Desk first.
        </p>
      </div>
    `;
    return;
  }

  if (
    !userManuallyClosedPackage &&
    !openPackageId &&
    packages.length === 1 &&
    (packageIdFromUrl || recordIdFromUrl)
  ) {
    openPackageId = String(packages[0].id || "");
  }

  root.innerHTML = `
    <div class="panel">
      <h2>Open Bid Packages</h2>
      <p class="small">
        Packages stay closed until opened. Each package opens independently.
      </p>

      ${packages.map(renderPackageCard).join("")}
    </div>
  `;
}
function submitBid(recordId){
  syncDraftFromInputs(recordId);

  const safeRecordId = idSafe(recordId);
  const draft = getDraft(recordId);

  const bidderCompany = String(draft.bidder_company || "").trim();
  const amount = Number(draft.amount || 0);
  const terms = String(draft.terms || "").trim();
  const expires = String(draft.expires || "").trim();

  const errorBox = document.getElementById(`errorBox_${safeRecordId}`);
  const successBox = document.getElementById(`successBox_${safeRecordId}`);

  if (errorBox) errorBox.style.display = "none";
  if (successBox) successBox.style.display = "none";

  if (!bidderCompany || !amount) {
    if (errorBox) errorBox.style.display = "block";
    return;
  }

  const records = loadArray(TRADE_DESK_KEY);

  const index = records.findIndex(r =>
    String(r.id || "") === String(recordId) ||
    String(r.bid_package_id || "") === String(packageIdFromUrl) ||
    String(getBidPackageId(r)) === String(packageIdFromUrl)
  );

  if (index < 0) {
    alert("Bid package not found in Trade Desk local storage. Make sure Trade Desk page released this package first.");
    return;
  }

  const rec = records[index];

  rec.bids = Array.isArray(rec.bids) ? rec.bids : [];

  const existingBidIndex = rec.bids.findIndex(b =>
    String(b.bidder_company || b.bidder || "").toLowerCase().trim() ===
    bidderCompany.toLowerCase().trim()
  );

  const bidPayload = {
    bid_id: existingBidIndex >= 0 ? rec.bids[existingBidIndex].bid_id : uid("bid"),
    bidder: bidderCompany,
    bidder_company: bidderCompany,
    bidder_email: approvedBidderEmail,
    amount,
    terms,
    expires,
    submitted_at: new Date().toISOString(),
    source: "AXIS Bidder Portal"
  };

  if (existingBidIndex >= 0) {
    rec.bids[existingBidIndex] = bidPayload;
  } else {
    rec.bids.push(bidPayload);
  }

  rec.bid_status = "Bids Received";
  rec.crm_status = "Bid Received";
  rec.quote_sync_status = rec.quote_sync_status || "Pending Bid";
  rec.last_bid_received_at = new Date().toISOString();
  rec.last_bidder_company = bidderCompany;
  rec.last_bidder_email = approvedBidderEmail;
  rec.bid_count = rec.bids.length;

  records[index] = rec;
  saveArray(TRADE_DESK_KEY, records);

  let bidderPackages = loadArray(BIDDER_PORTAL_KEY);

  const packageIndex = bidderPackages.findIndex(pkg =>
    String(pkg.bid_package_id || "") === String(rec.bid_package_id || "") ||
    String(pkg.trade_desk_record_id || "") === String(rec.id || "")
  );

  const bidderPackagePayload = {
    bid_package_id: rec.bid_package_id || getBidPackageId(rec),
    trade_desk_record_id: rec.id,
    record: rec,
    bids: rec.bids,
    bid_status: rec.bid_status,
    crm_status: rec.crm_status,
    last_bid_at: rec.last_bid_received_at,
    last_bidder_company: bidderCompany,
    last_bidder_email: approvedBidderEmail,
    bid_count: rec.bids.length
  };

  if (packageIndex >= 0) {
    bidderPackages[packageIndex] = {
      ...bidderPackages[packageIndex],
      ...bidderPackagePayload
    };
  } else {
    bidderPackages.unshift(bidderPackagePayload);
  }

  saveArray(BIDDER_PORTAL_KEY, bidderPackages);

  let syncRecords = loadArray(TRADEIN_SYNC_KEY);

  const syncIndex = syncRecords.findIndex(r =>
    String(r.id || "") === String(rec.id || "") ||
    String(r.axis_record_id || "") === String(rec.axis_record_id || "") ||
    String(r.axis_parent_record_id || "") === String(rec.axis_parent_record_id || "") ||
    String(r.bid_package_id || "") === String(rec.bid_package_id || "")
  );

  if (syncIndex >= 0) {
    syncRecords[syncIndex] = {
      ...syncRecords[syncIndex],
      bids: rec.bids,
      bid_status: rec.bid_status,
      crm_status: rec.crm_status,
      last_bid_received_at: rec.last_bid_received_at,
      last_bidder_company: rec.last_bidder_company,
      last_bidder_email: rec.last_bidder_email,
      bid_count: rec.bid_count
    };
  } else {
    syncRecords.unshift(rec);
  }

  saveArray(TRADEIN_SYNC_KEY, syncRecords);

  localStorage.setItem(LAST_SYNC_KEY, JSON.stringify(rec));
  localStorage.setItem(MANAGER_PING_KEY, String(Date.now()));

  if (successBox) successBox.style.display = "block";

  draft.amount = "";
  draft.terms = "";
  draft.expires = "";

  userManuallyClosedPackage = false;
  openPackageId = String(recordId || "");

  setTimeout(() => {
    render();
  }, 900);
}

render();
</script>
