<!-- FILE: bidder_portal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AXIS Bidder Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#07111f;
  color:#eef6ff;
  margin:0;
  padding:20px;
}

h1,h2,h3{
  margin:0 0 12px;
}

.panel{
  background:#0b1830;
  border:1px solid #23415f;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.card{
  background:#101f38;
  border:1px solid #2b4a68;
  border-radius:14px;
  padding:16px;
  margin:12px 0;
}

input,textarea,button{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #345;
  color:#fff;
  background:#10233f;
  font-size:16px;
}

textarea{
  min-height:95px;
  resize:vertical;
}

button{
  background:#1d8cff;
  cursor:pointer;
  border:none;
  font-weight:bold;
}

button.green{
  background:#18a558;
}

button.secondary{
  background:#263f5f;
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.small{
  color:#9db6d2;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  background:#263f5f;
  margin:4px 4px 4px 0;
  font-size:13px;
  font-weight:800;
}

.blue{background:#1d8cff}
.greenBadge{background:#18a558}
.gold{background:#b8860b}

.kv{
  margin:7px 0;
  font-size:15px;
}

.kv strong{
  color:#ffffff;
}

hr{
  border:0;
  border-top:1px solid #2b4a68;
  margin:18px 0;
}

.package-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin-top:12px;
}

.package-box{
  border:1px solid #2b4a68;
  background:#07111f;
  border-radius:12px;
  padding:12px;
}

.package-box strong{
  display:block;
  margin-bottom:6px;
}

.image-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:8px;
}

.image-box{
  border:1px solid #2b4a68;
  border-radius:10px;
  padding:6px;
  background:#07111f;
  width:150px;
}

.image-box img{
  width:100%;
  height:105px;
  object-fit:cover;
  border-radius:8px;
  display:block;
}

.success-box{
  display:none;
  background:rgba(24,165,88,.14);
  border:1px solid rgba(24,165,88,.55);
  color:#b9ffd6;
  padding:14px;
  border-radius:12px;
  margin:14px 0;
  font-weight:800;
}

.error-box{
  display:none;
  background:rgba(192,57,43,.14);
  border:1px solid rgba(192,57,43,.55);
  color:#ffd1d1;
  padding:14px;
  border-radius:12px;
  margin:14px 0;
  font-weight:800;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:14px;
}

@media(max-width:800px){
  .top-bar{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="top-bar">
  <div>
    <h1>AXIS Bidder Portal</h1>
    <p class="small">
      Authorized bidder view. Submit your bid here. Other bidders cannot see your amount.
    </p>
  </div>
</div>

<div id="packageRoot"></div>

<script>
const TRADE_DESK_KEY = "axis_trade_desk_demo_v1";
const TRADEIN_SYNC_KEY = "axis_tradein_sync_records_v1";
const LAST_SYNC_KEY = "axis_tradein_last_sync_v1";
const MANAGER_PING_KEY = "axis_manager_sync_ping_v1";

const params = new URLSearchParams(window.location.search);

const packageIdFromUrl =
  params.get("packageId") ||
  "";

const recordIdFromUrl =
  params.get("recordId") ||
  "";

const approvedBidderCompany =
  params.get("company") ||
  localStorage.getItem("axis_bidder_company_v1") ||
  "Espin Medical";

const approvedBidderEmail =
  params.get("email") ||
  localStorage.getItem("axis_bidder_email_v1") ||
  "info@espinmedical.com";

localStorage.setItem("axis_bidder_company_v1", approvedBidderCompany);
localStorage.setItem("axis_bidder_email_v1", approvedBidderEmail);

let activeRecordId = "";
let bidDraft = {
  bidder_company: approvedBidderCompany,
  amount: "",
  terms: "",
  expires: ""
};

function uid(prefix){
  return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
}

function htmlSafe(v){
  return String(v || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function money(n){
  return "$" + Number(n || 0).toLocaleString();
}

function loadArray(key){
  try {
    const data = JSON.parse(localStorage.getItem(key) || "[]");
    return Array.isArray(data) ? data : [];
  } catch {
    return [];
  }
}

function saveArray(key, data){
  localStorage.setItem(key, JSON.stringify(Array.isArray(data) ? data : []));
}

function getBidPackageId(rec){
  return String(
    rec.bid_package_id ||
    `PKG-${String(rec.modality || "EQ").toUpperCase()}-${String(rec.serial_number || rec.axis_serial_number || rec.id || Date.now()).replace(/[^a-z0-9]/gi,"").slice(-8)}`
  );
}

function findPackage(){
  const records = loadArray(TRADE_DESK_KEY);

  if (!records.length) return null;

  if (recordIdFromUrl) {
    return records.find(r => String(r.id || "") === String(recordIdFromUrl)) || null;
  }

  if (packageIdFromUrl) {
    return records.find(r =>
      String(r.bid_package_id || "") === String(packageIdFromUrl) ||
      String(getBidPackageId(r)) === String(packageIdFromUrl)
    ) || null;
  }

  return records.find(r =>
    r.bidder_portal_visible === true ||
    r.bid_package_open === true ||
    String(r.bid_status || "") === "Open for Bids" ||
    String(r.bid_status || "") === "Bids Received"
  ) || null;
}

function isBidFormFocused(){
  const active = document.activeElement;

  return (
    active &&
    (
      active.id === "bidderCompany" ||
      active.id === "bidAmount" ||
      active.id === "bidTerms" ||
      active.id === "bidExpires"
    )
  );
}

function syncDraftFromInputs(){
  bidDraft.bidder_company = String(document.getElementById("bidderCompany")?.value || bidDraft.bidder_company || "").trim();
  bidDraft.amount = String(document.getElementById("bidAmount")?.value || bidDraft.amount || "").trim();
  bidDraft.terms = String(document.getElementById("bidTerms")?.value || bidDraft.terms || "").trim();
  bidDraft.expires = String(document.getElementById("bidExpires")?.value || bidDraft.expires || "").trim();
}

function imageHtml(rec){
  if (!Array.isArray(rec.images) || !rec.images.length) {
    return `<p class="small">No images included yet.</p>`;
  }

  return `
    <div class="image-row">
      ${rec.images.map(img => `
        <div class="image-box">
          <img src="${htmlSafe(img.url)}" alt="${htmlSafe(img.title || "equipment image")}">
          <div class="small">${htmlSafe(img.title || "Equipment Image")}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function tradeInFieldRows(rec){
  const rows = [
    ["Modality", rec.modality],
    ["Manufacturer", rec.make],
    ["Model", rec.model],
    ["Serial Number", rec.serial_number || rec.axis_serial_number],
    ["Additional Identifier", rec.hospital_asset_id],
    ["Date Manufactured / Year", rec.dom],
    ["Date Installed", rec.installed_date],
    ["System In Use", rec.in_use_status],
    ["Date Removed From Service", rec.out_of_use_date],
    ["Availability Time Frame", rec.availability_timeframe],
    ["Describe Removal Pathways", rec.removal_pathways],
    ["Loading Dock Available", rec.loading_dock],
    ["Will Hard Drives Be Removed", rec.hard_drive_removed],
    ["Software Version", rec.software_version],
    ["Upgrade Notes", rec.upgrade_notes]
  ];

  return rows
    .filter(([label, value]) => String(value || "").trim())
    .map(([label, value]) => `
      <div class="kv">
        <strong>${htmlSafe(label)}:</strong> ${htmlSafe(value || "-")}
      </div>
    `)
    .join("");
}
function getBidDeadline(rec){
  return String(
    rec.bid_deadline ||
    rec.bidding_ends_at ||
    rec.bid_package?.bid_deadline ||
    rec.bid_package?.bidding_ends_at ||
    rec.bid_expires_at ||
    ""
  ).trim();
}

function formatBidDeadline(rec){
  const raw = getBidDeadline(rec);

  if (!raw) return "Not set";

  const d = new Date(raw);

  if (!Number.isNaN(d.getTime())) {
    return d.toLocaleString();
  }

  return raw;
}
function render(){
  if (isBidFormFocused()) return;

  const rec = findPackage();
  const root = document.getElementById("packageRoot");

  if (!rec) {
    root.innerHTML = `
      <div class="panel">
        <h2>No open bid package found</h2>
        <p class="small">
          Open this page from the bid package email link, or release a package from AXIS Trade Desk first.
        </p>
      </div>
    `;
    return;
  }

  activeRecordId = String(rec.id || "");

  const packageId = getBidPackageId(rec);

  const bidderCompanyValue =
    bidDraft.bidder_company ||
    approvedBidderCompany ||
    "";

  root.innerHTML = `
    <div class="panel">
      <div class="top-bar">
        <div>
          <div class="small">BID PACKAGE</div>
          <h2>${htmlSafe(packageId)}</h2>
          <h3>${htmlSafe(rec.modality || "-")} — ${htmlSafe(rec.make || "-")} ${htmlSafe(rec.model || "")}</h3>
        </div>

        <div>
          <span class="badge blue">${htmlSafe(rec.bid_status || "Open for Bids")}</span>
          <span class="badge">${htmlSafe(rec.availability_timeframe || "Availability TBD")}</span>
        </div>
      </div>

     <div class="package-grid">
  <div class="package-box">
    <strong>Manufacturer / Make</strong>
    <span style="font-size:22px;font-weight:900;color:#ffffff;">
      ${htmlSafe(rec.make || "-")}
    </span>
  </div>

  <div class="package-box">
    <strong>Model</strong>
    <span style="font-size:20px;font-weight:800;">
      ${htmlSafe(rec.model || "-")}
    </span>
  </div>

  <div class="package-box">
    <strong>Equipment</strong>
    ${htmlSafe(rec.modality || "-")}<br>
    Serial: ${htmlSafe(rec.serial_number || rec.axis_serial_number || "-")}
  </div>

  <div class="package-box">
    <strong>Bidding Ends</strong>
    <span style="font-size:20px;font-weight:900;color:#ffd84d;">
      ${htmlSafe(formatBidDeadline(rec))}
    </span>
  </div>

  <div class="package-box">
    <strong>Availability</strong>
    ${htmlSafe(rec.availability_timeframe || "-")}<br>
    Out of Use: ${htmlSafe(rec.out_of_use_date || "-")}
  </div>

  <div class="package-box">
    <strong>Location</strong>
    ${htmlSafe(rec.site || rec.axis_parent_project_name || rec.project_name || "-")}<br>
    ${htmlSafe([rec.city, rec.state].filter(Boolean).join(", ") || "")}
  </div>

  <div class="package-box">
    <strong>Bid Status</strong>
    ${htmlSafe(rec.bid_status || "Open for Bids")}
  </div>
</div>

      <hr>

      <h2>Equipment Details</h2>
      ${tradeInFieldRows(rec)}

      <hr>

      <h2>Images</h2>
      ${imageHtml(rec)}

      <hr>

      <h2>Submit Bid</h2>
      <p class="small">
        Your bid is submitted back to AXIS Trade Desk. Other bidders cannot see your amount.
      </p>

      <div id="successBox" class="success-box">
        Bid submitted successfully to AXIS Trade Desk.
      </div>

      <div id="errorBox" class="error-box">
        Enter company name and bid amount.
      </div>

      <input
        id="bidderCompany"
        value="${htmlSafe(bidderCompanyValue)}"
        placeholder="Company Name"
        autocomplete="organization"
        oninput="syncDraftFromInputs()"
      >

      <input
        id="bidAmount"
        type="number"
        value="${htmlSafe(bidDraft.amount)}"
        placeholder="Bid Amount"
        autocomplete="off"
        oninput="syncDraftFromInputs()"
      >

      <textarea
        id="bidTerms"
        placeholder="Terms / pickup notes"
        oninput="syncDraftFromInputs()"
      >${htmlSafe(bidDraft.terms)}</textarea>

     <input
  id="bidExpires"
  type="date"
  value="${htmlSafe(bidDraft.expires)}"
  placeholder="Your Bid Valid Until"
  autocomplete="off"
  oninput="syncDraftFromInputs()"
>

      <button class="green" onclick="submitBid()">Submit Bid</button>
    </div>
  `;
}

function submitBid(){
  syncDraftFromInputs();

  const bidderCompany = String(bidDraft.bidder_company || "").trim();
  const amount = Number(bidDraft.amount || 0);
  const terms = String(bidDraft.terms || "").trim();
  const expires = String(bidDraft.expires || "").trim();

  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  if (errorBox) errorBox.style.display = "none";
  if (successBox) successBox.style.display = "none";

  if (!bidderCompany || !amount) {
    if (errorBox) errorBox.style.display = "block";
    return;
  }

  const records = loadArray(TRADE_DESK_KEY);

  const index = records.findIndex(r =>
    String(r.id || "") === String(activeRecordId) ||
    String(r.bid_package_id || "") === String(packageIdFromUrl)
  );

  if (index < 0) {
    alert("Bid package not found.");
    return;
  }

  const rec = records[index];

  rec.bids = Array.isArray(rec.bids) ? rec.bids : [];

  const existingBidIndex = rec.bids.findIndex(b =>
    String(b.bidder_company || b.bidder || "").toLowerCase().trim() === bidderCompany.toLowerCase().trim()
  );

  const bidPayload = {
    bid_id: existingBidIndex >= 0 ? rec.bids[existingBidIndex].bid_id : uid("bid"),
    bidder: bidderCompany,
    bidder_company: bidderCompany,
    bidder_email: approvedBidderEmail,
    amount,
    terms,
    expires,
    submitted_at: new Date().toISOString(),
    source: "AXIS Bidder Portal"
  };

  if (existingBidIndex >= 0) {
    rec.bids[existingBidIndex] = bidPayload;
  } else {
    rec.bids.push(bidPayload);
  }

  rec.bid_status = "Bids Received";
  rec.crm_status = "Bid Received";
  rec.quote_sync_status = rec.quote_sync_status || "Pending Bid";
  rec.last_bid_received_at = new Date().toISOString();
  rec.last_bidder_company = bidderCompany;
  rec.last_bidder_email = approvedBidderEmail;
  rec.bid_count = rec.bids.length;

  records[index] = rec;

  saveArray(TRADE_DESK_KEY, records);

  const syncRecords = loadArray(TRADEIN_SYNC_KEY);
  const syncIndex = syncRecords.findIndex(r =>
    String(r.id || "") === String(rec.id || "") ||
    String(r.axis_record_id || "") === String(rec.axis_record_id || "") ||
    String(r.axis_parent_record_id || "") === String(rec.axis_parent_record_id || "") ||
    String(r.bid_package_id || "") === String(rec.bid_package_id || "")
  );

  if (syncIndex >= 0) {
    syncRecords[syncIndex] = {
      ...syncRecords[syncIndex],
      bids: rec.bids,
      bid_status: rec.bid_status,
      crm_status: rec.crm_status,
      last_bid_received_at: rec.last_bid_received_at,
      last_bidder_company: rec.last_bidder_company,
      last_bidder_email: rec.last_bidder_email,
      bid_count: rec.bid_count
    };
  } else {
    syncRecords.unshift(rec);
  }

  saveArray(TRADEIN_SYNC_KEY, syncRecords);
  localStorage.setItem(LAST_SYNC_KEY, JSON.stringify(rec));
  localStorage.setItem(MANAGER_PING_KEY, String(Date.now()));

  if (successBox) successBox.style.display = "block";

  bidDraft.amount = "";
  bidDraft.terms = "";
  bidDraft.expires = "";

  setTimeout(() => {
    render();
  }, 900);
}

window.addEventListener("storage", e => {
  if (
    e.key === TRADE_DESK_KEY ||
    e.key === TRADEIN_SYNC_KEY ||
    e.key === MANAGER_PING_KEY
  ) {
    if (!isBidFormFocused()) {
      render();
    }
  }
});

setInterval(() => {
  if (!isBidFormFocused()) {
    render();
  }
}, 2500);

render();
</script>

</body>
</html>
