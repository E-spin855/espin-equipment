<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bidder Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#07111f;
  color:#eef6ff;
  margin:0;
  padding:20px;
}

h1,h2,h3{
  margin:0 0 12px;
}

.panel{
  background:#0b1830;
  border:1px solid #23415f;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.package-card{
  background:#101f38;
  border:1px solid #2b4a68;
  border-radius:14px;
  padding:16px;
  margin:12px 0;
}

.package-card.open{
  border:2px solid #1d8cff;
  box-shadow:0 0 22px rgba(29,140,255,.25);
}

input,textarea,button{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #345;
  color:#fff;
  background:#10233f;
  font-size:16px;
}

textarea{
  min-height:95px;
  resize:vertical;
}

button{
  background:#1d8cff;
  cursor:pointer;
  border:none;
  font-weight:bold;
}

button.green{
  background:#18a558;
}

button.secondary{
  background:#263f5f;
}

button:disabled{
  opacity:.65;
  cursor:not-allowed;
}

button.is-loading{
  opacity:.82;
  pointer-events:none;
}

button.is-success{
  background:#18a558 !important;
  color:#ffffff !important;
}

.spinner-dot{
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,.45);
  border-top-color:#ffffff;
  border-radius:50%;
  animation:spinButton .75s linear infinite;
  vertical-align:-2px;
  margin-right:8px;
}

@keyframes spinButton{
  to{transform:rotate(360deg)}
}

.small{
  color:#9db6d2;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  background:#263f5f;
  margin:4px 4px 4px 0;
  font-size:13px;
  font-weight:800;
}

.blue{background:#1d8cff}
.greenBadge{background:#18a558}
.gold{background:#b8860b}
.redBadge{background:#c0392b}

.kv{
  margin:7px 0;
  font-size:15px;
}

.kv strong{
  color:#ffffff;
}

hr{
  border:0;
  border-top:1px solid #2b4a68;
  margin:18px 0;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:14px;
}

.package-head{
  display:grid;
  grid-template-columns:1.4fr .7fr .7fr .7fr;
  gap:12px;
  align-items:center;
}

.package-title{
  font-size:17px;
  font-weight:900;
}

.package-actions{
  min-width:140px;
}

.package-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin-top:12px;
}

.package-box{
  border:1px solid #2b4a68;
  background:#07111f;
  border-radius:12px;
  padding:12px;
}

.package-box strong{
  display:block;
  margin-bottom:6px;
}

.deadline-box{
  background:linear-gradient(90deg,#064e3b,#059669,#10b981);
  border:2px solid #34d399;
  color:#ecfdf5;
  padding:14px;
  border-radius:12px;
  font-weight:900;
  margin:12px 0;
  box-shadow:0 0 24px rgba(16,185,129,.45);
}

.form-title{
  color:#ffffff;
  font-weight:900;
  margin-top:8px;
}

.image-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:8px;
}

.image-box{
  border:1px solid #2b4a68;
  border-radius:10px;
  padding:6px;
  background:#07111f;
  width:150px;
}

.image-box img{
  width:100%;
  height:105px;
  object-fit:cover;
  border-radius:8px;
  display:block;
}

.success-box{
  display:none;
  background:rgba(24,165,88,.14);
  border:1px solid rgba(24,165,88,.55);
  color:#b9ffd6;
  padding:14px;
  border-radius:12px;
  margin:14px 0;
  font-weight:800;
}

.error-box{
  display:none;
  background:rgba(192,57,43,.14);
  border:1px solid rgba(192,57,43,.55);
  color:#ffd1d1;
  padding:14px;
  border-radius:12px;
  margin:14px 0;
  font-weight:800;
}

.debug-box{
  background:#07111f;
  border:1px dashed #2b4a68;
  border-radius:12px;
  padding:10px;
  color:#9db6d2;
  font-size:12px;
  margin-top:10px;
}

.image-preview-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  padding:20px;
}

.image-preview-box{
  width:100%;
  max-width:900px;
  max-height:90vh;
  background:#0b1830;
  border:1px solid #2b4a68;
  border-radius:18px;
  padding:16px;
  box-shadow:0 20px 70px rgba(0,0,0,.55);
}

.image-preview-box img{
  width:100%;
  max-height:72vh;
  object-fit:contain;
  border-radius:12px;
  background:#07111f;
  display:block;
}

.image-preview-title{
  margin-top:12px;
  color:#eef6ff;
  font-size:18px;
  font-weight:900;
}

.image-preview-close{
  margin-top:12px;
  background:#1d8cff;

}

@media(max-width:900px){
  .package-head{
    grid-template-columns:1fr;
  }

  .top-bar{
    flex-direction:column;
  }
}

  position:fixed;

  right:16px;
  z-index:1000000;

  padding:10px 18px;

  border:2px solid rgba(255,107,107,.95);
  border-radius:999px;

  background:rgba(90,10,18,.96);
  color:#fff;

  font-size:14px;
  font-weight:950;
  letter-spacing:.14em;
  line-height:1;
  text-transform:uppercase;

  box-shadow:
    0 0 0 1px rgba(255,107,107,.28),
    0 0 22px rgba(255,107,107,.52);

  pointer-events:none;
}
</style>
</head>

<body>
<div class="espin-confidential-notice">
  Confidential and Proprietary
</div>
<div class="top-bar">
  <div>
    <h1>ESPIN LINK Bidder Portal</h1>
    <p class="small">
      Authorized bidder view. Open an assigned package and submit your bid. Other bidders cannot see your amount.
    </p>
  </div>
</div>

<div id="packageRoot"></div>

<div id="imagePreviewOverlay" class="image-preview-overlay">
  <div class="image-preview-box">
    <img id="imagePreviewImg" src="" alt="Image preview">
    <div id="imagePreviewTitle" class="image-preview-title"></div>
    <button type="button" id="closePreviewBtn" class="image-preview-close">Close Preview</button>
  </div>
</div>

<script>
/* ==========================================================
   AXIS BIDDER PORTAL — STABLE FULL PAGE
   Main fix:
   - No auto-render while package is open.
   - No auto-render while bid form is focused.
   - Submit button uses event delegation.
   - Console logs show click, validation, save, and reset.
   ========================================================== */

const TRADE_DESK_KEY = "axis_trade_desk_demo_v1";
const TRADEIN_SYNC_KEY = "axis_tradein_sync_records_v1";
const LAST_SYNC_KEY = "axis_tradein_last_sync_v1";
const MANAGER_PING_KEY = "axis_manager_sync_ping_v1";
const BIDDER_PORTAL_KEY = "axis_bidder_portal_packages_v1";
const BUYER_PACKET_KEY = "axis_buyer_review_packets_v1";
const BUYER_RESPONSE_OUTBOX_KEY = "axis_buyer_response_outbox_v1";

const params = new URLSearchParams(window.location.search);

const packageIdFromUrl =
  params.get("packageId") ||
  params.get("packetId") ||
  params.get("review_packet_id") ||
  params.get("bid_package_id") ||
  "";

const recordIdFromUrl =
  params.get("recordId") ||
  params.get("trade_desk_record_id") ||
  "";

const approvedBidderCompany =
  params.get("company") ||
  params.get("buyer") ||
  localStorage.getItem("axis_bidder_company_v1") ||
  "Espin Medical";

const approvedBidderEmail =
  params.get("email") ||
  params.get("buyer") ||
  localStorage.getItem("axis_bidder_email_v1") ||
  "info@espinmedical.com";

localStorage.setItem("axis_bidder_company_v1", approvedBidderCompany);
localStorage.setItem("axis_bidder_email_v1", approvedBidderEmail);

let openPackageId = "";
let userManuallyClosedPackage = false;
let suppressRenderUntil = 0;
const bidDrafts = {};

console.log("BIDDER PORTAL LOADED", {
  packageIdFromUrl,
  recordIdFromUrl,
  approvedBidderCompany,
  approvedBidderEmail
});

function uid(prefix){
  return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
}

function htmlSafe(v){
  return String(v || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function idSafe(v){
  return String(v || "").replace(/[^a-zA-Z0-9_-]/g, "_");
}

function money(n){
  return "$" + Number(n || 0).toLocaleString();
}

function loadArray(key){
  try{
    const data = JSON.parse(localStorage.getItem(key) || "[]");
    return Array.isArray(data) ? data : [];
  }catch(err){
    console.warn("loadArray failed", key, err);
    return [];
  }
}

function saveArray(key, data){
  localStorage.setItem(key, JSON.stringify(Array.isArray(data) ? data : []));
}

function getV(obj, ...keys){
  for (const key of keys){
    const v = obj?.[key];
    if (v !== undefined && v !== null && String(v).trim() !== "") return v;
  }
  return "";
}

function yesNo(v){
  const s = String(v || "").trim().toLowerCase();
  if (["yes", "y", "true", "1"].includes(s)) return "Yes";
  if (["no", "n", "false", "0"].includes(s)) return "No";
  return v;
}

function normalizeModality(v){
  const s = String(v || "").trim().toUpperCase();
  if (s === "X-RAY") return "XRAY";
  if (s === "C-ARM") return "CARM";
  if (s === "PET") return "PETCT";
  return s;
}

function getBidPackageId(rec){
  return String(
    rec.package_id ||
    rec.packet_id ||
    rec.review_packet_id ||
    rec.bid_package_id ||
    rec.id ||
    `PKG-${String(rec.modality || rec.record?.modality || rec.equipment?.modality || "EQ").toUpperCase()}-${String(rec.serial_number || rec.axis_serial_number || rec.record?.serial_number || rec.equipment?.serial_number || Date.now()).replace(/[^a-z0-9]/gi,"").slice(-8)}`
  );
}

function getTradeDeskRecordId(rec){
  return String(
    rec.trade_desk_record_id ||
    rec.axis_parent_record_id ||
    rec.axis_record_id ||
    rec.record?.id ||
    rec.equipment?.id ||
    rec.id ||
    ""
  );
}

function getBidDeadline(rec){
  return String(
    rec.response_deadline ||
    rec.bid_deadline ||
    rec.bidding_ends_at ||
    rec.bid_expires_at ||
    rec.record?.response_deadline ||
    rec.record?.bid_deadline ||
    rec.record?.bidding_ends_at ||
    rec.record?.bid_expires_at ||
    rec.equipment?.response_deadline ||
    rec.equipment?.bid_deadline ||
    rec.equipment?.bidding_ends_at ||
    rec.equipment?.bid_expires_at ||
    rec.bid_package?.bid_deadline ||
    rec.bid_package?.bidding_ends_at ||
    ""
  ).trim();
}

function formatBidDeadline(rec){
  const raw = getBidDeadline(rec);
  if (!raw) return "Not set";

  const d = new Date(raw);
  if (!Number.isNaN(d.getTime())) return d.toLocaleString();

  return raw;
}

function normalizePortalPackage(pkg){
  const record = pkg.record && typeof pkg.record === "object" ? pkg.record : {};
  const equipment = pkg.equipment && typeof pkg.equipment === "object" ? pkg.equipment : {};

  const merged = {
    ...equipment,
    ...record,
    ...pkg
  };

  const packetId =
    pkg.package_id ||
    pkg.packet_id ||
    pkg.review_packet_id ||
    pkg.bid_package_id ||
    record.package_id ||
    record.packet_id ||
    record.review_packet_id ||
    record.bid_package_id ||
    equipment.package_id ||
    equipment.packet_id ||
    equipment.review_packet_id ||
    equipment.bid_package_id ||
    pkg.id ||
    "";

  const tradeDeskRecordId =
    pkg.trade_desk_record_id ||
    record.trade_desk_record_id ||
    equipment.trade_desk_record_id ||
    record.id ||
    equipment.id ||
    "";

  merged.id = tradeDeskRecordId || packetId || pkg.id || uid("portal_record");
  merged.trade_desk_record_id = tradeDeskRecordId || merged.id;

  merged.package_id = packetId || merged.id;
  merged.packet_id = merged.package_id;
  merged.review_packet_id = pkg.review_packet_id || record.review_packet_id || equipment.review_packet_id || merged.package_id;
  merged.bid_package_id = pkg.bid_package_id || record.bid_package_id || equipment.bid_package_id || merged.package_id;

  merged.modality = normalizeModality(merged.modality || record.modality || equipment.modality || "");
  merged.make = merged.make || record.make || equipment.make || "";
  merged.model = merged.model || record.model || equipment.model || "";
  merged.serial_number = merged.serial_number || record.serial_number || equipment.serial_number || merged.axis_serial_number || "";

  merged.images = Array.isArray(pkg.images)
    ? pkg.images
    : Array.isArray(record.images)
      ? record.images
      : Array.isArray(equipment.images)
        ? equipment.images
        : [];

  merged.bid_status =
    pkg.bid_status ||
    record.bid_status ||
    equipment.bid_status ||
    pkg.buyer_response_status ||
    record.buyer_response_status ||
    pkg.status ||
    "Open for Bids";

  merged.buyer_response_status =
    pkg.buyer_response_status ||
    record.buyer_response_status ||
    equipment.buyer_response_status ||
    "";

  merged.response_deadline = pkg.response_deadline || record.response_deadline || equipment.response_deadline || "";
  merged.bid_deadline = pkg.bid_deadline || record.bid_deadline || equipment.bid_deadline || merged.response_deadline || "";
  merged.bidding_ends_at = pkg.bidding_ends_at || record.bidding_ends_at || equipment.bidding_ends_at || merged.response_deadline || "";
  merged.bid_expires_at = pkg.bid_expires_at || record.bid_expires_at || equipment.bid_expires_at || merged.response_deadline || "";

  merged.bids = Array.isArray(pkg.bids)
    ? pkg.bids
    : Array.isArray(record.bids)
      ? record.bids
      : Array.isArray(equipment.bids)
        ? equipment.bids
        : [];

  return merged;
}

function packageMatches(pkg, targetRecordId = "", targetPacketId = ""){
  const normalized = normalizePortalPackage(pkg);

  const packetId = String(targetPacketId || packageIdFromUrl || "").trim();
  const recordId = String(targetRecordId || recordIdFromUrl || "").trim();

  const ids = [
    normalized.id,
    normalized.trade_desk_record_id,
    normalized.package_id,
    normalized.packet_id,
    normalized.review_packet_id,
    normalized.bid_package_id,
    getBidPackageId(normalized),
    getTradeDeskRecordId(normalized)
  ].map(v => String(v || "").trim()).filter(Boolean);

  if (recordId && ids.includes(recordId)) return true;
  if (packetId && ids.includes(packetId)) return true;

  return false;
}

function getOpenPackages(){
  const portalPackages = loadArray(BIDDER_PORTAL_KEY).map(normalizePortalPackage);
  const buyerPackets = loadArray(BUYER_PACKET_KEY).map(normalizePortalPackage);
  const tradeDeskRecords = loadArray(TRADE_DESK_KEY).map(normalizePortalPackage);

  const combined = [
    ...portalPackages,
    ...buyerPackets,
    ...tradeDeskRecords
  ];

  const seen = new Set();

  const open = combined.filter(pkg => {
    const id = getBidPackageId(pkg);
    if (!id || seen.has(id)) return false;
    seen.add(id);

    return (
      pkg.buyer_review_link_visible === true ||
      pkg.review_packet_prepared === true ||
      pkg.bidder_portal_visible === true ||
      pkg.bid_package_open === true ||
      String(pkg.status || "").includes("Prepared") ||
      String(pkg.buyer_response_status || "").includes("Prepared") ||
      String(pkg.bid_status || "") === "Open for Bids" ||
      String(pkg.bid_status || "") === "Bids Received"
    );
  });

  console.log("getOpenPackages()", {
    portalPackages: portalPackages.length,
    buyerPackets: buyerPackets.length,
    tradeDeskRecords: tradeDeskRecords.length,
    openPackages: open.length
  });

  return open;
}

function getVisiblePackages(){
  const openPackages = getOpenPackages();

  if (recordIdFromUrl) {
    return openPackages.filter(r => packageMatches(r, recordIdFromUrl, ""));
  }

  if (packageIdFromUrl) {
    return openPackages.filter(r => packageMatches(r, "", packageIdFromUrl));
  }

  return openPackages;
}

function isBidFormFocused(){
  const active = document.activeElement;

  return (
    active &&
    (
      active.id?.startsWith("bidderCompany_") ||
      active.id?.startsWith("bidAmount_") ||
      active.id?.startsWith("bidTerms_") ||
      active.id?.startsWith("bidExpires_")
    )
  );
}

function shouldBlockAutoRender(){
  if (Date.now() < suppressRenderUntil) return true;
  if (isBidFormFocused()) return true;
  if (openPackageId) return true;
  return false;
}

function getDraft(recordId){
  if (!bidDrafts[recordId]) {
    bidDrafts[recordId] = {
      bidder_company: approvedBidderCompany,
      amount: "",
      terms: "",
      expires: ""
    };
  }

  return bidDrafts[recordId];
}

function syncDraftFromInputs(recordId){
  const safeId = idSafe(recordId);
  const draft = getDraft(recordId);

  draft.bidder_company = String(document.getElementById(`bidderCompany_${safeId}`)?.value || draft.bidder_company || "").trim();
  draft.amount = String(document.getElementById(`bidAmount_${safeId}`)?.value || draft.amount || "").trim();
  draft.terms = String(document.getElementById(`bidTerms_${safeId}`)?.value || draft.terms || "").trim();
  draft.expires = String(document.getElementById(`bidExpires_${safeId}`)?.value || draft.expires || "").trim();

  console.log("Draft updated", {
    recordId,
    draft
  });
}

function setBidButtonState(recordId, state, btnEl = null){
  const safeRecordId = idSafe(recordId);
  const btn = btnEl || document.getElementById(`submitBidBtn_${safeRecordId}`);

  console.log("setBidButtonState()", {
    recordId,
    state,
    foundButton: Boolean(btn)
  });

  if (!btn) return;

  btn.classList.remove("is-loading", "is-success");

  if (state === "loading") {
    btn.disabled = true;
    btn.classList.add("is-loading");
    btn.innerHTML = `<span class="spinner-dot"></span>Submitting...`;
    return;
  }

  if (state === "submitted") {
    btn.disabled = true;
    btn.classList.add("is-success");
    btn.textContent = "Bid Submitted";
    return;
  }

  btn.disabled = false;
  btn.classList.remove("is-loading", "is-success");
  btn.textContent = "Submit Bid";
}

function togglePackage(recordId){
  const id = String(recordId || "").trim();

  console.log("togglePackage()", {
    clickedId: id,
    previousOpenPackageId: openPackageId
  });

  if (!id) return;

  if (openPackageId === id) {
    openPackageId = "";
    userManuallyClosedPackage = true;
    render(true);
    return;
  }

  openPackageId = id;
  userManuallyClosedPackage = false;
  render(true);
}

function openImagePreview(url, title){
  const overlay = document.getElementById("imagePreviewOverlay");
  const img = document.getElementById("imagePreviewImg");
  const titleEl = document.getElementById("imagePreviewTitle");

  if (!overlay || !img || !titleEl) return;

  img.src = url || "";
  titleEl.textContent = title || "Equipment Image";
  overlay.style.display = "flex";
}

function closeImagePreview(){
  const overlay = document.getElementById("imagePreviewOverlay");
  const img = document.getElementById("imagePreviewImg");

  if (img) img.src = "";
  if (overlay) overlay.style.display = "none";
}

function imageHtml(rec){
  if (!Array.isArray(rec.images) || !rec.images.length) {
    return `<p class="small">No images included yet.</p>`;
  }

  return `
    <div class="image-row">
      ${rec.images.map((img, index) => {
        const url = htmlSafe(img.url || "");
        const title = htmlSafe(img.title || img.type || `Equipment Image ${index + 1}`);

        return `
          <div
            class="image-box js-preview-image"
            data-url="${url}"
            data-title="${title}"
            style="cursor:pointer;"
          >
            <img src="${url}" alt="${title}">
            <div class="small">${title}</div>
            <div class="small" style="color:#41ff9c;font-weight:800;margin-top:4px;">
              Click to preview
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function tradeInFieldRows(rec){
  const modality = normalizeModality(getV(rec, "modality", "tradein_equipment_modality"));

  const rows = [
    ["Location", [getV(rec, "city"), getV(rec, "state"), getV(rec, "zip_code", "zip")].filter(Boolean).join(" ")],
    ["Modality", getV(rec, "modality", "tradein_equipment_modality")],
    ["Manufacturer", getV(rec, "make", "tradein_equipment_make", "ct_manufacturer", "mri_manufacturer", "mamo_manufacturer", "xray_manufacturer", "carm_manufacturer", "pet_manufacturer")],
    ["Model", getV(rec, "model", "tradein_equipment_model", "ct_model", "mri_model", "mamo_model", "xray_model", "carm_model", "pet_model")],
    ["Serial", getV(rec, "serial_number", "axis_serial_number", "tradein_equipment_serial_number", "ct_serial", "mri_serial", "mamo_serial", "xray_serial", "carm_serial", "pet_serial")],
    ["Additional Identifier", getV(rec, "hospital_asset_id", "additional_identifier")],
    ["Date Manufactured / Year", getV(rec, "dom", "tradein_equipment_dom", "ct_dom", "mri_yom", "mamo_dom", "pet_tube_dom")],
    ["Installed Date", getV(rec, "installed_date", "ct_installed")],
    ["System In Use", yesNo(getV(rec, "in_use_status", "tradein_in_use_status", "ct_in_use", "mri_in_use", "mamo_in_use", "xray_in_use", "carm_in_use", "pet_in_use"))],

function render(force = false){
  if (!force && Date.now() < suppressRenderUntil) {
    console.log("render blocked: suppressRenderUntil active");
    return;
  }

  if (!force && isBidFormFocused()) {
    console.log("render blocked: bid form focused");
    return;
  }

  const root = document.getElementById("packageRoot");
  const packages = getVisiblePackages();

  console.log("render()", {
    force,
    visiblePackages: packages.length,
    openPackageId,
    activeElementId: document.activeElement?.id || ""
  });

  if (!root) return;

  if (!packages.length) {
    root.innerHTML = `
      <div class="panel">
        <h2>No open bid package found</h2>
        <p class="small">
          Open this page from the bid package email link, or release a package from AXIS Trade Desk first.
        </p>
        <div class="debug-box">
          Debug:<br>
          BIDDER_PORTAL_KEY count: ${loadArray(BIDDER_PORTAL_KEY).length}<br>
          BUYER_PACKET_KEY count: ${loadArray(BUYER_PACKET_KEY).length}<br>
          TRADE_DESK_KEY count: ${loadArray(TRADE_DESK_KEY).length}<br>
          URL packageId: ${htmlSafe(packageIdFromUrl || "-")}<br>
          URL recordId: ${htmlSafe(recordIdFromUrl || "-")}
        </div>
      </div>
    `;
    return;
  }

  if (
    !userManuallyClosedPackage &&
    !openPackageId &&
    packages.length === 1 &&
    (packageIdFromUrl || recordIdFromUrl)
  ) {
    openPackageId = String(packages[0].id || packages[0].trade_desk_record_id || getBidPackageId(packages[0]) || "");
    console.log("Auto-opened single package", openPackageId);
  }

  root.innerHTML = `
    <div class="panel">
      <h2>Open Bid Packages</h2>
      <p class="small">
        Packages stay stable while open. Auto-refresh pauses while you are entering a bid.
      </p>

      ${packages.map(renderPackageCard).join("")}
    </div>
  `;
}

    id: pkg.id || tradeDeskRecordId || packetId,
    package_id: packetId,
    packet_id: packetId,
    review_packet_id: rec.review_packet_id || packetId,
    bid_package_id: rec.bid_package_id || packetId,
    trade_desk_record_id: tradeDeskRecordId,

    bids: rec.bids,
    bid_status: "Bids Received",
    buyer_response_status: "Buyer Responses Received",
    crm_status: "Buyer Response Records Received",
    quote_sync_status: rec.quote_sync_status || "Pending Bid",
    last_bid_at: rec.last_bid_at,

      packet_id: packetId,

    },

    equipment: {
      ...(pkg.equipment || {}),
      ...rec,

      trade_desk_record_id: tradeDeskRecordId,

function submitBid(recordId, btnEl = null){
  console.log("SUBMIT BID START", {
    recordId,
    buttonFound: Boolean(btnEl),
    buttonDisabled: btnEl?.disabled
  });

  suppressRenderUntil = Date.now() + 10000;

  const safeRecordId = idSafe(recordId);

  const companyInput = document.getElementById(`bidderCompany_${safeRecordId}`);
  const amountInput = document.getElementById(`bidAmount_${safeRecordId}`);
  const termsInput = document.getElementById(`bidTerms_${safeRecordId}`);
  const expiresInput = document.getElementById(`bidExpires_${safeRecordId}`);

  const errorBox = document.getElementById(`errorBox_${safeRecordId}`);
  const successBox = document.getElementById(`successBox_${safeRecordId}`);

  try{
    console.log("Submit form elements", {
      companyInput: Boolean(companyInput),
      amountInput: Boolean(amountInput),
      termsInput: Boolean(termsInput),
      expiresInput: Boolean(expiresInput)
    });

    const bidderCompany = String(companyInput?.value || approvedBidderCompany || "").trim();
    const amount = Number(amountInput?.value || 0);
    const terms = String(termsInput?.value || "").trim();
    const expires = String(expiresInput?.value || "").trim();

    const draft = getDraft(recordId);
    draft.bidder_company = bidderCompany;
    draft.amount = String(amountInput?.value || "").trim();
    draft.terms = terms;
    draft.expires = expires;

    if (errorBox) errorBox.style.display = "none";
    if (successBox) successBox.style.display = "none";

    console.log("Submit validation values", {
      bidderCompany,
      amount,
      terms,
      expires
    });

    if (!bidderCompany || !amount || amount <= 0) {
      console.warn("SUBMIT BID VALIDATION FAILED", {
        bidderCompany,
        amount
      });

      if (errorBox) {
        errorBox.textContent = "Enter company name and bid amount.";
        errorBox.style.display = "block";
      }

      setBidButtonState(recordId, "reset", btnEl);
      suppressRenderUntil = 0;
      return;
    }

    setBidButtonState(recordId, "loading", btnEl);

    let bidderPackages = loadArray(BIDDER_PORTAL_KEY);
    let buyerPackets = loadArray(BUYER_PACKET_KEY);
    let tradeDeskRecords = loadArray(TRADE_DESK_KEY);
    let syncRecords = loadArray(TRADEIN_SYNC_KEY);

    const targetRecordId = String(recordId || "").trim();
    const targetPacketId = String(packageIdFromUrl || "").trim();

    const allPackages = [
      ...bidderPackages.map((pkg, index) => ({ source:BIDDER_PORTAL_KEY, index, original:pkg, pkg:normalizePortalPackage(pkg) })),
      ...buyerPackets.map((pkg, index) => ({ source:BUYER_PACKET_KEY, index, original:pkg, pkg:normalizePortalPackage(pkg) })),
      ...tradeDeskRecords.map((pkg, index) => ({ source:TRADE_DESK_KEY, index, original:pkg, pkg:normalizePortalPackage(pkg) }))
    ];

    console.log("Package search pool", {
      bidderPackages: bidderPackages.length,
      buyerPackets: buyerPackets.length,
      tradeDeskRecords: tradeDeskRecords.length,
      targetRecordId,
      targetPacketId
    });

    const found = allPackages.find(item => {
      const p = item.pkg;

      const ids = [
        p.id,
        p.trade_desk_record_id,
        p.package_id,
        p.packet_id,
        p.review_packet_id,
        p.bid_package_id,
        getBidPackageId(p),
        getTradeDeskRecordId(p)
      ].map(v => String(v || "").trim()).filter(Boolean);

      return (
        ids.includes(targetRecordId) ||
        (targetPacketId && ids.includes(targetPacketId)) ||
        packageMatches(p, targetRecordId, "") ||
        packageMatches(p, "", targetPacketId)
      );
    });

    if (!found) {
      console.error("SUBMIT BID FAILED: PACKAGE NOT FOUND", {
        targetRecordId,
        targetPacketId
      });

      if (errorBox) {
        errorBox.textContent = "Bid package not found. Make sure Trade Desk prepared the package and both pages are opened from the same browser/origin.";
        errorBox.style.display = "block";
      }

      setBidButtonState(recordId, "reset", btnEl);
      suppressRenderUntil = 0;
      return;
    }

    console.log("Package found", {
      source: found.source,
      index: found.index,
      packageId: getBidPackageId(found.pkg),
      tradeDeskRecordId: getTradeDeskRecordId(found.pkg)
    });

    const rec = {
      ...found.pkg,
      bids: Array.isArray(found.pkg.bids) ? [...found.pkg.bids] : []
    };

    const packetId = getBidPackageId(rec);
    const tradeDeskRecordId = getTradeDeskRecordId(rec) || targetRecordId || packetId;

    const existingBidIndex = rec.bids.findIndex(b =>
      String(b.bidder_company || b.bidder || "").toLowerCase().trim() ===
      bidderCompany.toLowerCase().trim()
    );

    const bidPayload = {
      bid_id: existingBidIndex >= 0 ? rec.bids[existingBidIndex].bid_id : uid("bid"),
      bidder: bidderCompany,
      bidder_company: bidderCompany,
      bidder_email: approvedBidderEmail,
      amount,
      terms,
      expires,
      submitted_at: new Date().toISOString(),
      source: "ESPIN LINK Bidder Portal"
    };

    if (existingBidIndex >= 0) {
      rec.bids[existingBidIndex] = bidPayload;
    } else {
      rec.bids.push(bidPayload);
    }

    rec.bid_status = "Bids Received";
    rec.buyer_response_status = "Buyer Responses Received";
    rec.crm_status = "Buyer Response Records Received";
    rec.quote_sync_status = rec.quote_sync_status || "Pending Bid";
    rec.last_bid_at = new Date().toISOString();
    rec.last_bid_received_at = rec.last_bid_at;
    rec.last_bidder_company = bidderCompany;
    rec.last_bidder_email = approvedBidderEmail;
    rec.bid_count = rec.bids.length;

    function samePackage(pkg){
      const normalized = normalizePortalPackage(pkg);

      const ids = [
        normalized.id,
        normalized.trade_desk_record_id,
        normalized.package_id,
        normalized.packet_id,
        normalized.review_packet_id,
        normalized.bid_package_id,
        getBidPackageId(normalized),
        getTradeDeskRecordId(normalized)
      ].map(v => String(v || "").trim()).filter(Boolean);

      return (
        ids.includes(targetRecordId) ||
        ids.includes(tradeDeskRecordId) ||
        ids.includes(packetId) ||
        packageMatches(normalized, targetRecordId, packetId)
      );
    }

    function updatePacketArray(arr, label){
      let foundMatch = false;

      const updated = arr.map(pkg => {
        if (!samePackage(pkg)) return pkg;

        foundMatch = true;
        return buildUpdatedPackage(pkg, rec, packetId, tradeDeskRecordId, bidderCompany, approvedBidderEmail);
      });

      if (!foundMatch) {
        updated.unshift(buildUpdatedPackage({}, rec, packetId, tradeDeskRecordId, bidderCompany, approvedBidderEmail));
      }

      console.log("updatePacketArray()", {
        label,
        before: arr.length,
        after: updated.length,
        foundMatch
      });

      return updated;
    }

    bidderPackages = updatePacketArray(bidderPackages, BIDDER_PORTAL_KEY);
    buyerPackets = updatePacketArray(buyerPackets, BUYER_PACKET_KEY);
    tradeDeskRecords = updatePacketArray(tradeDeskRecords, TRADE_DESK_KEY);
    syncRecords = updatePacketArray(syncRecords, TRADEIN_SYNC_KEY);

    saveArray(BIDDER_PORTAL_KEY, bidderPackages);
    saveArray(BUYER_PACKET_KEY, buyerPackets);
    saveArray(TRADE_DESK_KEY, tradeDeskRecords);
    saveArray(TRADEIN_SYNC_KEY, syncRecords);

    const responsePayload = {
      id: `buyer_response_${Date.now()}_${Math.random().toString(16).slice(2)}`,
      source_event: "buyer_response_submitted",
      trade_desk_record_id: tradeDeskRecordId,
      package_id: packetId,
      packet_id: packetId,
      review_packet_id: rec.review_packet_id || packetId,
      bid_package_id: rec.bid_package_id || packetId,
      bids: rec.bids,
      bid_status: "Bids Received",
      buyer_response_status: "Buyer Responses Received",
      crm_status: "Buyer Response Records Received",
      last_bid_at: rec.last_bid_at,
      last_bid_received_at: rec.last_bid_received_at,
      last_bidder_company: bidderCompany,
      last_bidder_email: approvedBidderEmail,
      bid_count: rec.bids.length
    };

    let responseOutbox = loadArray(BUYER_RESPONSE_OUTBOX_KEY);

    const outboxIndex = responseOutbox.findIndex(item =>
      String(item.review_packet_id || "") === String(responsePayload.review_packet_id || "") ||
      String(item.bid_package_id || "") === String(responsePayload.bid_package_id || "") ||
      String(item.package_id || "") === String(responsePayload.package_id || "") ||
      String(item.packet_id || "") === String(responsePayload.packet_id || "") ||
      String(item.trade_desk_record_id || "") === String(responsePayload.trade_desk_record_id || "")
    );

    if (outboxIndex >= 0) {
      responseOutbox[outboxIndex] = {
        ...responseOutbox[outboxIndex],
        ...responsePayload
      };
    } else {
      responseOutbox.unshift(responsePayload);
    }

    saveArray(BUYER_RESPONSE_OUTBOX_KEY, responseOutbox);

    localStorage.setItem(LAST_SYNC_KEY, JSON.stringify(responsePayload));
    localStorage.setItem(MANAGER_PING_KEY, String(Date.now()));

    console.log("SUBMIT BID SAVED SUCCESSFULLY", {
      packetId,
      tradeDeskRecordId,
      bidsCount: rec.bids.length,
      responseOutboxCount: responseOutbox.length,
      bidPayload
    });

    setBidButtonState(recordId, "submitted", btnEl);

    if (successBox) {
      successBox.textContent = "Bid submitted successfully to AXIS Trade Desk.";
      successBox.style.display = "block";
    }

    draft.amount = "";
    draft.terms = "";
    draft.expires = "";

    if (amountInput) amountInput.value = "";
    if (termsInput) termsInput.value = "";
    if (expiresInput) expiresInput.value = "";

    userManuallyClosedPackage = false;
    openPackageId = String(recordId || tradeDeskRecordId || rec.id || "");

    setTimeout(() => {
      console.log("Submit button reset after success", {
        recordId
      });

      setBidButtonState(recordId, "reset", btnEl);
      suppressRenderUntil = 0;
      render(true);
    }, 1500);

  }catch(err){
    console.error("SUBMIT BID ERROR", err);

    if (errorBox) {
      errorBox.textContent = `Submit bid failed: ${err.message || err}`;
      errorBox.style.display = "block";
    } else {
      alert(`Submit bid failed: ${err.message || err}`);
    }

    setBidButtonState(recordId, "reset", btnEl);
    suppressRenderUntil = 0;
  }
}

  });

  const toggleBtn = target.closest(".js-toggle-package");
  if (toggleBtn) {
    e.preventDefault();
    e.stopPropagation();

    const recordId = String(toggleBtn.dataset.recordId || "").trim();

    console.log("OPEN/CLOSE PACKAGE BUTTON CLICKED", {
      recordId,
      disabled: toggleBtn.disabled
    });

    togglePackage(recordId);
    return;
  }

  const submitBtn = target.closest(".js-submit-bid");
  if (submitBtn) {
    e.preventDefault();
    e.stopPropagation();

    const recordId = String(submitBtn.dataset.recordId || "").trim();

    console.log("SUBMIT BID BUTTON CLICKED", {
      recordId,
      buttonId: submitBtn.id,
      disabled: submitBtn.disabled,
      safeRecordId: idSafe(recordId),
      buttonText: submitBtn.textContent.trim()
    });

    if (!recordId) {
      console.error("Submit button has no data-record-id.");
      alert("No record ID found on Submit Bid button.");
      return;
    }

    if (submitBtn.disabled) {
      console.warn("Submit button clicked but it is disabled.");
      return;
    }

    submitBid(recordId, submitBtn);
    return;
  }

  const imgBox = target.closest(".js-preview-image");
  if (imgBox) {
    e.preventDefault();
    e.stopPropagation();

    openImagePreview(imgBox.dataset.url || "", imgBox.dataset.title || "Equipment Image");
  }
}, true);

document.addEventListener("input", function(e){
  const input = e.target.closest(".js-bid-input");
  if (!input) return;

  const recordId = String(input.dataset.recordId || "").trim();
  if (!recordId) return;

  syncDraftFromInputs(recordId);
}, true);

document.getElementById("imagePreviewOverlay").addEventListener("click", function(){
  closeImagePreview();
});

document.querySelector(".image-preview-box").addEventListener("click", function(e){
  e.stopPropagation();
});

document.getElementById("closePreviewBtn").addEventListener("click", function(){
  closeImagePreview();
});

window.addEventListener("storage", (e) => {
  const watchedKeys = [
    BIDDER_PORTAL_KEY,
    BUYER_PACKET_KEY,
    TRADE_DESK_KEY,
    TRADEIN_SYNC_KEY,
    BUYER_RESPONSE_OUTBOX_KEY,
    MANAGER_PING_KEY
  ];

  if (!watchedKeys.includes(e.key)) return;
  if (shouldBlockAutoRender()) return;

  render();
});

window.addEventListener("focus", () => {
  console.log("window focus", {
    openPackageId,
    suppressRenderUntil
  });

  suppressRenderUntil = 0;

  document.querySelectorAll("button[id^='submitBidBtn_']").forEach(btn => {
    if (btn.disabled && !btn.classList.contains("is-success")) {
      btn.disabled = false;
      btn.classList.remove("is-loading", "is-success");
      btn.textContent = "Submit Bid";
    }
  });
});

window.addEventListener("pageshow", () => {
  console.log("pageshow event");
  suppressRenderUntil = 0;
});

setInterval(() => {
  if (shouldBlockAutoRender()) return;
  render();
}, 2500);
render(true);
</script>

</body>
</html>
