<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
:root { --blue:#0066B2; --gray:#777; --bg:#f6f6f6; --danger:#d93025; }

html, body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  overscroll-behavior:none;
  font-family:Arial,sans-serif;
  background:var(--bg);
}

.header{
  padding:20px;
  font-size:26px;
  font-weight:800;
  color:var(--blue);
}

.add-project-btn{
  position:fixed;
  top:18px;
  right:18px;
  padding:14px 20px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  z-index:3000;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.list{
  padding:0 20px;
  margin-top:32px;
  height:calc(100dvh - 150px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
  cursor:pointer;
  position:relative;
}

.card.archived { opacity:.75; }

.archived-label{
  background:#eee;
  color:#444;
  font-size:12px;
  font-weight:800;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid #ccc;
}

.card h3.title-inline{
  display:flex;
  align-items:center;
  gap:12px;
  margin:0;
  font-size:20px;
  color:#333;
  padding-right:90px;
}

.card p{
  margin:6px 0 0;
  color:var(--gray);
  font-size:14px;
}

.badge-wrap{ display:flex; gap:12px; margin-top:4px; }

.badge{
  color:#fff;
  font-size:12px;
  font-weight:800;
  padding:4px 8px;
  border-radius:999px;
  background:var(--blue);
}

.card-actions{
  position:absolute;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
}

.icon-btn{
  background:#f8f9fa;
  border:1px solid #eee;
  border-radius:8px;
  width:38px;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:5000;
}

.modal-box{
  background:#fff;
  width:90%;
  max-width:420px;
  border-radius:20px;
  padding:24px;
}

.modal-box label{
  display:block;
  font-size:13px;
  font-weight:700;
  margin-top:12px;
}

.modal-box input,
.modal-box select{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ccc;
}

.primary{
  background:var(--blue);
  color:#fff;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  margin-top:20px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:80px;
  padding-bottom:env(safe-area-inset-bottom);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-around;
  border-top:1px solid #ddd;
}

.nav a{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:var(--gray);
  font-size:12px;
}

.nav a.active{
  color:var(--blue);
  font-weight:800;
}
</style>
</head>

<body>

<div class="header">Projects</div>
<button class="add-project-btn" id="addBtn" onclick="openProjectModal()">ADD PROJECT</button>

<div class="list" id="projectList"></div>

<!-- PROJECT MODAL -->

<div class="modal" id="projectModal">
<div class="modal-box">

<h3 id="modalTitle">Add Project</h3>
<input type="hidden" id="editId">

<label>Project Name</label>
<input id="inpName">

<label>Site Address</label>
<input id="inpAddress">

<label>Zip Code</label>
<input id="inpZip">

<label>Equipment Type</label>
<select id="mModality">
<option value="">Select Modality</option>
<option value="MRI">MRI</option>
<option value="CT">CT</option>
<option value="CARM">C-Arm</option>
<option value="XRAY">X-Ray</option>
<option value="MAMO">Mammography</option>
<option value="NM">Nuclear Medicine</option>
<option value="OTHER">Other</option>
</select>

<div id="mriBlock" style="display:none">
<label>Magnet Event Required?</label>
<select id="mMagnet">
<option value="">None</option>
<option value="ramp_down">Magnet Ramp Down</option>
<option value="quench">Magnet Quench</option>
</select>
</div>

<label>Disposal Service</label>
<select id="mDisposal">
<option value="false">No Disposal Needed</option>
<option value="true">Disposal Required</option>
</select>

<button class="primary" id="saveBtn" onclick="saveProject()">Save Project</button>
<button class="primary" style="background:#eee;color:#333;margin-top:10px;" onclick="closeProjectModal()">Cancel</button>

</div>
</div>

<div class="nav">
<a href="Home.html">🏠<br>Home</a>
<a href="Projects.html" class="active">🛠️<br>Projects</a>
</div>

<script>

let email = localStorage.getItem("espinUserEmail");
email = String(email || "").toLowerCase().trim();

if(!email) location.replace("index.html");

const isAdmin = email === "info@espinmedical.com";

/* MRI BLOCK */

function toggleMriBlock(mod){
document.getElementById("mriBlock").style.display =
mod==="MRI" ? "block" : "none";
}

document.getElementById("mModality").addEventListener("change",e=>{
toggleMriBlock(e.target.value);
});

/* MODAL */

function openProjectModal(p=null){

document.getElementById("editId").value=p?p.id:"";
document.getElementById("inpName").value=p?p.project_name:"";
document.getElementById("inpAddress").value=p?p.site_address:"";
document.getElementById("inpZip").value=p?p.zip_code:"";
document.getElementById("mModality").value=p?p.modality:"";

toggleMriBlock(document.getElementById("mModality").value);

document.getElementById("projectModal").style.display="flex";

}

function closeProjectModal(){
document.getElementById("projectModal").style.display="none";
}

/* SAVE PROJECT */

async function saveProject(){

const saveBtn=document.getElementById("saveBtn");
saveBtn.disabled=true;
saveBtn.innerText="Saving...";

const id=document.getElementById("editId").value;
const modality=document.getElementById("mModality").value;

const payload={
action:id?"update":"create",
id:id||undefined,
project_name:document.getElementById("inpName").value,
site_address:document.getElementById("inpAddress").value,
zip_code:document.getElementById("inpZip").value,
modality:modality,
magnet_event:modality==="MRI"?document.getElementById("mMagnet").value:null,
disposal_required:document.getElementById("mDisposal").value==="true"
};

try{

const r=await fetch("/api/projects",{
method:"POST",
headers:{ "Content-Type":"application/json","x-user-email":email },
body:JSON.stringify(payload)
});

const result=await r.json();

closeProjectModal();

if(!id){

const map={
MRI:"MRI",
CT:"CT",
CARM:"CARM",
XRAY:"XRAY",
MAMO:"MAMO",
NM:"PETCT",
OTHER:"Other"
};

const mod=map[modality];

if(mod){
location.href=`equipment-forms.html?mod=${mod}&projectId=${result.id}`;
return;
}

}

loadProjectsSafe();

}catch(e){
console.error(e);
alert("Save failed");
}

saveBtn.disabled=false;
saveBtn.innerText="Save Project";

}

/* PROJECT LIST */

async function loadProjects(){

const list=document.getElementById("projectList");

const r=await fetch("/api/projects",{headers:{"x-user-email":email}});
const projects=await r.json();

list.innerHTML="";

for(const p of projects){

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3 class="title-inline">${p.project_name}</h3>
<p>${p.site_address||""} ${p.zip_code||""}</p>
<p><strong>Modality:</strong> ${p.modality||""}</p>
`;

card.onclick=()=>{
location.href=`management.html?id=${p.id}`;
};

list.appendChild(card);

}

}

function loadProjectsSafe(){
loadProjects();
}

document.addEventListener("DOMContentLoaded",loadProjectsSafe);

</script>

</body>
</html>
