<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
:root { --blue:#0066B2; --gray:#777; --bg:#f6f6f6; }

html, body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
overscroll-behavior:none;
font-family:Arial,sans-serif;
background:var(--bg);
}

.header{
padding:20px;
font-size:26px;
font-weight:800;
color:var(--blue);
}

.add-project-btn{
position:fixed;
top:18px;
right:18px;
padding:14px 20px;
background:var(--blue);
color:#fff;
border:none;
border-radius:14px;
font-size:14px;
font-weight:800;
cursor:pointer;
z-index:3000;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.list{
padding:0 20px;
margin-top:32px;
height:calc(100dvh - 150px);
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.card{
background:#fff;
border-radius:16px;
padding:18px;
margin-bottom:14px;
box-shadow:0 6px 16px rgba(0,0,0,.12);
cursor:pointer;
}

.card h3{
margin:0;
font-size:20px;
}

.card p{
margin:6px 0 0;
color:var(--gray);
font-size:14px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
z-index:5000;
}

.modal-box{
background:#fff;
width:90%;
max-width:420px;
border-radius:20px;
padding:24px;
}

.modal-box label{
display:block;
font-size:13px;
font-weight:700;
margin-top:12px;
}

.modal-box input{
width:100%;
padding:12px;
margin-top:5px;
border-radius:12px;
border:1px solid #ccc;
}

.primary{
background:var(--blue);
color:#fff;
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
margin-top:20px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
height:80px;
padding-bottom:env(safe-area-inset-bottom);
background:#fff;
display:flex;
align-items:center;
justify-content:space-around;
border-top:1px solid #ddd;
}

.nav a{
flex:1;
text-align:center;
text-decoration:none;
color:var(--gray);
font-size:12px;
}

.nav a.active{
color:var(--blue);
font-weight:800;
}
</style>
</head>

<body>

<div class="header">Projects</div>

<button class="add-project-btn" onclick="openProjectModal()">ADD PROJECT</button>

<div class="list" id="projectList"></div>

<div class="modal" id="projectModal">
<div class="modal-box">

<h3>Add Project</h3>

<input type="hidden" id="editId">

<label>Site Name</label>
<input id="inpName">

<label>Site Address</label>
<input id="inpAddress">

<label>Zip Code</label>
<input id="inpZip">

<label>Sales Rep First Name</label>
<input id="inpSalesFirst">

<label>Sales Rep Last Name</label>
<input id="inpSalesLast">

<label>Sales Rep Phone</label>
<input id="inpSalesPhone">

<label>Sales Rep Email</label>
<input id="inpSalesEmail">

<button class="primary" id="saveBtn" onclick="saveProject()">Save Project</button>

<button class="primary" style="background:#eee;color:#333;margin-top:10px;" onclick="closeProjectModal()">Cancel</button>

</div>
</div>

<div class="nav">
<a href="Home.html">🏠<br>Home</a>
<a href="Projects.html" class="active">🛠️<br>Projects</a>
</div>

<script>

let email = localStorage.getItem("espinUserEmail");
email = String(email || "").toLowerCase().trim();

if(!email) location.replace("index.html");

function openProjectModal(p=null){

document.getElementById("editId").value=p?p.id:"";
document.getElementById("inpName").value=p?p.project_name:"";
document.getElementById("inpAddress").value=p?p.site_address:"";
document.getElementById("inpZip").value=p?p.zip_code:"";

document.getElementById("inpSalesFirst").value=p?p.sales_rep_first||"":"";
document.getElementById("inpSalesLast").value=p?p.sales_rep_last||"":"";
document.getElementById("inpSalesPhone").value=p?p.sales_rep_phone||"":"";
document.getElementById("inpSalesEmail").value=p?p.sales_rep_email||"":"";

document.getElementById("projectModal").style.display="flex";
}

function closeProjectModal(){
document.getElementById("projectModal").style.display="none";
}

async function saveProject(){

const saveBtn=document.getElementById("saveBtn");
saveBtn.disabled=true;
saveBtn.innerText="Saving...";

const id=document.getElementById("editId").value;

const payload={
action:id?"update":"create",
id:id||undefined,

project_name:document.getElementById("inpName").value,
site_address:document.getElementById("inpAddress").value,
zip_code:document.getElementById("inpZip").value,

sales_rep_first:document.getElementById("inpSalesFirst").value,
sales_rep_last:document.getElementById("inpSalesLast").value,
sales_rep_phone:document.getElementById("inpSalesPhone").value,
sales_rep_email:document.getElementById("inpSalesEmail").value
};

try{

const r=await fetch("/api/admin/projects",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-user-email":email
},
body:JSON.stringify(payload)
});

if(!r.ok){
throw new Error("API failed");
}

const result=await r.json();

closeProjectModal();

if(!id){
location.href=`equipment-details.html?projectId=${result.id}`;
return;
}

loadProjects();

}catch(e){

console.error(e);
alert("Save failed");

}

saveBtn.disabled=false;
saveBtn.innerText="Save Project";
}

async function loadProjects(){

const list=document.getElementById("projectList");

try{

const r=await fetch("/api/admin/projects",{
headers:{ "x-user-email":email }
});

if(!r.ok){
throw new Error("API error");
}

const projects=await r.json();

if(!Array.isArray(projects)){
console.error("Unexpected API response",projects);
list.innerHTML="<p style='padding:20px'>No projects found</p>";
return;
}

list.innerHTML="";

for(const p of projects){

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${p.project_name||""}</h3>
<p>${p.site_address||""} ${p.zip_code||""}</p>
<p><strong>Sales Rep:</strong> ${p.sales_rep_first||""} ${p.sales_rep_last||""}</p>
`;

card.onclick=()=>{
location.href=`equipment-details.html?projectId=${p.id}`;
};

list.appendChild(card);

}

}catch(e){

console.error(e);
document.getElementById("projectList").innerHTML=
"<p style='padding:20px'>Failed to load projects</p>";

}

}

document.addEventListener("DOMContentLoaded",loadProjects);

</script>

</body>
</html>
