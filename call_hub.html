<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ESPIN Medical Outreach Hub</title><style>
:root{--bg:#071425;--panel:#0d1d31;--line:#203853;--blue:#2e8cff;--text:#edf5ff;--muted:#8fa8c3;--green:#47d7a2;--amber:#ffbe5c}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% -20%,#173f69,transparent 35%),var(--bg);color:var(--text);font:14px Inter,system-ui,sans-serif}.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);padding:24px 17px;background:#061321}.brand{display:flex;gap:10px;align-items:center;margin-bottom:30px}.mark{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;background:linear-gradient(135deg,#60d6ff,var(--blue));color:#061526;font-weight:900}.brand strong{letter-spacing:.1em}.brand small{display:block;color:var(--muted);font-size:10px}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;color:var(--muted);padding:11px;text-align:left;border-radius:9px}.nav button.active{background:#12304f;color:white}.main{min-width:0}.top{height:74px;border-bottom:1px solid var(--line);padding:0 26px;display:flex;align-items:center;justify-content:space-between}.top h1{font-size:20px;margin:0}.top p{color:var(--muted);margin:3px 0}.btn{border:1px solid var(--line);background:#10263f;color:white;padding:9px 13px;border-radius:9px;font-weight:700;cursor:pointer}.btn.primary{background:linear-gradient(135deg,#2d8eff,#1766cf)}.content{padding:22px 26px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat,.card{background:linear-gradient(145deg,#102844,#0a1c30);border:1px solid var(--line);border-radius:14px}.stat{padding:16px}.stat span{font-size:11px;color:var(--muted);font-weight:800}.stat b{display:block;font-size:26px;margin-top:6px}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;margin-top:14px}.head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.head h2{font-size:15px;margin:0}.feed,.directory{padding:6px 18px 16px}.event{display:grid;grid-template-columns:10px 1fr auto;gap:10px;padding:13px 0;border-bottom:1px solid var(--line)}.dot{width:8px;height:8px;border-radius:50%;background:var(--blue);margin-top:5px}.event p{margin:0}.event small{display:block;color:var(--muted);margin-top:4px}.badge{color:#78e3ba;background:#123b35;padding:4px 7px;border-radius:6px;font-size:10px;font-weight:800}.empty{text-align:center;color:var(--muted);padding:35px}.row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:13px 0;border-bottom:1px solid var(--line)}.row strong,.row small{display:block}.row small{color:var(--muted);margin-top:4px}.sync{color:var(--green);display:flex;align-items:center;gap:7px}.sync:before{content:'';width:8px;height:8px;border-radius:50%;background:var(--green)}@media(max-width:850px){.app{grid-template-columns:1fr}.side{display:none}.stats{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.top{padding:0 14px}.content{padding:15px}}@media(max-width:480px){.stats{grid-template-columns:1fr}}
</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="mark">E</div><div><strong>ESPIN MEDICAL</strong><small>OUTREACH HUB</small></div></div><nav class="nav"><button class="active">⌂ Overview</button><button>▦ Facilities</button><button>☎ Call Queue</button><button>✉ Email Outreach</button><button>✓ Follow-Ups</button><button>▥ Reports</button></nav></aside><main class="main"><header class="top"><div><h1>Manager Overview</h1><p>Employee outreach activity and facility status</p></div><div style="display:flex;gap:9px;align-items:center"><span class="sync">Sync active</span><button class="btn primary" onclick="location.href='call_employee.html'">Open Employee Desk</button></div></header><div class="content"><section class="stats"><div class="stat"><span>TOTAL FACILITIES</span><b>7</b></div><div class="stat"><span>CALLS COMPLETED</span><b id="calls">0</b></div><div class="stat"><span>CONNECTED / INTERESTED</span><b id="connected">0</b></div><div class="stat"><span>FOLLOW-UPS CREATED</span><b id="followups">0</b></div></section><div class="grid"><section class="card"><div class="head"><h2>Employee Activity Feed</h2><span id="lastSync" style="color:var(--muted);font-size:12px">Waiting for activity</span></div><div class="feed" id="feed"></div></section><section class="card"><div class="head"><h2>Facility Call Status</h2><span style="color:var(--muted);font-size:12px">Today’s queue</span></div><div class="directory" id="directory"></div></section></div></div></main></div><script>
const SYNC_KEY='espinOutreachActivities';const syncChannel='BroadcastChannel' in window?new BroadcastChannel('espin-outreach-sync'):null;const facilities=[{id:1,n:'Swedish First Hill Campus',p:'Seattle, WA'},{id:2,n:'RAYUS Radiology – Bellevue',p:'Bellevue, WA'},{id:3,n:'OHSU Hospital',p:'Portland, OR'},{id:4,n:'UC Davis Medical Center',p:'Sacramento, CA'},{id:5,n:"St. Luke’s Boise Medical Center",p:'Boise, ID'},{id:6,n:'Sutter Imaging Sacramento',p:'Sacramento, CA'},{id:7,n:'Providence Cancer Institute',p:'Portland, OR'}];const $=s=>document.querySelector(s);function logs(){try{return JSON.parse(localStorage.getItem(SYNC_KEY)||'[]')}catch{return[]}}function render(){const a=logs(),latest=new Map();a.forEach(x=>{if(!latest.has(x.facilityId))latest.set(x.facilityId,x)});const v=[...latest.values()];$('#calls').textContent=v.length;$('#connected').textContent=v.filter(x=>['Connected','Interested'].includes(x.outcome)).length;$('#followups').textContent=v.filter(x=>x.followUp).length;$('#lastSync').textContent=a.length?'Updated '+a[0].timeLabel:'Waiting for activity';$('#feed').innerHTML=a.length?a.slice(0,12).map(x=>`<div class="event"><i class="dot"></i><div><p><strong>${x.employee}</strong> marked <strong>${x.facility}</strong> as ${x.outcome}</p><small>${x.timeLabel}${x.contact?' · '+x.contact:''}${x.notes?' · '+x.notes:''}</small></div><span class="badge">${x.outcome}</span></div>`).join(''):'<div class="empty">Employee calls will appear here as they are saved.</div>';$('#directory').innerHTML=facilities.map(f=>{const x=latest.get(f.id);return `<div class="row"><div><strong>${f.n}</strong><small>${f.p}${x?.contact?' · '+x.contact:''}</small></div><span class="badge">${x?.outcome||'Not Called'}</span></div>`}).join('')}window.addEventListener('storage',e=>{if(e.key===SYNC_KEY)render()});syncChannel?.addEventListener('message',render);window.addEventListener('focus',render);window.addEventListener('pageshow',render);document.addEventListener('visibilitychange',()=>{if(!document.hidden)render()});setInterval(render,1500);render();
</script></body></html>
