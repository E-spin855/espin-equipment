<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equipment Projects | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
:root{
  --blue:#1F7BC8;
  --gray:#777;
  --bg:#f6f6f6;
  --danger:#d92d20;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  overscroll-behavior:none;
  font-family:Arial,sans-serif;
  background:var(--bg);
  -webkit-tap-highlight-color:transparent;
}

body{
  padding-top:118px;
}

/* ===== TOP HEADER ===== */
.header{
  background:var(--blue);
  color:#fff;
  padding-top:env(safe-area-inset-top);
  height:118px;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:3000;
  box-sizing:border-box;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding-left:18px;
  padding-right:18px;
  padding-bottom:18px;
}

.header-spacer{
  width:1px;
  flex:0 0 1px;
}

.header h1{
  margin:0;
  font-size:20px;
  font-weight:500;
  color:#fff;
  line-height:1;
  white-space:nowrap;
  flex:1;
  text-align:center;
  pointer-events:none;
}

.add-project-btn{
  padding:14px 22px;
  background:#F2F4F7;
  color:var(--blue);
  border:none;
  border-radius:18px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  z-index:3001;
  box-shadow:0 8px 20px rgba(0,0,0,.16);
  -webkit-appearance:none;
  appearance:none;
  flex:0 0 auto;
  touch-action:manipulation;
}

/* ===== LIST ===== */
.list{
  padding:20px 20px 0;
  margin-top:0;
  height:calc(100dvh - 118px - 80px - env(safe-area-inset-bottom));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  box-sizing:border-box;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
  position:relative;
}

.card-main{
  cursor:pointer;
}

.card h3{
  margin:0;
  font-size:20px;
  color:#000;
  padding-right:72px;
}

.card p{
  margin:6px 0 0;
  color:var(--gray);
  font-size:14px;
}

.project-count-badge{
  position:absolute;
  top:16px;
  right:16px;
  min-width:30px;
  height:30px;
  padding:0 10px;
  border-radius:999px;
  background:#ff3b30;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:800;
  box-shadow:0 6px 16px rgba(255,59,48,.35);
}

.card-actions{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:10px;
  margin-top:14px;
}

.view-equipment-btn{
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:10px 14px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  -webkit-appearance:none;
  appearance:none;
  touch-action:manipulation;
}

.icon-btn{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background:#f2f4f7;
  cursor:pointer;
  font-size:18px;
  user-select:none;
  -webkit-user-select:none;
  flex:0 0 44px;
  border:none;
  padding:0;
  -webkit-appearance:none;
  appearance:none;
  touch-action:manipulation;
  position:relative;
  z-index:9999;
  pointer-events:auto;
}

.delete-btn{
  color:var(--danger);
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:5000;
  padding:20px;
  box-sizing:border-box;
}

.modal-box{
  background:#fff;
  width:100%;
  max-width:420px;
  border-radius:20px;
  padding:24px;
  box-sizing:border-box;
  max-height:90dvh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.modal-box h3{
  margin:0 0 10px;
  color:#000;
}

.modal-box label{
  display:block;
  font-size:13px;
  font-weight:700;
  margin-top:12px;
  color:#333;
}

.modal-box input{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:16px;
}

.primary{
  background:var(--blue);
  color:#fff;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  margin-top:20px;
  -webkit-appearance:none;
  appearance:none;
  touch-action:manipulation;
}

.secondary{
  background:#eee;
  color:#333;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  margin-top:10px;
  -webkit-appearance:none;
  appearance:none;
  touch-action:manipulation;
}

/* ===== DELETE CONFIRM MODAL ===== */
.confirm-text{
  margin:0;
  color:#333;
  font-size:15px;
  line-height:1.5;
}

.danger{
  background:var(--danger);
  color:#fff;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  margin-top:20px;
  -webkit-appearance:none;
  appearance:none;
  touch-action:manipulation;
}

/* ===== BOTTOM NAV ===== */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:80px;
  padding-bottom:env(safe-area-inset-bottom);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-around;
  border-top:1px solid #ddd;
  box-sizing:border-box;
}

.nav a{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:var(--gray);
  font-size:12px;
}

.nav a.active{
  color:var(--blue);
  font-weight:800;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-spacer"></div>
  <h1>Projects</h1>
  <button class="add-project-btn" id="addBtn" type="button" onclick="openProjectModal()">ADD PROJECT</button>
</div>

<div class="list" id="projectList"></div>

<div class="modal" id="projectModal">
  <div class="modal-box">
    <h3 id="modalTitle">Add Project</h3>

    <input type="hidden" id="editId">

    <label>Site Name</label>
    <input id="inpName">

    <label>Site Address</label>
    <input id="inpAddress">

    <label>Zip Code</label>
    <input id="inpZip">

    <label>Sales Rep First Name</label>
    <input id="inpSalesFirst">

    <label>Sales Rep Last Name</label>
    <input id="inpSalesLast">

    <label>Sales Rep Phone</label>
    <input id="inpSalesPhone">

    <label>Sales Rep Email</label>
    <input id="inpSalesEmail">

    <button class="primary" id="saveBtn" type="button" onclick="saveProject()">Save Project</button>
    <button class="secondary" type="button" onclick="closeProjectModal()">Cancel</button>
  </div>
</div>

<div class="modal" id="deleteModal">
  <div class="modal-box">
    <h3>Delete Project</h3>
    <p class="confirm-text" id="deleteConfirmText">Are you sure you want to delete this project?</p>
    <button class="danger" id="confirmDeleteBtn" type="button">Delete Project</button>
    <button class="secondary" id="cancelDeleteBtn" type="button">Cancel</button>
  </div>
</div>

<div class="nav">
  <a href="/index.html">🏠<br>Home</a>
  <a href="/equipment-projects.html" class="active">🛠️<br>Projects</a>
</div>

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_KEY = `${APP_PREFIX}activeModality`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;

let email = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();
const auth = localStorage.getItem(AUTH_KEY);

let deleteBusy = false;
let pendingDeleteId = "";
let pendingDeleteName = "";
let unreadSummary = { total: 0, projects: {}, images: {} };

if (auth !== "true" || !email) {
  location.replace("/index.html");
}

function field(id) {
  return document.getElementById(id);
}

function resetProjectState(projectId) {
  localStorage.setItem(PROJECT_ID_KEY, projectId);
  localStorage.removeItem(MODALITY_KEY);
  localStorage.removeItem(MODALITY_ID_KEY);
  localStorage.removeItem(`${MODALITY_ID_KEY}_${projectId}`);
  localStorage.removeItem(`${MODALITY_KEY}_${projectId}`);
}

async function refreshEquipmentBadge() {
  try {
    await fetch("/api/badge-refresh-equipment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": email
      },
      body: JSON.stringify({ email })
    });
  } catch {}
}

async function loadUnreadSummary() {
  try {
    const url = `/api/equipment-updates?t=${Date.now()}`;
    const r = await fetch(url, {
      method: "GET",
      cache: "no-store",
      headers: {
        "x-user-email": email,
        "Cache-Control": "no-cache"
      }
    });

    const out = await r.json().catch(() => ({}));

    if (!r.ok) {
      throw new Error(out?.error || "Failed to load unread summary");
    }

    unreadSummary = {
      total: Number(out?.total) || 0,
      projects: out?.projects && typeof out.projects === "object" ? out.projects : {},
      images: out?.images && typeof out.images === "object" ? out.images : {}
    };
  } catch {
    unreadSummary = { total: 0, projects: {}, images: {} };
  }
}

function getProjectUnreadCount(projectId) {
  return Number(unreadSummary?.projects?.[projectId]) || 0;
}

function goToProjectDetails(projectId) {
  resetProjectState(projectId);
  location.href = `equipment-details.html?projectId=${encodeURIComponent(projectId)}&source=projects&mode=create`;
}

function goToEquipmentIndex(projectId) {
  resetProjectState(projectId);
  location.href = `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
}

function openProjectModal(p = null) {
  field("modalTitle").textContent = p ? "Edit Project" : "Add Project";
  field("editId").value = p?.id || "";
  field("inpName").value = p?.project_name || "";
  field("inpAddress").value = p?.site_address || "";
  field("inpZip").value = p?.zip_code || "";
  field("inpSalesFirst").value = p?.sales_rep_first || "";
  field("inpSalesLast").value = p?.sales_rep_last || "";
  field("inpSalesPhone").value = p?.sales_rep_phone || "";
  field("inpSalesEmail").value = p?.sales_rep_email || "";
  field("projectModal").style.display = "flex";
}

function closeProjectModal() {
  field("projectModal").style.display = "none";
}

function openDeleteModal(projectId, projectName) {
  pendingDeleteId = String(projectId || "").trim();
  pendingDeleteName = String(projectName || "").trim();

  field("deleteConfirmText").textContent =
    `Are you sure you want to delete "${pendingDeleteName || "this project"}"? This cannot be undone.`;

  field("deleteModal").style.display = "flex";
}

function closeDeleteModal() {
  field("deleteModal").style.display = "none";
  pendingDeleteId = "";
  pendingDeleteName = "";
}

async function saveProject() {
  const saveBtn = field("saveBtn");
  const id = field("editId").value.trim();
  const isEdit = !!id;

  const payload = {
    id: id || undefined,
    project_name: field("inpName").value.trim(),
    site_address: field("inpAddress").value.trim(),
    zip_code: field("inpZip").value.trim(),
    sales_rep_first: field("inpSalesFirst").value.trim(),
    sales_rep_last: field("inpSalesLast").value.trim(),
    sales_rep_phone: field("inpSalesPhone").value.trim(),
    sales_rep_email: field("inpSalesEmail").value.trim()
  };

  if (!payload.project_name) {
    alert("Site Name is required");
    return;
  }

  saveBtn.disabled = true;
  saveBtn.innerText = "Saving...";

  try {
    const url = isEdit
      ? `/api/admin/projects?id=${encodeURIComponent(id)}`
      : "/api/admin/projects";

    const r = await fetch(url, {
      method: isEdit ? "PUT" : "POST",
      cache: "no-store",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": email,
        "Cache-Control": "no-cache"
      },
      body: JSON.stringify(payload)
    });

    const data = await r.json().catch(() => null);

    if (!r.ok || data?.error) {
      alert(data?.error || "Save failed");
      return;
    }

    closeProjectModal();

    if (!isEdit && data?.id) {
      resetProjectState(data.id);
      location.href = `equipment-details.html?projectId=${encodeURIComponent(data.id)}&source=projects&mode=create`;
      return;
    }

    await loadProjects(true);
  } catch {
    alert("Save failed");
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerText = "Save Project";
  }
}

async function deleteProject(projectId) {
  if (!projectId || deleteBusy) return;

  deleteBusy = true;
  const confirmBtn = field("confirmDeleteBtn");
  const oldText = confirmBtn.textContent;
  confirmBtn.disabled = true;
  confirmBtn.textContent = "Deleting...";

  try {
    const url = `/api/admin/projects?t=${Date.now()}`;
    const payload = {
      action: "delete",
      id: projectId
    };

    const r = await fetch(url, {
      method: "POST",
      cache: "no-store",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": email,
        "Cache-Control": "no-cache"
      },
      body: JSON.stringify(payload)
    });

    const rawText = await r.text();
    let data = null;

    try {
      data = rawText ? JSON.parse(rawText) : null;
    } catch {
      data = { rawText };
    }

    if (!r.ok || data?.error) {
      alert(data?.detail || data?.error || `Delete failed (${r.status})`);
      return;
    }

    closeDeleteModal();
    await loadProjects(true);
  } catch (e) {
    alert(`Delete failed: ${e?.message || e}`);
  } finally {
    deleteBusy = false;
    confirmBtn.disabled = false;
    confirmBtn.textContent = oldText;
  }
}

function bindSafeTap(element, handler) {
  if (!element) return;

  let touchHandled = false;

  element.addEventListener("touchend", (e) => {
    touchHandled = true;
    e.preventDefault();
    e.stopPropagation();
    handler(e);
    setTimeout(() => {
      touchHandled = false;
    }, 500);
  }, { passive: false });

  element.addEventListener("click", (e) => {
    if (touchHandled) {
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    handler(e);
  });
}

async function loadProjects(forceFresh = false) {
  const list = field("projectList");

  try {
    const url = forceFresh
      ? `/api/admin/projects?t=${Date.now()}`
      : "/api/admin/projects";

    const r = await fetch(url, {
      cache: "no-store",
      headers: {
        "x-user-email": email,
        "Cache-Control": "no-cache"
      }
    });

    if (!r.ok) {
      throw new Error("API error");
    }

    const projects = await r.json();

    if (!Array.isArray(projects) || !projects.length) {
      list.innerHTML = "<p style='padding:20px'>No projects found</p>";
      return;
    }

    list.innerHTML = "";

    for (const p of projects) {
      const unreadCount = getProjectUnreadCount(p.id);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        ${unreadCount > 0 ? `<div class="project-count-badge">${unreadCount}</div>` : ""}
        <div class="card-main">
          <h3>${p.project_name || ""}</h3>
          <p>${[p.site_address || "", p.zip_code || ""].filter(Boolean).join(" ")}</p>
          <p><strong>Sales Rep:</strong> ${[p.sales_rep_first || "", p.sales_rep_last || ""].filter(Boolean).join(" ")}</p>
        </div>
        <div class="card-actions">
          <button type="button" class="view-equipment-btn">View Equipment</button>
          <button type="button" class="icon-btn" data-edit="${p.id}" title="Edit" aria-label="Edit project">✏️</button>
          <button type="button" class="icon-btn delete-btn" data-delete="${p.id}" title="Delete" aria-label="Delete project">🗑</button>
        </div>
      `;

      const main = card.querySelector(".card-main");
      const viewBtn = card.querySelector(".view-equipment-btn");
      const editBtn = card.querySelector("[data-edit]");
      const deleteBtn = card.querySelector("[data-delete]");

      bindSafeTap(main, () => goToProjectDetails(p.id));
      bindSafeTap(viewBtn, () => goToEquipmentIndex(p.id));
      bindSafeTap(editBtn, () => openProjectModal(p));
      bindSafeTap(deleteBtn, () => openDeleteModal(p.id, p.project_name));

      list.appendChild(card);
    }
  } catch {
    list.innerHTML = "<p style='padding:20px'>Failed to load projects</p>";
  }
}

document.getElementById("confirmDeleteBtn").addEventListener("click", () => {
  if (!pendingDeleteId) return;
  deleteProject(pendingDeleteId);
});

document.getElementById("cancelDeleteBtn").addEventListener("click", () => {
  closeDeleteModal();
});

document.getElementById("deleteModal").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) {
    closeDeleteModal();
  }
});

window.addEventListener("pageshow", async () => {
  await refreshEquipmentBadge();
  await loadUnreadSummary();
  await loadProjects(true);
});

window.addEventListener("focus", async () => {
  await refreshEquipmentBadge();
  await loadUnreadSummary();
  await loadProjects(true);
});

document.addEventListener("DOMContentLoaded", async () => {
  await refreshEquipmentBadge();
  await loadUnreadSummary();
  await loadProjects(true);
});
</script>
</body>
</html>
