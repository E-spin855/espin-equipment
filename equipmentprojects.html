<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equipment Projects | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
:root{
  --blue:#1F7BC8;
  --gray:#777;
  --bg:#f6f6f6;
  --danger:#d92d20;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:auto;
  overscroll-behavior:none;
  font-family:Arial,sans-serif;
  background:var(--bg);
  -webkit-tap-highlight-color:transparent;
}

body{
  padding-top: calc(env(safe-area-inset-top) + 80px);
}

/* HEADER */
.header{
  background:var(--blue);
  color:#fff;
  position:fixed;
  top:0; left:0; right:0;
  z-index:3000;


  padding-top: calc(env(safe-area-inset-top) + 6px);
  padding-bottom: 10px;

  padding-left:18px;
  padding-right:18px;

  display:flex;
  align-items:center;
  justify-content:space-between;
  box-sizing:border-box;
}

.header h2{
  margin:0;
  font-size:22px;
  font-weight:600;
  text-align:center;
  flex:1;
}

.header-spacer{
  width:1px;
  flex:0 0 1px;
}

.add-project-btn{
  padding:14px 22px;
  background:#F2F4F7;
  color:var(--blue);
  border:none;
  border-radius:18px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,.16);
}

/* LIST */
.list{
  padding:20px 20px 100px; /* 👈 gives space above nav */
  height:auto;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
  position:relative;
}

.card-main{
  cursor:pointer;
}

.card h3{
  margin:0;
  font-size:20px;
}

.card p{
  margin:6px 0 0;
  color:var(--gray);
  font-size:14px;
}

/* BADGE */
.project-count-badge{
  position:absolute;
  top:16px;
  right:16px;
  min-width:30px;
  height:30px;
  padding:0 10px;
  border-radius:999px;
  background:#ff3b30;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:800;
  box-shadow:0 6px 16px rgba(255,59,48,.35);
}

/* RIGHT ICONS */
.icon-row{
  position:absolute;
  top:16px;
  right:16px;

  display:flex;
  gap:10px;
}

/* BUTTONS */
.btn{
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:12px 16px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
}
.badge-wrap{
  margin-top:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.badge{
  background:#111;
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}
.btn.secondary-btn{
  background:#eef5fb;
  color:var(--blue);
}

/* ICON BUTTONS */
.icon-btn{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background:#f2f4f7;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.delete-btn{
  color:var(--danger);
}

/* MODALS */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:5000;
  padding:20px;
}

.modal-box{
  background:#fff;
  width:100%;
  max-width:420px;
  border-radius:20px;
  padding:24px;
  max-height:90dvh;
  overflow-y:auto;
}

.modal-box h3{
  margin:0 0 10px;
}

.modal-box label{
  display:block;
  font-size:13px;
  font-weight:700;
  margin-top:12px;
}

.modal-box input{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

/* PRIMARY BUTTON */
.primary{
  background:var(--blue);
  color:#fff;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  margin-top:20px;
}

/* SECONDARY BUTTON */
.secondary{
  background:#eee;
  color:#333;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  margin-top:10px;
}

/* DANGER */
.danger{
  background:var(--danger);
  color:#fff;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  margin-top:20px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fdfdfd;
  border-top:1px solid #eee;

  display:flex;
  justify-content:space-around;

  padding:8px 0 calc(12px + env(safe-area-inset-bottom));
}

.nav a{
  flex:1;
  text-align:center;
  font-size:12px;
  color:var(--gray);
  text-decoration:none;
}

.nav a.active{
  color:var(--blue);
  font-weight:700;
}

.nav-icon{
  font-size:20px;
  display:block;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-spacer"></div>
  <h2>Projects</h2>
  <button class="add-project-btn" id="addBtn" type="button" onclick="openProjectModal()">ADD PROJECT</button>
</div>

<div class="list" id="projectList"></div>

<div class="modal" id="projectModal">
  <div class="modal-box">
    <h3 id="modalTitle">Add Project</h3>
    <input type="hidden" id="editId">
    <label>Site Name</label>
    <input id="inpName">
    <label>Site Address</label>
    <input id="inpAddress">
<label>City</label>
    <input id="inpCity">
<label>State</label>
    <input id="inpState">
    <label>Zip Code</label>
    <input id="inpZip">
    <label>Sales Rep First Name</label>
    <input id="inpSalesFirst">
    <label>Sales Rep Last Name</label>
    <input id="inpSalesLast">
<label>Sales Rep Company</label>
<input id="inpSalesCompany">
    <label>Sales Rep Phone</label>
    <input id="inpSalesPhone">
    <label>Sales Rep Email</label>
    <input id="inpSalesEmail">
    <button class="primary" id="saveBtn" type="button" onclick="saveProject()">Save Project</button>
    <button class="secondary" type="button" onclick="closeProjectModal()">Cancel</button>
  </div>
</div>

<div class="modal" id="deleteModal">
  <div class="modal-box">
    <h3>Delete Project</h3>
    <p class="confirm-text" id="deleteConfirmText">Are you sure you want to delete this project?</p>
    <button class="danger" id="confirmDeleteBtn" type="button">Delete Project</button>
    <button class="secondary" id="cancelDeleteBtn" type="button">Cancel</button>
  </div>
</div>

<div class="nav">
  <a href="/index.html">🏠<br>Home</a>
  <a href="/equipmentprojects.html" class="active">🛠️<br>Projects</a>
</div>

<script>
async function getChangedMap(projects) {
  const map = {};

  await Promise.all(
    projects.map(async (p) => {
      try {
        const r = await fetch("/api/kv-get", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            key: `equipment:changed:${p.id}`
          })
        });

        const json = await r.json().catch(() => ({}));

        if (!json?.value) {
          map[p.id] = { details: false, images: false };
          return;
        }

        const parsed = typeof json.value === "string"
          ? JSON.parse(json.value)
          : json.value;

        map[p.id] = {
          details: Array.isArray(parsed?.changedFields) && parsed.changedFields.length > 0,
          images: !!parsed?.hasImages
        };

      } catch {
        map[p.id] = { details: false, images: false };
      }
    })
  );

  return map;
}
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_KEY = `${APP_PREFIX}activeModality`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;

const email = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();
const auth = localStorage.getItem(AUTH_KEY);

const ADMIN_EMAIL = "info@espinmedical.com";
const isAdmin = email === ADMIN_EMAIL;


let deleteBusy = false;
let pendingDeleteId = "";
let pendingDeleteName = "";
let unreadSummary = { total: 0, projects: {}, details: {}, images: {} };
let initialLoadDone = false;
let refreshBusy = false;

if (auth !== "true" || !email) {
  location.replace("/index.html");
}

function field(id) {
  return document.getElementById(id);
}
function resetProjectState(projectId) {
  localStorage.setItem(PROJECT_ID_KEY, projectId);
  localStorage.removeItem(MODALITY_KEY);
  localStorage.removeItem(MODALITY_ID_KEY);
  localStorage.removeItem(`${MODALITY_ID_KEY}_${projectId}`);
  localStorage.removeItem(`${MODALITY_KEY}_${projectId}`);
}

async function refreshEquipmentBadge(clearAll = false) {
  try {
    await fetch("/api/badge-refresh-equipment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": email
      },
      body: JSON.stringify({ email, clearAll })
    });
  } catch (e) {
    console.warn("refreshEquipmentBadge failed:", e);
  }
}

async function clearIosBadgeOnly() {
  try {
    await fetch("/api/ios-clear-badge-equipment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": email
      },
      body: JSON.stringify({ email }),
      keepalive: true
    });
  } catch (e) {
    console.warn("ios badge clear failed:", e);
  }
}

async function loadUnreadSummary() {
  try {
    const url = `/api/equipment-updates?t=${Date.now()}`;
    const r = await fetch(url, {
      method: "GET",
      cache: "no-store",
      headers: {
        "x-user-email": email,
        "Cache-Control": "no-cache"
      }
    });

    const out = await r.json().catch(() => ({}));

    if (!r.ok) {
      throw new Error(out?.error || "Failed to load unread summary");
    }

    unreadSummary = {
      total: Number(out?.total) || 0,
      projects: out?.projects && typeof out.projects === "object" ? out.projects : {},
      details: out?.details && typeof out.details === "object" ? out.details : {},
      images: out?.images && typeof out.images === "object" ? out.images : {}
    };
  
  } catch (e) {
    console.warn("loadUnreadSummary failed:", e);
    unreadSummary = { total: 0, projects: {}, details: {}, images: {} };
   
  }
}

function getProjectUnreadCount(projectId) {
  const projectCount = Number(unreadSummary?.projects?.[projectId]) || 0;

  const detailsCount = Object.entries(unreadSummary?.details || {}).reduce((sum, [key, value]) => {
    return key.startsWith(`${projectId}:`) ? sum + (Number(value) || 0) : sum;
  }, 0);

  const imageCount = Object.entries(unreadSummary?.images || {}).reduce((sum, [key, value]) => {
    return key.startsWith(`${projectId}:`) ? sum + (Number(value) || 0) : sum;
  }, 0);

  return projectCount + detailsCount + imageCount;
}

async function markProjectRead(projectId) {
  if (!projectId) return;

  try {
    const r = await fetch("/api/equipment-project-mark-read", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": email,
        "x-clear-source": "management"
      },
      body: JSON.stringify({
        projectId,
        type: "all",
        email
      }),
      keepalive: true
    });

    const out = await r.json().catch(() => ({}));

    if (!r.ok || out?.ok === false) {
      throw new Error(out?.error || "equipment-project-mark-read failed");
    }

    await refreshEquipmentBadge(false);
    await loadUnreadSummary();
    await loadProjects(true);
    await clearIosBadgeOnly();
  } catch (e) {
    console.warn("equipment mark-read failed:", e);
  }
}

async function clearTasksAndGoToDetails(projectId) {
  resetProjectState(projectId);
  await markProjectRead(projectId);

  // go to equipment list instead of forcing create
  window.location.href = `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
}

function goToAddModality(projectId) {
  resetProjectState(projectId);

  // 🔴 force NEW equipment record
  const newId = crypto.randomUUID();

  localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, newId);

  window.location.href =
    `equipment-details.html?projectId=${encodeURIComponent(projectId)}&modalityId=${newId}&source=projects&mode=create`;
}

async function goToEquipmentIndex(projectId) {
  resetProjectState(projectId);
  await markProjectRead(projectId);
  window.location.href = `equipmentindex.html?projectId=${encodeURIComponent(projectId)}`;
}

function openProjectModal(p = null) {
  field("modalTitle").textContent = p ? "Edit Project" : "Add Project";
  field("editId").value = p?.id || "";
  field("inpName").value = p?.project_name || "";
  field("inpAddress").value = p?.site_address || "";
  field("inpCity").value = p?.city || "";
field("inpState").value = p?.state || "";
  field("inpZip").value = p?.zip_code || "";

  field("inpSalesFirst").value = p?.sales_rep_first || "";
  field("inpSalesLast").value = p?.sales_rep_last || "";
  field("inpSalesCompany").value = p?.sales_rep_company || "";
  field("inpSalesPhone").value = p?.sales_rep_phone || "";
  field("inpSalesEmail").value = p?.sales_rep_email || "";

  field("projectModal").style.display = "flex";
}

function closeProjectModal() {
  field("projectModal").style.display = "none";
}

function openDeleteModal(projectId, projectName) {
  pendingDeleteId = String(projectId || "").trim();
  pendingDeleteName = String(projectName || "").trim();
  field("deleteConfirmText").textContent =
    `Are you sure you want to delete "${pendingDeleteName || "this project"}"? This cannot be undone.`;
  field("deleteModal").style.display = "flex";
}

function closeDeleteModal() {
  field("deleteModal").style.display = "none";
  pendingDeleteId = "";
  pendingDeleteName = "";
}

async function saveProject() {
  const saveBtn = field("saveBtn");

  const id = field("editId").value.trim();
  const isEdit = !!id;

const payload = {
  id: id || undefined,
  project_name: field("inpName").value.trim(),
  site_address: field("inpAddress").value.trim(),
  city: field("inpCity").value.trim(),
  state: field("inpState").value.trim(), // ✅ THIS IS MISSING
  zip_code: field("inpZip").value.trim(),

  sales_rep_first: field("inpSalesFirst").value.trim(),
  sales_rep_last: field("inpSalesLast").value.trim(),
  sales_rep_company: field("inpSalesCompany").value.trim(),
  sales_rep_phone: field("inpSalesPhone").value.trim(),
  sales_rep_email: field("inpSalesEmail").value.trim()
};
  if (!payload.project_name) {
    alert("Site Name is required");
    return;
  }

  saveBtn.disabled = true;
  saveBtn.innerText = "Saving...";

  try {
    const url = "/api/admin/equipment";

const r = await fetch(url, {
  method: isEdit ? "PUT" : "POST",
  cache: "no-store",
  headers: {
    "Content-Type": "application/json",
    "x-user-email": email
  },
  body: JSON.stringify({
    ...payload,
    id
  })
});

    const data = await r.json().catch(() => null);

    if (!r.ok || data?.error) {
      alert(data?.error || "Save failed");
      return;
    }

    closeProjectModal();

    if (!isEdit && data?.id) {
      resetProjectState(data.id);
      location.href = `equipment-details.html?projectId=${encodeURIComponent(data.id)}&source=projects&mode=create`;
      return;
    }

    await loadUnreadSummary();
    await loadProjects(true);

  } catch (e) {
    alert("Save failed");
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerText = "Save Project";
  }
}

async function deleteProject(projectId) {
  if (!projectId || deleteBusy) return;

  deleteBusy = true;
  const confirmBtn = field("confirmDeleteBtn");
  const oldText = confirmBtn.textContent;
  confirmBtn.disabled = true;
  confirmBtn.textContent = "Deleting...";

  try {
    const r = await fetch("/api/equipment-projects/proj-delete", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": email
      },
      body: JSON.stringify({ projectId })
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok || data?.error) {
      throw new Error(data?.error || "Delete failed");
    }

    closeDeleteModal();
    await loadUnreadSummary();
    await loadProjects(true);

  } catch (e) {
    alert(`Delete failed: ${e?.message || e}`);
  } finally {
    deleteBusy = false;
    confirmBtn.disabled = false;
    confirmBtn.textContent = oldText;
  }
}

function bindSafeTap(element, handler) {
  if (!element) return;

  let touchHandled = false;

  element.addEventListener("touchend", (e) => {
    touchHandled = true;
    e.preventDefault();
    e.stopPropagation();
    handler(e);
    setTimeout(() => {
      touchHandled = false;
    }, 500);
  }, { passive: false });

  element.addEventListener("click", (e) => {
    if (touchHandled) {
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    handler(e);
  });
}

async function loadProjects(forceFresh = false) {
  const list = field("projectList");

  try {
    const url = forceFresh
      ? `/api/admin/equipment?t=${Date.now()}`
      : "/api/admin/equipment";

    const r = await fetch(url, {
      cache: "no-store",
      headers: {
        "x-user-email": email,
        "Cache-Control": "no-cache"
      }
    });

    if (!r.ok) throw new Error("API error");

    const projects = await r.json();
const changedMap = isAdmin ? await getChangedMap(projects) : {};
    if (!Array.isArray(projects) || !projects.length) {
      list.innerHTML = "<p style='padding:20px'>No projects found</p>";
      return;
    }

    list.innerHTML = "";

    for (const p of projects) {
const hasChangedDetails = changedMap[p.id]?.details;
const hasChangedImages = changedMap[p.id]?.images;
  const unreadCount = getProjectUnreadCount(p.id);

  const unreadData = Object.entries(unreadSummary?.details || {}).reduce((sum, [key, value]) => {
    return key.startsWith(`${p.id}:`) ? sum + (Number(value) || 0) : sum;
  }, 0);

  const unreadImages = Object.entries(unreadSummary?.images || {}).reduce((sum, [key, value]) => {
    return key.startsWith(`${p.id}:`) ? sum + (Number(value) || 0) : sum;
  }, 0);

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
  ${unreadCount > 0 ? `<div class="project-count-badge">${unreadCount}</div>` : ""}

  <div class="card-main">
    <h3>${p.project_name || ""}</h3>

    <p>${p.site_address || ""}</p>
    <p>
      ${(p.city || "")}${p.city ? ", " : ""}
      ${(p.state || "")} ${(p.zip_code || "")}
    </p>

    ${isAdmin ? `
      <div class="badge-wrap">
        ${!p.project_completed && hasChangedDetails ? `<span class="badge">⚡ NEW</span>` : ""}
        ${!p.project_completed && hasChangedImages ? `<span class="badge">🖼 NEW</span>` : ""}
      </div>
    ` : ""}
  </div>

  <div class="icon-row">
    <button type="button" class="icon-btn" data-edit="${p.id}">✏️</button>
    <button type="button" class="icon-btn delete-btn" data-delete="${p.id}">🗑</button>
  </div>
`;
  const main = card.querySelector(".card-main");
  const editBtn = card.querySelector(`[data-edit="${p.id}"]`);
  const deleteBtn = card.querySelector(`[data-delete="${p.id}"]`);

  bindSafeTap(main, () => goToEquipmentIndex(p.id));
  bindSafeTap(editBtn, () => openProjectModal(p));
  bindSafeTap(deleteBtn, () => openDeleteModal(p.id, p.project_name));

  list.appendChild(card);
}

  } catch (e) {
    console.warn("loadProjects failed:", e);
    list.innerHTML = "<p style='padding:20px'>Failed to load projects</p>";
  }
}
async function runInitialLoad() {
  if (initialLoadDone || refreshBusy) return;
  refreshBusy = true;

  try {
   
    await refreshEquipmentBadge(false);
    await loadUnreadSummary();
    await loadProjects(true);
    initialLoadDone = true;
  } catch (e) {
    console.warn("runInitialLoad failed:", e);
  } finally {
    refreshBusy = false;
  }
}

document.getElementById("confirmDeleteBtn").addEventListener("click", () => {
  if (!pendingDeleteId) return;
  deleteProject(pendingDeleteId);
});

document.getElementById("cancelDeleteBtn").addEventListener("click", () => {
  closeDeleteModal();
});

document.getElementById("deleteModal").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeDeleteModal();
});

document.addEventListener("DOMContentLoaded", async () => {
  await runInitialLoad();
});
</script>
</body>
</html>
