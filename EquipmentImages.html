<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;
const ADMIN_DOWNLOAD_PACKAGE_ENABLED = false;
(() => {
  const email = String(
    localStorage.getItem(EMAIL_KEY) ||
    localStorage.getItem("espinUserEmail") ||
    "info@espinmedical.com"
  ).toLowerCase().trim();
  localStorage.setItem(AUTH_KEY, "true");
  localStorage.setItem(EMAIL_KEY, email);
})();

const userEmail = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();

const params = new URLSearchParams(location.search);
[
  "sales_rep_first",
  "sales_rep_last",
  "sales_rep_company",
  "sales_rep_phone",
  "sales_rep_email"
].forEach(key => {
  const value = params.get(key);
  if (value) {
    localStorage.setItem(`axis_${key}`, value);
  }
});
const projectId = String(
  params.get("projectId") || params.get("id") || ""
).trim();

const modalityId = String(
  params.get("modalityId") || ""
).trim();

if (!projectId || !modalityId) {
  alert("Missing project or modality ID");
  throw new Error("Missing IDs");
}

localStorage.setItem(PROJECT_ID_KEY, projectId);

if (modalityId) {
  localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, modalityId);
}
function downloadFullPackage() {
  if (!ADMIN_DOWNLOAD_PACKAGE_ENABLED) {
    alert("Download disabled");
    return;
  }

  const url = `/api/export-package?projectId=${projectId}&email=${encodeURIComponent(userEmail)}`;
  window.open(url, "_blank");
}
function handleBack(){
  // 🔥 clear local
  sessionStorage.removeItem(BADGE_STORAGE_KEY);
  localStorage.removeItem(BADGE_STORAGE_KEY);

  // 🔥 clear server badge (THIS is why it wasn't working)
  fetch(`/api/kv-set`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      key: `equipment:badges_images:${projectId}:${modalityId}:${userEmail}`,
      value: []
    }),
    keepalive: true
  });

  const qp = new URLSearchParams({ projectId });
  if (modalityId) qp.set("modalityId", modalityId);

  location.href = `equipmentindex.html?${qp.toString()}`;
}
function getPrimaryId(p){
  return String(
    p?.id ||
    p?.photoId ||
    p?.photo_id ||
    p?.uuid ||
    p?.image_id ||
    p?.imageId ||
    ""
  ).trim();
}

/* ===============================
   NEW PILL (LOCAL)
=============================== */
const BADGE_STORAGE_KEY = modalityId
  ? `new_images_${projectId}_${modalityId}`
  : `new_images_${projectId}`;


function safeParseArray(v){
  try{
    const x = typeof v === "string" ? JSON.parse(v) : v;
    return Array.isArray(x) ? x : [];
  }catch{
    return [];
  }
}

function uniq(list){
  return [...new Set((list || []).map(x => String(x).trim()).filter(Boolean))];
}

function getActiveBadges(){
  const s = sessionStorage.getItem(BADGE_STORAGE_KEY);
  const l = localStorage.getItem(BADGE_STORAGE_KEY);
  return uniq(safeParseArray(s || l || "[]"));
}

function saveBadgesLocally(list){
  const j = JSON.stringify(uniq(list));
  sessionStorage.setItem(BADGE_STORAGE_KEY, j);
  localStorage.setItem(BADGE_STORAGE_KEY, j);
}

function isNewForPhoto(p, badgeSet){
  return badgeSet.has(getPrimaryId(p));
}
</script>

 <div class="batch-bar">

  <button id="downloadPackageBtn" onclick="downloadFullPackage()" class="batch-btn" style="display:none;">
    Download Equipment + Images
  </button>
</div>
  <div id="previewModal" class="preview-modal">

    <img id="previewImage">
  </div>

<script>
const CLOUD_NAME = "duljf51bg";
const UPLOAD_PRESET = "espin_unsigned";

const filePicker = document.getElementById("filePicker");
const chooseFileBtn = document.getElementById("chooseFileBtn");
const uploadSpinner = document.getElementById("uploadSpinner");
const gallery = document.getElementById("gallery");
const sendBtn = document.getElementById("sendBtn");
const deleteBtn = document.getElementById("deleteBtn");
const downloadPackageBtn = document.getElementById("downloadPackageBtn");

if (downloadPackageBtn) {
  downloadPackageBtn.style.display = ADMIN_DOWNLOAD_PACKAGE_ENABLED ? "block" : "none";
}
const previewModal = document.getElementById("previewModal");
const previewImage = document.getElementById("previewImage");
const previewClose = document.getElementById("previewClose");

previewClose.onclick = () => previewModal.classList.remove("active");
previewModal.onclick = e => {
  if (e.target === previewModal) previewModal.classList.remove("active");
};

let photos = [];
let selected = new Set();
function updateBatchState(){
  const sel = photos.filter(p => selected.has(getPrimaryId(p)));

  sendBtn.disabled = !(sel.length && sel.every(p => (p.photo_title || "").trim()));
  deleteBtn.disabled = sel.length === 0;

  document.querySelectorAll(".card").forEach(card => {
    const id = card.dataset.id;
    const p = photos.find(x => getPrimaryId(x) === id);

    if (selected.has(id) && !(p?.photo_title || "").trim()) {
      card.classList.add("missing-title"); // 🔴 SHOW RED
    } else {
      card.classList.remove("missing-title");
    }
  });
}

function appendCard(p, badgeSet){
  const pid = getPrimaryId(p);

  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = pid;

  const isNew = badgeSet.has(pid);

  card.innerHTML = `
    ${isNew ? '<div class="new-badge">NEW</div>' : ''}

    <!-- IMAGE TITLE -->
    <div class="card-header">
      <div class="field-label">IMAGE TITLE</div>
      <input type="text" value="${p.photo_title || ""}" placeholder="Enter image title (Required)">
    </div>

    <!-- IMAGE -->
    <img src="${p.photo_url}">

    <!-- NOTES -->
    <div class="card-body">
      <div class="field-label-dark">NOTES</div>
      <textarea placeholder="Add notes...">${p.photo_comment || ""}</textarea>
    </div>

    <div class="card-footer">
      <input type="checkbox">
      <label>Select</label>
    </div>
  `;

  const img = card.querySelector("img");
  const title = card.querySelector("input");
  const note = card.querySelector("textarea");
  const cb = card.querySelector("input[type=checkbox]");

  img.onclick = () => {
    previewImage.src = p.photo_url;
    previewModal.classList.add("active");
  };

  // ===== TITLE =====
  title.oninput = () => {
  p.photo_title = title.value;

  if ((p.photo_title || "").trim()) {
    card.classList.remove("missing-title");
  }

  const cur = getActiveBadges();
  const idx = cur.indexOf(pid);

  if (idx !== -1) {
    cur.splice(idx, 1);
    saveBadgesLocally(cur);
  }

  updateBatchState();
};
  // ===== NOTE =====
  note.oninput = async () => {
    p.photo_comment = note.value;

    await fetch(`/api/equipment-photos/photo-update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        photoId: p.id,
        photo_comment: p.photo_comment
      })
    });
  };

  // ===== CHECKBOX =====
  cb.onchange = () => {
    cb.checked ? selected.add(pid) : selected.delete(pid);

    // 🔥 REMOVE NEW BADGE ON SELECT
    const cur = getActiveBadges();
    const idx = cur.indexOf(pid);
    if (idx !== -1) {
      cur.splice(idx, 1);
      saveBadgesLocally(cur);
    }

    updateBatchState();
  };

  gallery.append(card);
}
chooseFileBtn.onclick = () => filePicker.click();

filePicker.onchange = async () => {
  const file = filePicker.files[0];
  if (!file) return;

  uploadSpinner.style.display = "block";

  try {
    const safeProjectId = String(projectId || "").trim();
    const safeModalityId = String(modalityId || "").trim();

    if (!safeProjectId) throw new Error("Missing projectId");
    if (!safeModalityId) throw new Error("Missing modalityId");

    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", UPLOAD_PRESET);

    const cloud = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: "POST",
      body: fd
    });

    const cloudData = await cloud.json(); // ✅ THIS WAS MISSING

    if (!cloud.ok || !cloudData?.secure_url) {
      throw new Error("Cloud upload failed");
    }

    console.log("FINAL PAYLOAD:", {
      projectId: safeProjectId,
      modalityId: safeModalityId,
      url: cloudData.secure_url
    });

    const res = await fetch(`/api/equipment-photos/photo-save`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        projectId: safeProjectId,
        modalityId: safeModalityId,
        url: cloudData.secure_url
      })
    });

    const out = await res.json().catch(() => ({}));

    if (!res.ok) {
      console.error("SAVE ERROR:", out);
      throw new Error(out?.error || "Photo save failed");
    }

    const p = {
      id: out.id,
      project_id: safeProjectId,
      modality_id: safeModalityId,
      photo_url: cloudData.secure_url,
      photo_title: "",
      photo_comment: ""
    };

  await loadPhotos({ silent: true });

  } catch (err) {
    console.error("UPLOAD ERROR:", err);
    alert(err.message);
  } finally {
    uploadSpinner.style.display = "none";
    filePicker.value = "";
  }
};
async function fetchCurrentEquipmentDetailsForAxisSync(){
  try {
    const res = await fetch(`/api/equipment-details?projectId=${encodeURIComponent(projectId)}&modalityId=${encodeURIComponent(modalityId)}`, {
      headers: {
        "x-user-email": userEmail
      }
    });

    const out = await res.json().catch(() => ({}));

    if (!res.ok) {
      console.warn("Could not fetch equipment details for AXIS image sync:", out);
      return {};
    }

    const row = Array.isArray(out) ? out[0] : out;
    const data = row?.data && typeof row.data === "object" ? row.data : {};

    return {
      ...data,
      ...row
    };
  } catch (err) {
    console.warn("Equipment detail fetch failed for AXIS image sync:", err);
    return {};
  }
}
async function syncImagesToAxisDemo(sentPhotoIds) {
  const key = "axis_tradein_sync_records_v1";
  const lifecycleKey = "espin_lifecycle_demo_records_v1";

  let records = [];
  let lifecycleRecords = [];
  const liveDetails = await fetchCurrentEquipmentDetailsForAxisSync();
  try {
    records = JSON.parse(localStorage.getItem(key) || "[]");
    if (!Array.isArray(records)) records = [];
  } catch {
    records = [];
  }

  try {
    lifecycleRecords = JSON.parse(localStorage.getItem(lifecycleKey) || "[]");
    if (!Array.isArray(lifecycleRecords)) lifecycleRecords = [];
  } catch {
    lifecycleRecords = [];
  }

  const selectedPhotos = photos
    .filter(p => sentPhotoIds.includes(getPrimaryId(p)))
    .map(p => ({
      id: getPrimaryId(p),

      notes: p.photo_comment || ""
    }));

  const axisRecordId =
    params.get("axis_record_id") ||

    "";

    (

    (
      axisSerialNumber &&
      String(r.axis_serial_number || r.serial_number || "") === String(axisSerialNumber)
    )
  );

  const existing = existingIndex >= 0 ? records[existingIndex] : {};

  const mergedImages = [
    ...((existing.images || []).filter(img =>
      !selectedPhotos.some(p => String(p.id) === String(img.id))
    )),
    ...selectedPhotos
  ];

    if (!axisRecordId && !axisParentRecordId && !axisProjectId && !axisSerialNumber) {
    console.warn("AXIS sync missing AXIS identity fields. Images will be saved as unmatched documentation.");
  }

  const axisSalesRepFirst =
    params.get("sales_rep_first") ||
    localStorage.getItem("axis_sales_rep_first") ||
    lifecycleMatch.sales_rep_first ||
    lifecycleMatch.assigned_rep_first ||
    existing.assigned_rep_first ||
    "";

  const axisSalesRepLast =

    localStorage.getItem("axis_sales_rep_last") ||
    lifecycleMatch.sales_rep_last ||
    lifecycleMatch.assigned_rep_last ||
    existing.assigned_rep_last ||
    "";

  const axisSalesRepCompany =

    localStorage.getItem("axis_sales_rep_company") ||
    lifecycleMatch.sales_rep_company ||
    lifecycleMatch.assigned_rep_company ||
    existing.assigned_rep_company ||
    "";

  const axisSalesRepPhone =
    params.get("sales_rep_phone") ||
    localStorage.getItem("axis_sales_rep_phone") ||
    lifecycleMatch.sales_rep_phone ||
    lifecycleMatch.assigned_rep_phone ||
    existing.assigned_rep_phone ||

  const axisSalesRepEmail =

    lifecycleMatch.sales_rep_email ||
    lifecycleMatch.assigned_rep_email ||

  const axisSalesRepName =
    `${axisSalesRepFirst} ${axisSalesRepLast}`.trim() ||
    existing.assigned_rep_name ||
    lifecycleMatch.assigned_rep_name ||
    axisSalesRepEmail ||
    "";

  const imageSyncRecord = {
    ...existing,
    ...liveDetails,
    sync_event_id: `image_sync_${projectId}_${modalityId}_${Date.now()}`,

    sync_mode: syncMode,
    unmatched_tradein_documentation: !(axisRecordId || axisParentRecordId || axisProjectId || axisSerialNumber),

    axis_record_id: axisRecordId || existing.axis_record_id || lifecycleMatch.id || "",
    axis_parent_record_id: axisParentRecordId || existing.axis_parent_record_id || lifecycleMatch.id || "",
    axis_project_id: axisProjectId || existing.axis_project_id || lifecycleMatch.oem_project_id || "",

   make:

model:

deleteBtn.onclick = async () => {

  try {
    const ids = [...selected];
    const badgeList = getActiveBadges();

   for (const id of ids) {
  await fetch(`/api/equipment-photos/photo-delete`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",

    },

      projectId,

    })
  });

  // remove from DOM
  document.querySelector(`.card[data-id="${id}"]`)?.remove();

  // remove from memory
  photos = photos.filter(p => getPrimaryId(p) !== id);

  // remove from badges
  const idx = badgeList.indexOf(id);
  if (idx !== -1) badgeList.splice(idx, 1);
}
    saveBadgesLocally(badgeList);

    selected.clear();
    updateBatchState();

    // SUCCESS
    deleteBtn.innerText = "Deleted";

    setTimeout(() => {
      deleteBtn.innerText = originalText;
      updateBatchState();
    }, 1200);

  } catch (e) {
    console.error("Delete failed:", e);
    alert("Delete failed. Try again.");

    deleteBtn.innerText = originalText;
    deleteBtn.disabled = false;
  }
};
async function loadPhotos({ silent = false } = {}) {
  try {
    const listUrl = new URL(`/api/equipment-photos/photo-list`, location.origin);
    if (modalityId) listUrl.searchParams.set("modalityId", modalityId);

    const [listRes, badgeRes] = await Promise.all([
      fetch(listUrl.toString(), {
        headers: { "x-user-email": userEmail }
      }),
      fetch(`/api/kv-get`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          key: `equipment:badges_images:${projectId}:${modalityId}:${userEmail}`
        })
      })
    ]);

    const out = await listRes.json().catch(() => []);
    const badgeJson = await badgeRes.json().catch(() => ({}));

    if (!listRes.ok) throw new Error(out?.error || "Failed");

    const activeElement = document.activeElement;
    const userEditing =
      activeElement &&
      (
        activeElement.tagName === "INPUT" ||
        activeElement.tagName === "TEXTAREA"
      );

    if (userEditing) return;

    photos = Array.isArray(out) ? out : [];

    let serverBadges = [];

    if (badgeJson?.value) {
      try {
        const parsed =
          typeof badgeJson.value === "string"
            ? JSON.parse(badgeJson.value)
            : badgeJson.value;

        if (Array.isArray(parsed)) {
          serverBadges = parsed.map(String);
        }
      } catch {}
    }

    saveBadgesLocally(serverBadges);

    const badgeSet = new Set(serverBadges);

    gallery.innerHTML = "";
    photos.forEach(p => appendCard(p, badgeSet));

    selected = new Set(
      [...selected].filter(id =>
        photos.some(p => getPrimaryId(p) === id)
      )
    );

    updateBatchState();

  } catch (err) {
    if (!silent) {
      console.error("LOAD ERROR:", err);
    }
  }
}

loadPhotos();

setInterval(() => {
  loadPhotos({ silent: true });
}, 5000);

window.addEventListener("focus", () => {
  loadPhotos({ silent: true });
});
