<head>
<meta charset="UTF-8">
<title>Project Images | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script>
(() => {
  if (localStorage.getItem("espinAuth") !== "true") {
    location.replace("index.html");
  }
})();

const userEmail = (localStorage.getItem("espinUserEmail") || "").toLowerCase().trim();
const API_BASE = "";

const params = new URLSearchParams(location.search);
const urlProjectId = params.get("id") || params.get("projectId");
if (urlProjectId) localStorage.setItem("activeProjectId", urlProjectId);
const projectId = localStorage.getItem("activeProjectId");

function handleBack(){
 location.href="equipment-details.html";
}

function getPrimaryId(p){
 return String(
   p?.id ||
   p?.photoId ||
   p?.photo_id ||
   p?.uuid ||
   p?.image_id ||
   p?.imageId ||
   ""
 ).trim();
}
</script>

<style>
:root{
--blue:#1F7BC8;
--gray:#777;
--bg:#f6f6f6;
--danger:#d93025;
}

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
width:100%;
min-height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:#fff;
}

.page{
min-height:100vh;
height:100vh;
overflow-y:auto;
display:flex;
flex-direction:column;
padding-top:90px;
}

.container{
width:100%;
max-width:320px;
margin:auto;
padding-bottom:400px;
}

.header{
background:var(--blue);
color:#fff;
padding:calc(16px + env(safe-area-inset-top)) 16px 16px 16px;
display:flex;
align-items:center;
justify-content:center;
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
}

.header h1{
margin:0;
font-size:20px;
font-weight:800;
}

.back-arrow{
position:absolute;
left:16px;
top:50%;
transform:translateY(calc(-50% + env(safe-area-inset-top)/2));
color:#fff;
text-decoration:none;
font-size:32px;
font-weight:800;
cursor:pointer;
}

.section-title{
font-size:22px;
font-weight:800;
margin:60px 0 18px 0;
}

.upload-card{
border:2px dashed #ccc;
border-radius:16px;
padding:16px;
display:flex;
align-items:center;
gap:12px;
}

.upload-card button{
flex:1;
padding:14px;
border-radius:12px;
border:none;
background:var(--blue);
color:#fff;
font-weight:800;
cursor:pointer;
}

.spinner{
width:18px;
height:18px;
border:3px solid #ddd;
border-top:3px solid var(--blue);
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{to{transform:rotate(360deg)}}

.gallery{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

.card{
width:100%;
margin:12px 0;
border:1px solid #ddd;
border-radius:16px;
overflow:hidden;
}

.card-header{
background:var(--blue);
padding:10px;
}

.card-header input{
width:100%;
border:none;
background:transparent;
color:#fff;
font-weight:800;
font-size:16px;
outline:none;
}

.card img{
width:100%;
height:360px;
object-fit:cover;
display:block;
}

.card-body{
padding:12px;
}

.card-body textarea{
width:100%;
min-height:60px;
border-radius:10px;
border:1px solid #ddd;
padding:10px;
}

.card-footer{
padding:12px;
border-top:1px solid #eee;
display:flex;
gap:8px;
align-items:center;
}

.batch-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
border-top:1px solid #ddd;
padding:14px;
z-index:9999;
box-shadow:0 -4px 12px rgba(0,0,0,.1);
}

.batch-btn{
width:100%;
padding:14px;
border-radius:12px;
font-size:16px;
font-weight:800;
border:none;
margin-bottom:10px;
cursor:pointer;
}

#sendBtn{background:var(--blue);color:#fff}
#deleteBtn{background:var(--danger);color:#fff}

.preview-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
opacity:0;
pointer-events:none;
transition:opacity .2s ease;
}

.preview-modal.active{
opacity:1;
pointer-events:auto;
}

.preview-modal img{
max-width:95%;
max-height:90%;
object-fit:contain;
border-radius:12px;
}

.preview-close{
position:absolute;
top:20px;
right:20px;
font-size:28px;
color:#fff;
font-weight:800;
cursor:pointer;
}
</style>
</head>

<body>
<div class="page">

<div class="header">
<div onclick="handleBack()" class="back-arrow">←</div>
<h1>Project Images</h1>
</div>

<div class="container">

<div class="section-title">Upload Image</div>

<div class="upload-card">
<input id="filePicker" type="file" accept="image/*" hidden>
<button id="chooseFileBtn">Choose Image</button>
<div id="uploadSpinner" class="spinner"></div>
</div>

<div id="gallery" class="gallery" style="margin-top:20px;"></div>

</div>

<div class="batch-bar">
<button id="sendBtn" class="batch-btn" disabled>Send Selected Images</button>
<button id="deleteBtn" class="batch-btn" disabled>Delete Selected Images</button>
</div>

<div id="previewModal" class="preview-modal">
<div class="preview-close" id="previewClose">✕</div>
<img id="previewImage">
</div>

<script>

const CLOUD_NAME="duljf51bg"
const UPLOAD_PRESET="espin_unsigned"

const filePicker=document.getElementById("filePicker")
const chooseFileBtn=document.getElementById("chooseFileBtn")
const uploadSpinner=document.getElementById("uploadSpinner")
const gallery=document.getElementById("gallery")
const sendBtn=document.getElementById("sendBtn")
const deleteBtn=document.getElementById("deleteBtn")

const previewModal=document.getElementById("previewModal")
const previewImage=document.getElementById("previewImage")
const previewClose=document.getElementById("previewClose")

function openPreview(src){
previewImage.src=src
previewModal.classList.add("active")
document.body.style.overflow="hidden"
}

function closePreview(){
previewModal.classList.remove("active")
previewImage.src=""
document.body.style.overflow=""
}

previewClose.onclick=closePreview
previewModal.onclick=e=>{
if(e.target===previewModal)closePreview()
}

let photos=[]
let selected=new Set()
let uploading=false

function updateBatchState(){
const sel=photos.filter(p=>selected.has(getPrimaryId(p)))
sendBtn.disabled=!(sel.length&&sel.every(p=>(p.photo_title||"").trim()))
deleteBtn.disabled=sel.length===0
}

async function saveMeta(p){

const payload = {
  projectId,
  photo_title: p.photo_title,
  photo_comment: p.photo_comment
}

const pid = getPrimaryId(p)

if(pid){
  payload.photoId = pid
}

await fetch(`${API_BASE}/api/equipment-photos/save`,{
  method:"POST",
  headers:{
    "Content-Type":"application/json",
    "x-user-email":userEmail
  },
  body:JSON.stringify(payload)
})
}
const debouncedSave=((fn,d=600)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d)}})(saveMeta)

function appendCard(p){

const pid=getPrimaryId(p)

const card=document.createElement("div")
card.className="card"
card.dataset.id=pid

card.innerHTML=`
<div class="card-header">
<input type="text" value="${p.photo_title||""}" placeholder="Image Title...">
</div>
<img src="${p.photo_url}">
<div class="card-body">
<textarea placeholder="Add a comment...">${p.photo_comment||""}</textarea>
</div>
<div class="card-footer">
<input type="checkbox">
<label>Select</label>
</div>
`

const img=card.querySelector("img")
img.style.cursor="zoom-in"
img.onclick=()=>openPreview(p.photo_url)

const title=card.querySelector("input")
const note=card.querySelector("textarea")
const cb=card.querySelector("input[type=checkbox]")

title.oninput=()=>{
p.photo_title=title.value
debouncedSave(p)
updateBatchState()
}

note.oninput=()=>{
p.photo_comment=note.value
debouncedSave(p)
}

cb.onchange=()=>{
cb.checked?selected.add(pid):selected.delete(pid)
updateBatchState()
}

gallery.append(card)
}

chooseFileBtn.onclick=()=>{if(!uploading)filePicker.click()}

filePicker.onchange=async()=>{

const file=filePicker.files[0]
if(!file)return

uploading=true
uploadSpinner.style.display="block"

try{

const fd=new FormData()
fd.append("file",file)
fd.append("upload_preset",UPLOAD_PRESET)

const cloud=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:fd
})

const data=await cloud.json()

const res=await fetch(`${API_BASE}/api/equipment-photos/save`,{
method:"POST",
headers:{ "Content-Type":"application/json","x-user-email":userEmail },
body:JSON.stringify({
projectId,
photo_url:data.secure_url,
photo_title:"",
photo_comment:""
})
})

const out=await res.json()

const p={
id:out?.photoId||out?.id,
photo_url:data.secure_url,
photo_title:"",
photo_comment:""
}

photos.unshift(p)

gallery.innerHTML=""
photos.forEach(appendCard)

updateBatchState()

}finally{
uploading=false
uploadSpinner.style.display="none"
filePicker.value=""
}

}

sendBtn.onclick=async()=>{

const ids=[...selected]

await fetch(`${API_BASE}/api/equipment-photos/email`,{
method:"POST",
headers:{ "Content-Type":"application/json","x-user-email":userEmail },
body:JSON.stringify({projectId,photoIds:ids})
})

selected.clear()
document.querySelectorAll(".card-footer input").forEach(cb=>cb.checked=false)
updateBatchState()

}

deleteBtn.onclick=async()=>{

for(const id of [...selected]){

await fetch(`${API_BASE}/api/equipment-photos/delete`,{
method:"POST",
headers:{ "Content-Type":"application/json","x-user-email":userEmail },
body:JSON.stringify({photoId:id,projectId})
})

document.querySelector(`.card[data-id="${id}"]`)?.remove()

photos=photos.filter(p=>getPrimaryId(p)!==id)

}

selected.clear()
updateBatchState()

}

;(async()=>{

let data = [];

try {

  const res = await fetch(
    `${API_BASE}/api/equipment-photos/list?projectId=${projectId}`,
    {
      headers: {
        "x-user-email": userEmail
      }
    }
  );

  if (!res.ok) {
    console.error("Photo list API failed:", res.status);
  } else {
    const json = await res.json();

    if (Array.isArray(json)) {
      data = json;
    } else {
      console.error("Photo API returned non-array:", json);
    }
  }

} catch (err) {
  console.error("Photo fetch error:", err);
}

photos=data

photos.sort((a,b)=>{
const da=new Date(a?.created_at||0).getTime()
const db=new Date(b?.created_at||0).getTime()
return db-da
})

gallery.innerHTML=""
photos.forEach(appendCard)

updateBatchState()

})()

</script>

</div>
</body>
</html>
