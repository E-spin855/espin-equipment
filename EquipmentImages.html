<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Images | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;

(() => {
  const auth = localStorage.getItem(AUTH_KEY);
  const email = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();

  if (auth !== "true" || !email) {
    location.replace("Home.html");
  }
})();

const userEmail = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();

const params = new URLSearchParams(location.search);

const projectId = String(
  params.get("projectId") || params.get("id") || ""
).trim();

const modalityId = String(
  params.get("modalityId") || ""
).trim();

if (!projectId || !modalityId) {
  alert("Missing project or modality ID");
  throw new Error("Missing IDs");
}

localStorage.setItem(PROJECT_ID_KEY, projectId);

if (modalityId) {
  localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, modalityId);
}

function handleBack(){
  // 🔥 clear local
  sessionStorage.removeItem(BADGE_STORAGE_KEY);
  localStorage.removeItem(BADGE_STORAGE_KEY);

  // 🔥 clear server badge (THIS is why it wasn't working)
  fetch(`/api/kv-set`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      key: `equipment:badges_images:${projectId}:${modalityId}:${userEmail}`,
      value: []
    }),
    keepalive: true
  });

  const qp = new URLSearchParams({ projectId });
  if (modalityId) qp.set("modalityId", modalityId);

  location.href = `equipmentindex.html?${qp.toString()}`;
}
function getPrimaryId(p){
  return String(
    p?.id ||
    p?.photoId ||
    p?.photo_id ||
    p?.uuid ||
    p?.image_id ||
    p?.imageId ||
    ""
  ).trim();
}

/* ===============================
   NEW PILL (LOCAL)
=============================== */
const BADGE_STORAGE_KEY = modalityId
  ? `new_images_${projectId}_${modalityId}`
  : `new_images_${projectId}`;


function safeParseArray(v){
  try{
    const x = typeof v === "string" ? JSON.parse(v) : v;
    return Array.isArray(x) ? x : [];
  }catch{
    return [];
  }
}

function uniq(list){
  return [...new Set((list || []).map(x => String(x).trim()).filter(Boolean))];
}

function getActiveBadges(){
  const s = sessionStorage.getItem(BADGE_STORAGE_KEY);
  const l = localStorage.getItem(BADGE_STORAGE_KEY);
  return uniq(safeParseArray(s || l || "[]"));
}

function saveBadgesLocally(list){
  const j = JSON.stringify(uniq(list));
  sessionStorage.setItem(BADGE_STORAGE_KEY, j);
  localStorage.setItem(BADGE_STORAGE_KEY, j);
}

function isNewForPhoto(p, badgeSet){
  return badgeSet.has(getPrimaryId(p));
}
</script>
<style>
:root{
  --blue:#1F7BC8;
  --blue-dark:#1666aa;
  --bg:#f5f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#d9e2ec;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --safe-top:env(safe-area-inset-top, 0px);
  --danger:#d93025;
}
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  min-height:100%;
}

body{
  min-height:100vh;
}

.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-top:0;
  background:var(--bg);
}
.field-label{
  font-size:11px;
  font-weight:700;
  color:#dbeafe;
  margin-bottom:4px;
  letter-spacing:.5px;
}

.field-label-dark{
  font-size:11px;
  font-weight:700;
  color:#64748b;
  margin-bottom:6px;
  letter-spacing:.5px;
}

.card-header{
  background:var(--blue);
  border:none;
  position:relative;
  overflow:visible;
  border-radius:12px 12px 0 0;
  padding:12px;
  margin-bottom:0;
  box-shadow:0 4px 12px rgba(31,123,200,.2);
}
.card-header input{
  width:100%;
  border:none;
  background:transparent;
  color:#fff;
  caret-color:#fff;
  font-weight:800;
  font-size:16px;
  outline:none;
}
.card-body{
  padding:12px;
  border-top:2px solid #f1f5f9;
}
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--blue);
  color:#fff;
  height:calc(var(--safe-top) + 64px);
  padding-top:var(--safe-top);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
}

.header h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  letter-spacing:.2px;
  line-height:1;
}

.back-arrow{
  position:absolute;
  left:12px;
  top:calc(var(--safe-top) + 32px);
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:34px;
  line-height:1;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  margin:0;
  z-index:1001;
  -webkit-appearance:none;
  appearance:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.container{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:20px 16px 180px;
}

.section-title{
  font-size:22px;
  font-weight:800;
  margin:18px 0 18px 0;
}

.upload-card{
  border:2px dashed #ccc;
  border-radius:16px;
  padding:16px;
  display:flex;
  gap:12px;
}

.upload-card button{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--blue);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid #ddd;
  border-top:3px solid var(--blue);
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.gallery{
  display:grid;
  gap:18px;
}

.card{
  border:1px solid #ddd;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  padding:12px;
}
.new-badge{
  position:absolute;

  top:30px;     /* 🔥 INSIDE, not outside */
  right:24px;

  background:#ff3b30;
  color:#fff;

  padding:6px 12px;
  border-radius:999px;

  font-size:11px;
  font-weight:800;

  box-shadow:0 4px 10px rgba(0,0,0,.15);
  z-index:10;
}
.card.missing-title{
  border:2px solid #ff3b30;
}

.card.missing-title .card-header{
  background:#ff3b30;
}

.card img{
  width:100%;
  height:360px;
  object-fit:cover;
  margin-top:8px;
  border-radius:10px;
}
.card-body{
  padding:12px;
}

.card-body textarea{
  width:100%;
  min-height:60px;
  border-radius:10px;
  border:1px solid #ddd;
  padding:10px;
}

.card-footer{
  padding:12px;
  border-top:1px solid #eee;
  display:flex;
  gap:8px;
  align-items:center;
}

.batch-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #ddd;
  padding:14px;
  z-index:9999;
}

.batch-btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  font-size:16px;
  font-weight:800;
  border:none;
  margin-bottom:10px;
  cursor:pointer;
}

#sendBtn{
  background:var(--blue);
  color:#fff;
}

#deleteBtn{
  background:var(--danger);
  color:#fff;
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.preview-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
}

.preview-modal.active{
  opacity:1;
  pointer-events:auto;
}

.preview-modal img{
  max-width:95%;
  max-height:90%;
}
.field-label{
  font-size:10px;
  font-weight:700;
  color:var(--blue);
  margin-bottom:4px;
  letter-spacing:.6px;
}
.preview-close{
  position:absolute;
  top:20px;
  right:20px;
  color:#fff;
  font-size:28px;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="page">

  <div class="header">
    <button type="button" onclick="handleBack()" class="back-arrow">←</button>
    <h1>Project Images</h1>
  </div>

  <div class="container">
    <div class="section-title">Upload Image</div>

    <div class="upload-card">
      <input id="filePicker" type="file" accept="image/*" hidden>
      <button id="chooseFileBtn">Choose Image</button>
      <div id="uploadSpinner" class="spinner"></div>
    </div>

    <div id="gallery" class="gallery"></div>
  </div>

  <div class="batch-bar">
    <button id="sendBtn" class="batch-btn" disabled>Send Selected Images</button>
    <button id="deleteBtn" class="batch-btn" disabled>Delete Selected Images</button>
  </div>

  <div id="previewModal" class="preview-modal">
    <div class="preview-close" id="previewClose">✕</div>
    <img id="previewImage">
  </div>

<script>
const CLOUD_NAME = "duljf51bg";
const UPLOAD_PRESET = "espin_unsigned";

const filePicker = document.getElementById("filePicker");
const chooseFileBtn = document.getElementById("chooseFileBtn");
const uploadSpinner = document.getElementById("uploadSpinner");
const gallery = document.getElementById("gallery");
const sendBtn = document.getElementById("sendBtn");
const deleteBtn = document.getElementById("deleteBtn");

const previewModal = document.getElementById("previewModal");
const previewImage = document.getElementById("previewImage");
const previewClose = document.getElementById("previewClose");

previewClose.onclick = () => previewModal.classList.remove("active");
previewModal.onclick = e => {
  if (e.target === previewModal) previewModal.classList.remove("active");
};

let photos = [];
let selected = new Set();
function updateBatchState(){
  const sel = photos.filter(p => selected.has(getPrimaryId(p)));

  sendBtn.disabled = !(sel.length && sel.every(p => (p.photo_title || "").trim()));
  deleteBtn.disabled = sel.length === 0;

  document.querySelectorAll(".card").forEach(card => {
    const id = card.dataset.id;
    const p = photos.find(x => getPrimaryId(x) === id);

    if (selected.has(id) && !(p?.photo_title || "").trim()) {
      card.classList.add("missing-title"); // 🔴 SHOW RED
    } else {
      card.classList.remove("missing-title");
    }
  });
}

function appendCard(p, badgeSet){
  const pid = getPrimaryId(p);

  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = pid;

  const isNew = badgeSet.has(pid);

  card.innerHTML = `
    ${isNew ? '<div class="new-badge">NEW</div>' : ''}

    <!-- IMAGE TITLE -->
    <div class="card-header">
      <div class="field-label">IMAGE TITLE</div>
      <input type="text" value="${p.photo_title || ""}" placeholder="Enter image title (Required)">
    </div>

    <!-- IMAGE -->
    <img src="${p.photo_url}">

    <!-- NOTES -->
    <div class="card-body">
      <div class="field-label-dark">NOTES</div>
      <textarea placeholder="Add notes...">${p.photo_comment || ""}</textarea>
    </div>

    <div class="card-footer">
      <input type="checkbox">
      <label>Select</label>
    </div>
  `;

  const img = card.querySelector("img");
  const title = card.querySelector("input");
  const note = card.querySelector("textarea");
  const cb = card.querySelector("input[type=checkbox]");

  img.onclick = () => {
    previewImage.src = p.photo_url;
    previewModal.classList.add("active");
  };

  // ===== TITLE =====
  title.oninput = async () => {
    p.photo_title = title.value;

    // 🔥 RED FRAME
    if ((p.photo_title || "").trim()) {
      card.classList.remove("missing-title");
    } 
    // 🔥 REMOVE NEW BADGE ON INTERACTION
    const cur = getActiveBadges();
    const idx = cur.indexOf(pid);
    if (idx !== -1) {
      cur.splice(idx, 1);
      saveBadgesLocally(cur);
    }

    await fetch(`/api/equipment-photos/photo-update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        photoId: p.id,
        photo_title: p.photo_title
      })
    });

    updateBatchState();
  };

  // ===== NOTE =====
  note.oninput = async () => {
    p.photo_comment = note.value;

    await fetch(`/api/equipment-photos/photo-update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        photoId: p.id,
        photo_comment: p.photo_comment
      })
    });
  };

  // ===== CHECKBOX =====
  cb.onchange = () => {
    cb.checked ? selected.add(pid) : selected.delete(pid);

    // 🔥 REMOVE NEW BADGE ON SELECT
    const cur = getActiveBadges();
    const idx = cur.indexOf(pid);
    if (idx !== -1) {
      cur.splice(idx, 1);
      saveBadgesLocally(cur);
    }

    updateBatchState();
  };

  gallery.append(card);
}
chooseFileBtn.onclick = () => filePicker.click();

filePicker.onchange = async () => {
  const file = filePicker.files[0];
  if (!file) return;

  uploadSpinner.style.display = "block";

  try {
    const safeProjectId = String(projectId || "").trim();
    const safeModalityId = String(modalityId || "").trim();

    if (!safeProjectId) throw new Error("Missing projectId");
    if (!safeModalityId) throw new Error("Missing modalityId");

    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", UPLOAD_PRESET);

    const cloud = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: "POST",
      body: fd
    });

    const cloudData = await cloud.json(); // ✅ THIS WAS MISSING

    if (!cloud.ok || !cloudData?.secure_url) {
      throw new Error("Cloud upload failed");
    }

    console.log("FINAL PAYLOAD:", {
      projectId: safeProjectId,
      modalityId: safeModalityId,
      url: cloudData.secure_url
    });

    const res = await fetch(`/api/equipment-photos/photo-save`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        projectId: safeProjectId,
        modalityId: safeModalityId,
        url: cloudData.secure_url
      })
    });

    const out = await res.json().catch(() => ({}));

    if (!res.ok) {
      console.error("SAVE ERROR:", out);
      throw new Error(out?.error || "Photo save failed");
    }

    const p = {
      id: out.id,
      project_id: safeProjectId,
      modality_id: safeModalityId,
      photo_url: cloudData.secure_url,
      photo_title: "",
      photo_comment: ""
    };

   photos.unshift(p);

gallery.innerHTML = "";
photos.forEach(photo => appendCard(photo, new Set(getActiveBadges())));
    updateBatchState();

  } catch (err) {
    console.error("UPLOAD ERROR:", err);
    alert(err.message);
  } finally {
    uploadSpinner.style.display = "none";
    filePicker.value = "";
  }
};
/* SEND */
sendBtn.onclick = async () => {
  const selectedPhotos = photos.filter(p => selected.has(getPrimaryId(p)));

  let hasError = false;

 selectedPhotos.forEach(p => {
  const id = getPrimaryId(p);
  const card = gallery.querySelector(`.card[data-id="${id}"]`);

  console.log("CARD FOUND:", id, card); // 👈 ADD HERE

  if (!card) return;

  if (!(p.photo_title || "").trim()) {
    card.classList.add("missing-title");
    hasError = true;
  } else {
    card.classList.remove("missing-title");
  }
});

  if (hasError) return;

  const originalText = "Send Selected Images";

  sendBtn.style.pointerEvents = "none";
  sendBtn.style.opacity = ".45";
  sendBtn.innerText = "Sending...";

  try {
    const ids = [...selected];
    if (!ids.length) throw new Error("No images selected");

    for (const id of ids) {
      await fetch(`/api/equipment-photos/photo-update`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-user-email": userEmail
        },
        body: JSON.stringify({
          photoId: id,
          queued_for_email: true
        })
      });
    }

    await fetch(`/api/equipment-photos/photo-email`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        projectId,
        modalityId,
        photoIds: ids
      })
    });

    selected.clear();
    document.querySelectorAll(".card-footer input[type=checkbox]")
      .forEach(cb => (cb.checked = false));

    sendBtn.innerText = "Sent";

    setTimeout(() => {
      sendBtn.innerText = originalText;
      sendBtn.style.pointerEvents = "auto";
      updateBatchState();
    }, 1200);

  } catch (e) {
    console.error("Send failed:", e);
    sendBtn.innerText = originalText;
    sendBtn.style.pointerEvents = "auto";
  }
};
/* DELETE */
deleteBtn.onclick = async () => {
  if (!selected.size) return;

  const originalText = "Delete Selected Images";

  deleteBtn.disabled = true;
  deleteBtn.innerText = "Deleting...";

  try {
    const ids = [...selected];
    const badgeList = getActiveBadges();

   for (const id of ids) {
  await fetch(`/api/equipment-photos/photo-delete`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-email": userEmail
    },
    body: JSON.stringify({
      photoId: id,
      projectId,
      modalityId
    })
  });

  // remove from DOM
  document.querySelector(`.card[data-id="${id}"]`)?.remove();

  // remove from memory
  photos = photos.filter(p => getPrimaryId(p) !== id);

  // remove from badges
  const idx = badgeList.indexOf(id);
  if (idx !== -1) badgeList.splice(idx, 1);
}
    saveBadgesLocally(badgeList);

    selected.clear();
    updateBatchState();

    // SUCCESS
    deleteBtn.innerText = "Deleted";

    setTimeout(() => {
      deleteBtn.innerText = originalText;
      updateBatchState();
    }, 1200);

  } catch (e) {
    console.error("Delete failed:", e);
    alert("Delete failed. Try again.");

    deleteBtn.innerText = originalText;
    deleteBtn.disabled = false;
  }
};

(async () => {
  try {
    const listUrl = new URL(`/api/equipment-photos/photo-list`, location.origin);
    if (modalityId) listUrl.searchParams.set("modalityId", modalityId);

    const [listRes, badgeRes] = await Promise.all([
      fetch(listUrl.toString(), {
        headers: { "x-user-email": userEmail }
      }),
      fetch(`/api/kv-get`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          key: `equipment:badges_images:${projectId}:${modalityId}:${userEmail}`
        })
      })
    ]);

    const out = await listRes.json().catch(() => []);
    const badgeJson = await badgeRes.json().catch(() => ({}));

    if (!listRes.ok) throw new Error(out?.error || "Failed");

    photos = Array.isArray(out) ? out : [];

    let serverBadges = [];

    if (badgeJson?.value) {
      try {
        const parsed = typeof badgeJson.value === "string"
          ? JSON.parse(badgeJson.value)
          : badgeJson.value;

        if (Array.isArray(parsed)) {
          serverBadges = parsed.map(String);
        }
      } catch {}
    }

    // keep local in sync (used for removal on interaction)
    saveBadgesLocally(serverBadges);

    const badgeSet = new Set(serverBadges);

    gallery.innerHTML = "";
    photos.forEach(p => appendCard(p, badgeSet));

    updateBatchState();

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
})();
</script>

</div>
</body>
