<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equipment Records | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
:root{
  --blue:#1F7BC8;
  --blue-dark:#1666aa;
  --bg:#f5f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#d9e2ec;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --safe-top:env(safe-area-inset-top, 0px);
  --danger:#c62828;
  --danger-soft:#fff1f2;
  --danger-soft-border:#fecdd3;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
  min-height:100vh;
}

.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--blue);
  color:#fff;
  height:calc(var(--safe-top) + 64px);
  padding-top:var(--safe-top);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
}

.topbar-title{
  font-size:20px;
  font-weight:800;
  letter-spacing:.2px;
  line-height:1;
}

.back-btn{
  position:absolute;
  left:12px;
  top:calc(var(--safe-top) + 32px);
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:34px;
  line-height:1;
  cursor:pointer;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  margin:0;
  z-index:1001;
  -webkit-appearance:none;
  appearance:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:20px 16px 110px;
}

.project-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:18px;
}

.project-name{
  font-size:22px;
  font-weight:800;
  margin:0 0 6px 0;
}

.project-meta{
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}

.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:18px 0 14px;
}

.section-title{
  margin:0;
  font-size:22px;
  font-weight:800;
}

.count-pill{
  background:#e8f2fc;
  color:var(--blue);
  border-radius:999px;
  padding:7px 12px;
  font-size:13px;
  font-weight:800;
  white-space:nowrap;
}

.actions{
  display:grid;
  gap:12px;
  margin-bottom:18px;
}

.primary-btn{
  width:100%;
  border:none;
  background:var(--blue);
  color:#fff;
  border-radius:16px;
  padding:16px 18px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(31,123,200,.22);
}

.primary-btn:hover{
  background:var(--blue-dark);
}

.empty{
  background:var(--card);
  border:1px dashed var(--border);
  border-radius:18px;
  padding:28px 18px;
  text-align:center;
  color:var(--muted);
  font-size:15px;
  line-height:1.55;
}

.list{
  display:grid;
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);

}

.card.card-has-updates{

}

.card-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.card-title{
  margin:0;
  font-size:18px;
  font-weight:800;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
}

.card-sub{
  margin-top:4px;
  color:var(--muted);
  font-size:14px;
}

.card-top-right{
  display:flex;

  gap:10px;
}

.badge{
  flex-shrink:0;
  background:#e8f2fc;
  color:var(--blue);
  border-radius:999px;
  padding:7px 10px;

  font-weight:800;
}

.icon-delete-btn{

  border:1px solid var(--danger-soft-border);

  background:var(--danger-soft);
  color:var(--danger);

  font-weight:800;
  cursor:pointer;

  align-items:center;
  justify-content:center;

}

.icon-delete-btn:hover{
  background:#ffe4e6;
}

.icon-delete-btn:active{
  transform:scale(.97);
}

.icon-delete-btn:disabled{

  cursor:not-allowed;
  transform:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));

}

.meta-box{
  border:1px solid #e9eef5;
  border-radius:14px;
  padding:10px 12px;

}

.meta-box.meta-box-new{

.meta-label{

  font-weight:700;

  align-items:center;
  gap:8px;

}

.meta-label.meta-label-new{

}

.meta-value{
  font-size:14px;
  font-weight:700;
  word-break:break-word;
}

.meta-value.meta-value-new{

}

.card-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;

.secondary-btn,

  border-radius:14px;
  padding:13px 14px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

.secondary-btn{
  background:var(--blue);
  color:#fff;
}

.outline-btn{
  background:#fff;
  color:var(--blue);
  border:2px solid var(--blue);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.45);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  z-index:500;
}

.modal.active{
  display:flex;
}

.sheet{
  width:100%;
  max-width:560px;
  background:#fff;
  border-radius:22px 22px 16px 16px;
  padding:18px;
  box-shadow:0 20px 50px rgba(0,0,0,.22);
}

.sheet-title{
  margin:0 0 12px 0;
  font-size:20px;
  font-weight:800;
}

.label{
  display:block;
  margin:12px 0 6px;
  font-size:14px;
  font-weight:800;
}

.select{
  width:100%;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 14px;
  font-size:16px;
  background:#fff;
}

.sheet-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:16px;

.cancel-btn,
.save-btn,

  border-radius:14px;
  padding:14px 16px;

  font-weight:800;

}

.cancel-btn{

  color:#0f172a;
}

.save-btn{
  background:var(--blue);
  color:#fff;
}

.danger-btn{
  background:var(--danger);
  color:#fff;
}

.loading,
.error{
  margin-top:16px;
  text-align:center;
  font-weight:700;
}

.error{ color:#c62828; }
.loading{ color:var(--muted); }

.new-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 12px;
  border-radius:999px;
  background:var(--blue);
  color:#fff;
  font-size:12px;
  font-weight:800;
  line-height:1.2;
  vertical-align:middle;
}

.updated-fields{
  margin-top:8px;
  font-size:13px;
  color:var(--blue);
  font-weight:700;
  line-height:1.45;
}

.updated-fields-label{
  font-weight:800;
}

.debug-panel{
  margin:12px 0 0;
  padding:10px 12px;
  border:1px dashed #cbd5e1;
  border-radius:12px;
  background:#f8fafc;
  color:#475569;
  font-size:12px;
  line-height:1.45;
  word-break:break-word;
}

.debug-panel strong{
  color:#0f172a;
}

@media (max-width:640px){
  .grid,
  .card-actions,
  .sheet-actions{
    grid-template-columns:1fr;
  }

</style>
</head>
<body>

<div class="topbar">

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;
const MODALITY_KEY = `${APP_PREFIX}activeModality`;

(() => {
  const auth = localStorage.getItem(AUTH_KEY);
  const email = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();

  if (auth !== "true" || !email) {
    location.replace("equipment-login.html");
    return;
  }
})();

const userEmail = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();
const params = new URLSearchParams(location.search);

const projectId =
  params.get("projectId") ||
  params.get("id") ||
  localStorage.getItem(PROJECT_ID_KEY) ||
  "";

if (!projectId) {
  alert("Project ID missing.");
  throw new Error("Missing projectId");
}

localStorage.setItem(PROJECT_ID_KEY, projectId);

const backBtn = document.getElementById("backBtn");
const addBtn = document.getElementById("addBtn");
const createBtn = document.getElementById("createBtn");
const cancelBtn = document.getElementById("cancelBtn");
const createModal = document.getElementById("createModal");
const modalitySelect = document.getElementById("modalitySelect");

const deleteModal = document.getElementById("deleteModal");
const deleteConfirmText = document.getElementById("deleteConfirmText");
const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

const projectNameEl = document.getElementById("projectName");
const projectMetaEl = document.getElementById("projectMeta");
const countPill = document.getElementById("countPill");
const loadingEl = document.getElementById("loading");
const errorEl = document.getElementById("error");
const emptyEl = document.getElementById("empty");
const listEl = document.getElementById("list");

let project = null;
let items = [];
let pendingDeleteRowId = "";
let deleteBusy = false;

const DETAILS_BADGE_STORAGE_KEY = `equipmentDetailsChanged:${projectId}`;
const DEBUG = false;

console.log("[INDEX PAGE] storage key", DETAILS_BADGE_STORAGE_KEY);
console.log("[INDEX PAGE] storage before load", {
  session: sessionStorage.getItem(DETAILS_BADGE_STORAGE_KEY),
  local: localStorage.getItem(DETAILS_BADGE_STORAGE_KEY)
});

function clean(v){
  return String(v || "").trim();
}

function esc(s){
  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function fmtDate(v){
  const d = new Date(v);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-US", {
    month:"short",
    day:"2-digit",
    year:"numeric"
  });
}

function normalizeKeys(list){
  return [...new Set(
    (list || [])
      .map(v => String(v || "").trim())
      .filter(Boolean)
  )];
}

function normalizeChangedMap(obj){
  const out = {};
  if (!obj || typeof obj !== "object" || Array.isArray(obj)) return out;

  Object.keys(obj).forEach(rowId => {
    const cleanRowId = String(rowId || "").trim();
    if (!cleanRowId) return;

    const row = obj[rowId];
    if (!row || typeof row !== "object" || Array.isArray(row)) return;

    const changedFields = normalizeKeys(row.changedFields);
    if (!changedFields.length) return;

    out[cleanRowId] = {
      changedFields,
      ts: Number(row.ts) || Date.now(),
      modality: String(row.modality || "").trim()
    };
  });

  return out;
}

function readDetailsChangedMap(){
  try {
    const raw =
      sessionStorage.getItem(DETAILS_BADGE_STORAGE_KEY) ||
      localStorage.getItem(DETAILS_BADGE_STORAGE_KEY);

    if (!raw) return {};
    return normalizeChangedMap(JSON.parse(raw));
  } catch {
    return {};
  }
}

function writeDetailsChangedMap(map){
  const normalized = normalizeChangedMap(map);
  const json = JSON.stringify(normalized);
  try { sessionStorage.setItem(DETAILS_BADGE_STORAGE_KEY, json); } catch {}
  try { localStorage.setItem(DETAILS_BADGE_STORAGE_KEY, json); } catch {}
}

async function readChangedEntryFromKV(rowId){
  const ADMIN_EMAIL = "info@espinmedical.com";

  const adminKey = `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}`;
  const fieldsKey = `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}:fields`;

  try {
    // 🔥 GET FIELDS (DRIVES BLUE)
    const f = await fetch("/api/kv-get", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key: fieldsKey })
    });

    const fj = await f.json().catch(() => ({}));

    let changedFields = [];

    if (fj && fj.value) {
      const parsed = typeof fj.value === "string"
        ? JSON.parse(fj.value)
        : fj.value;

      if (Array.isArray(parsed)) {
        changedFields = parsed;
      }
    }

    if (!changedFields.length) {
      return { entry: null };
    }

    // 🔥 GET METADATA
    const r = await fetch("/api/kv-get", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key: adminKey })
    });

    const j = await r.json().catch(() => ({}));

    const parsed = j?.value
      ? (typeof j.value === "string" ? JSON.parse(j.value) : j.value)
      : {};

    return {
      hit: true,
      parsed,
      entry: {
        changedFields,
        ts: Number(parsed.ts) || Date.now(),
        modality: String(parsed.modality || "").trim()
      }
    };

  } catch {
    return { hit: false, parsed: null, entry: null };
  }
}
async function clearChangedEntryInKV(rowId){
  try {
    const ADMIN_EMAIL = "info@espinmedical.com";

    const adminKey = `equipment:changed:${projectId}:${rowId}:${ADMIN_EMAIL}`;
    const oldKey = `equipment:changed:${projectId}:${rowId}`;

    // 🔥 CLEAR BOTH KEYS IN PARALLEL (FASTER + CONSISTENT)
    await Promise.all([
      fetch("/api/kv-set", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: adminKey, value: "" }),
        keepalive: true
      }),
      fetch("/api/kv-set", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: oldKey, value: "" }),
        keepalive: true
      })
    ]);

  } catch (e) {
    console.warn("clearChangedEntryInKV failed:", e);
  }
}

async function clearAllDetailsChangedMap(){
  try {
    const current = readDetailsChangedMap();

    // 🔥 CLEAR LOCAL STORAGE FIRST
    sessionStorage.removeItem(DETAILS_BADGE_STORAGE_KEY);
    localStorage.removeItem(DETAILS_BADGE_STORAGE_KEY);

    const ids = Object.keys(current);

    if (!ids.length) return;

    // 🔥 CLEAR ALL KV ENTRIES IN PARALLEL
    await Promise.all(ids.map(rowId => clearChangedEntryInKV(rowId)));

  } catch (e) {
    console.warn("details changed clear failed:", e);
  }
}

    ct_dom: "DOM",
    ct_installed: "Installed Date",

    ct_tube_dom: "Tube DOM",

    ct_sw_version: "Software Version",

    ct_upgrades: "Upgrades",
    ct_upgrades_desc: "Upgrades Notes",
    ct_injector: "Injector",
    ct_injector_model: "Injector Model",
    ct_chiller: "Chiller",

    mri_manufacturer: "Manufacturer",

    mri_serial: "Serial Number",
    mri_yom: "Year",
    mri_magnet_type: "Magnet Type",
    mri_bore_size_cm: "Bore Size",

    mri_gradient: "Gradient",
    mri_sw_version: "Software Version",

    mri_tim: "TIM",
    mri_coils: "Coils",
    mri_service: "Service",

    mri_last_pm: "Last PM",

    mri_out_of_use_date: "Out Of Use Date",

    xray_manufacturer: "Manufacturer",
    xray_model: "Model",
    xray_serial: "Serial Number",
    xray_dom: "DOM",

    xray_ceiling_mounted: "Ceiling Mounted",
    xray_is_rf: "RF",
    xray_in_use: "In Use",
    xray_out_of_use_date: "Out Of Use Date",

    carm_manufacturer: "Manufacturer",
    carm_model: "Model",
    carm_serial: "Serial Number",
    carm_dom: "DOM",
    carm_monitors: "Monitors",
    carm_image_intensifier: "Image Intensifier",
    carm_sw_version: "Software Version",
    carm_servicing: "Servicing",
    carm_service_name: "Service Name",

    mammo_manufacturer: "Manufacturer",
    mammo_model: "Model",
    mammo_serial: "Serial Number",

    other_manufacturer: "Manufacturer",
    other_model: "Model",
    other_serial: "Serial Number",

    additional_identifier: "Additional Identifier",
    notes: "Notes",
    modality: "Modality"
  };

  if (map[key]) return map[key];

  return String(key || "")
    .replace(/^ct_|^mri_|^xray_|^carm_|^pet_|^nm_|^us_|^mammo_|^other_/i, "")
    .replace(/_/g, " ")
    .replace(/\b\w/g, c => c.toUpperCase());
}

function summarizeFields(fields, max = 3){
  const cleanFields = normalizeKeys(fields).map(prettyFieldName);
  if (!cleanFields.length) return "";

  if (cleanFields.length <= max) return cleanFields.join(", ");
  return `${cleanFields.slice(0, max).join(", ")} +${cleanFields.length - max} more`;
}

function getFieldValue(row, fieldName) {
  if (!row || !fieldName) return "";
  return row[fieldName] ?? row.data?.[fieldName] ?? "";
}

function getDetailsUrl(modalityId){
  const qp = new URLSearchParams({
    projectId,
    modalityId,
    source:"index",

    clean(row.pet_manufacturer) ||
    clean(row.data?.pet_manufacturer) ||
    clean(row.nm_manufacturer) ||
    clean(row.data?.nm_manufacturer) ||
    clean(row.us_manufacturer) ||
    clean(row.data?.us_manufacturer) ||
    clean(row.mammo_manufacturer) ||
    clean(row.data?.mammo_manufacturer) ||
    clean(row.other_manufacturer) ||
    clean(row.data?.other_manufacturer);

  const model =
    clean(row.carm_model) ||
    clean(row.data?.carm_model) ||
    clean(row.mri_model) ||
    clean(row.data?.mri_model) ||
    clean(row.ct_model) ||
    clean(row.data?.ct_model) ||
    clean(row.xray_model) ||
    clean(row.data?.xray_model) ||
    clean(row.pet_model) ||
    clean(row.data?.pet_model) ||
    clean(row.nm_model) ||
    clean(row.data?.nm_model) ||
    clean(row.us_model) ||
    clean(row.data?.us_model) ||
    clean(row.mammo_model) ||
    clean(row.data?.mammo_model) ||
    clean(row.other_model) ||
    clean(row.data?.other_model);

  const labelMap = {
    MRI: "MRI",
    CT: "CT",
    XRAY: "X-ray",
    CARM: "C-arm",
    PETCT: "PET/CT",
    NM: "Nuclear Medicine",
    US: "Ultrasound",
    MAMMO: "Mammography",
    OTHER: "Equipment"
  };

  const niceModality = labelMap[modality] || modality || "Equipment";

  const makeModel = [make, model].filter(Boolean).join(" ");

  return makeModel
    ? `${niceModality} — ${makeModel}`
    : niceModality;
}

function getRowPreviewFields(row) {
  const modality = String(row?.modality || "").toUpperCase().trim();

  if (modality === "MRI") {
    return [
      { key: "mri_serial", label: "Serial Number" },
      { key: "additional_identifier", label: "Additional Identifier" }
    ];
  }

  if (modality === "XRAY") {
    return [
      { key: "xray_serial", label: "Serial Number" },
      { key: "additional_identifier", label: "Additional Identifier" }
    ];
  }

  if (modality === "CT") {
    return [
      { key: "ct_serial", label: "Serial Number" },
      { key: "additional_identifier", label: "Additional Identifier" }
    ];
  }

  if (modality === "CARM") {
    return [
      { key: "carm_serial", label: "Serial Number" },
      { key: "additional_identifier", label: "Additional Identifier" }
    ];
  }

  if (modality === "PETCT" || modality === "PET") {
    return [
      { key: "pet_serial", label: "Serial Number" },
      { key: "additional_identifier", label: "Additional Identifier" }
    ];
  }

  return [
    { key: "serial_number", label: "Serial Number" },
    { key: "additional_identifier", label: "Additional Identifier" }
  ];
}

function getStableRowId(row){
  return String(
    row?.modality_id ||
    row?.id ||
    row?.rowid ||
    row?.record_id ||
    ""
  ).trim();
}


function renderList(){
  listEl.innerHTML = "";
  countPill.textContent = `${items.length} record${items.length === 1 ? "" : "s"}`;

  loadingEl.style.display = "none";
  errorEl.style.display = "none";
  emptyEl.style.display = items.length ? "none" : "block";

  if (!items.length) return;

  const changedMap = readDetailsChangedMap();

  items.forEach(row => {
  const rowId = getStableRowId(row);

  console.log("🔍 ADMIN changedFields", {
    rowId,
    entry: changedMap[rowId]
  });

  if (!rowId) return;

  const entry = changedMap[rowId] || null;
  const changedFields = Array.isArray(entry?.changedFields) ? entry.changedFields : [];
 const normalizeKey = (k) =>
  String(k || "")
    .replace(/^ct_|^mri_|^xray_|^carm_|^pet_|^nm_|^us_|^mammo_|^other_/i, "")
    .replace(/_/g, "")
    .toLowerCase()
    .trim();

const changedSet = new Set(
  changedFields.map(normalizeKey)
);
  const hasUpdates = changedFields.length > 0;
  const changedSummary = summarizeFields(changedFields);

  console.log("🧩 PREVIEW KEYS", {
    rowId,
    previewKeys: getRowPreviewFields(row).map(f => f.key)
  });
    const previewFields = getRowPreviewFields(row).map(field => {
      const isChanged = changedSet.has(normalizeKey(field.key));
      const value = getFieldValue(row, field.key);
      return {
        label: field.label,
        value: clean(value) || "—",
        isChanged
      };
    });

    const title = getDisplayTitle(row);

    const card = document.createElement("div");
    card.className = `card${hasUpdates ? " card-has-updates" : ""}`;

    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-title">
            ${esc(title)}
            ${hasUpdates ? '<span class="new-pill">NEW</span>' : ''}
          </div>
          ${hasUpdates ? `<div class="updated-fields"><span class="updated-fields-label">Updated:</span> ${esc(changedSummary)}</div>` : ""}
        </div>
        <div class="card-top-right">
          <button class="icon-delete-btn" data-delete-record="${esc(rowId)}" type="button" aria-label="Delete record" title="Delete record">🗑</button>
          <div class="badge">${esc(row.modality || "—")}</div>
        </div>
      </div>

      <div class="grid">
        ${previewFields.map(field => `
          <div class="meta-box${field.isChanged ? " meta-box-new" : ""}">
            <div class="meta-label${field.isChanged ? " meta-label-new" : ""}">
              ${esc(field.label)}
              ${field.isChanged ? '<span class="new-pill">NEW</span>' : ''}
            </div>
            <div class="meta-value${field.isChanged ? " meta-value-new" : ""}">${esc(field.value)}</div>
          </div>
        `).join("")}
      </div>

      <div class="card-actions">
        <button class="secondary-btn" data-open-details="${esc(rowId)}" type="button">Open Details</button>
        <button class="outline-btn" data-open-images="${esc(rowId)}" type="button">Open Images</button>
      </div>
    `;

    card.querySelector("[data-open-details]").onclick = () => {
      openDetails(rowId, row.modality);
    };

    card.querySelector("[data-open-images]").onclick = () => {
      openImages(rowId, row.modality);
    };

    card.querySelector("[data-delete-record]").onclick = () => {
      openDeleteModal(rowId, title);
    };

    listEl.appendChild(card);
  });
}
async function loadProjectSalesRep(){
  try {
    const res = await fetch("/api/admin/equipment", {
      headers: { "x-user-email": userEmail }
    });

    const projects = await res.json().catch(()=>[]);

    if (!Array.isArray(projects)) return;

    const p = projects.find(x => String(x.id) === String(projectId));
    if (!p) return;

    // 🔥 overwrite project with full data
    project = {
      ...project,
      sales_rep_first: p.sales_rep_first || "",
      sales_rep_last: p.sales_rep_last || "",
      sales_rep_company: p.sales_rep_company || "",
      sales_rep_phone: p.sales_rep_phone || "",
      sales_rep_email: p.sales_rep_email || ""
    };

  } catch (e) {
    console.warn("sales rep load failed:", e);
  }
}
async function loadProjectAndItems(){
  loadingEl.style.display = "block";
  errorEl.style.display = "none";
  emptyEl.style.display = "none";
  listEl.innerHTML = "";

  try {
    const itemsRes = await fetch(`/api/equipment-details/list?projectId=${encodeURIComponent(projectId)}`, {
      headers:{ "x-user-email": userEmail }
    });

    const itemsOut = await itemsRes.json().catch(() => ({}));

    if (!itemsRes.ok) {
      throw new Error(itemsOut?.error || "Failed to load equipment records");
    }

    if (DEBUG) {
      console.log("[equipmentindex] itemsOut", itemsOut);
    }

    project = {
      project_name: itemsOut?.project?.project_name || "Submitted By:",
      site_address: itemsOut?.project?.site_address || "",
      zip_code: itemsOut?.project?.zip_code || ""
    };

    items = Array.isArray(itemsOut?.modalities)
      ? itemsOut.modalities
      : Array.isArray(itemsOut?.items)
      ? itemsOut.items
      : Array.isArray(itemsOut)
      ? itemsOut
      : [];

    items.sort((a, b) => {
      const aTime = new Date(a.updated_at || a.created_at || 0).getTime();
      const bTime = new Date(b.updated_at || b.created_at || 0).getTime();
      return bTime - aTime;
    });

    const existingMap = readDetailsChangedMap();
    const mergedMap = {};

    await Promise.all(items.map(async (row) => {
      const rowId = getStableRowId(row);
      if (!rowId) return;

      const localEntry = existingMap[rowId] || null;
if (false && localEntry && Array.isArray(localEntry.changedFields) && localEntry.changedFields.length) {
        mergedMap[rowId] = {
          changedFields: normalizeKeys(localEntry.changedFields),
          ts: Number(localEntry.ts) || Date.now(),
          modality: String(localEntry.modality || row?.modality || "").trim()
        };

        if (DEBUG) {
          console.log("[equipmentindex] local changed hit", {
            rowId,
            entry: mergedMap[rowId]
          });
        }

        return;
      }

      const kvResult = await readChangedEntryFromKV(rowId);

      if (DEBUG) {
        console.log("[equipmentindex] row debug", {
          row,
          rowId,
          kvResult
        });
      }

      const entry = kvResult?.entry || null;

      if (entry && Array.isArray(entry.changedFields) && entry.changedFields.length) {
        mergedMap[rowId] = entry;
      }
    }));

    writeDetailsChangedMap(mergedMap);

    if (DEBUG) {
      console.log("[equipmentindex] mergedMap", mergedMap);
    }

   await loadProjectSalesRep();
renderProject();
renderList();
  } catch (err) {
    console.error("equipmentindex load error:", err);
    loadingEl.style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = err.message || "Failed to load page";
  }
}

function continueToDetails(){
  const modality = clean(modalitySelect.value).toUpperCase();

  if (!modality) {
    alert("Select modality first.");
    return;
  }

  localStorage.removeItem(`${MODALITY_ID_KEY}_${projectId}`);
  localStorage.setItem(`${MODALITY_KEY}_${projectId}`, modality);

  closeCreateModal();
  location.href = getCreateDetailsUrl(modality);
}

async function deleteRecord(){
  if (deleteBusy) return;
  if (!pendingDeleteRowId) return;

  deleteBusy = true;
  confirmDeleteBtn.disabled = true;
  cancelDeleteBtn.disabled = true;
  confirmDeleteBtn.textContent = "Deleting...";

  try {
    const res = await fetch("/api/equipment-modalities/equipment-delete", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-email": userEmail
      },
      body: JSON.stringify({
        projectId,
        modalityId: pendingDeleteRowId
      })
    });

    const out = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(out?.error || out?.details || "Failed to delete record");
    }

    const removedId = pendingDeleteRowId;

    items = items.filter(row => {
      const rowId = getStableRowId(row);
      return rowId !== removedId;
    });

    const changedMap = readDetailsChangedMap();
    if (changedMap[removedId]) {
      delete changedMap[removedId];
      writeDetailsChangedMap(changedMap);
    }

    await clearChangedEntryInKV(removedId);

    if (localStorage.getItem(`${MODALITY_ID_KEY}_${projectId}`) === removedId) {
      localStorage.removeItem(`${MODALITY_ID_KEY}_${projectId}`);
      localStorage.removeItem(`${MODALITY_KEY}_${projectId}`);
    }

    closeDeleteModal();
    renderList();
  } catch (err) {
    console.error("delete record error:", err);
    alert(err.message || "Failed to delete record");
  } finally {
    deleteBusy = false;
    confirmDeleteBtn.disabled = false;
    cancelDeleteBtn.disabled = false;
    confirmDeleteBtn.textContent = "Delete Record";
  }
}

addBtn.addEventListener("click", openCreateModal);
cancelBtn.addEventListener("click", closeCreateModal);
createBtn.addEventListener("click", continueToDetails);

cancelDeleteBtn.addEventListener("click", closeDeleteModal);
confirmDeleteBtn.addEventListener("click", deleteRecord);

  if (e.target === createModal) closeCreateModal();
});

deleteModal.addEventListener("click", (e) => {
  if (e.target === deleteModal) closeDeleteModal();
});

loadProjectAndItems();
