<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equipment Records | Espin Medical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
:root{
  --blue:#1F7BC8;
  --blue-dark:#1666aa;
  --bg:#f5f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#d9e2ec;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --safe-top:env(safe-area-inset-top, 0px);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
  min-height:100vh;
}

/* ===============================
   TOP BAR FIX
=============================== */
.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--blue);
  color:#fff;
  height:calc(var(--safe-top) + 64px);
  padding-top:var(--safe-top);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
}

.topbar-title{
  font-size:20px;
  font-weight:800;
  letter-spacing:.2px;
  line-height:1;
}

.back-btn{
  position:absolute;
  left:12px;
  top:calc(var(--safe-top) + 32px);
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:34px;
  line-height:1;
  cursor:pointer;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  margin:0;
  z-index:1001;
  -webkit-appearance:none;
  appearance:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:20px 16px 110px;
}

.project-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:18px;
}

.project-name{
  font-size:22px;
  font-weight:800;
  margin:0 0 6px 0;
}

.project-meta{
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}

.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:18px 0 14px;
}

.section-title{
  margin:0;
  font-size:22px;
  font-weight:800;
}

.count-pill{
  background:#e8f2fc;
  color:var(--blue);
  border-radius:999px;
  padding:7px 12px;
  font-size:13px;
  font-weight:800;
  white-space:nowrap;
}

.actions{
  display:grid;
  gap:12px;
  margin-bottom:18px;
}

.primary-btn{
  width:100%;
  border:none;
  background:var(--blue);
  color:#fff;
  border-radius:16px;
  padding:16px 18px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(31,123,200,.22);
}

.primary-btn:hover{
  background:var(--blue-dark);
}

.empty{
  background:var(--card);
  border:1px dashed var(--border);
  border-radius:18px;
  padding:28px 18px;
  text-align:center;
  color:var(--muted);
  font-size:15px;
  line-height:1.55;
}

.list{
  display:grid;
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:16px;
}

.card-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.card-title{
  margin:0;
  font-size:18px;
  font-weight:800;
}

.card-sub{
  margin-top:4px;
  color:var(--muted);
  font-size:14px;
}

.badge{
  flex-shrink:0;
  background:#e8f2fc;
  color:var(--blue);
  border-radius:999px;
  padding:7px 10px;
  font-size:12px;
  font-weight:800;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-bottom:14px;
}

.meta-box{
  border:1px solid #e9eef5;
  border-radius:14px;
  padding:10px 12px;
  background:#fbfdff;
}

.meta-label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:4px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.3px;
}

.meta-value{
  font-size:14px;
  font-weight:700;
  word-break:break-word;
}

.card-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.secondary-btn,
.outline-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:13px 14px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

.secondary-btn{
  background:var(--blue);
  color:#fff;
}

.outline-btn{
  background:#fff;
  color:var(--blue);
  border:2px solid var(--blue);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.45);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  z-index:500;
}

.modal.active{
  display:flex;
}

.sheet{
  width:100%;
  max-width:560px;
  background:#fff;
  border-radius:22px 22px 16px 16px;
  padding:18px;
  box-shadow:0 20px 50px rgba(0,0,0,.22);
}

.sheet-title{
  margin:0 0 12px 0;
  font-size:20px;
  font-weight:800;
}

.label{
  display:block;
  margin:12px 0 6px;
  font-size:14px;
  font-weight:800;
}

.select{
  width:100%;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 14px;
  font-size:16px;
  background:#fff;
}

.sheet-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:16px;
}

.cancel-btn,
.save-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px 16px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

.cancel-btn{
  background:#eef2f7;
  color:#0f172a;
}

.save-btn{
  background:var(--blue);
  color:#fff;
}

.loading,
.error{
  margin-top:16px;
  text-align:center;
  font-weight:700;
}

.error{ color:#c62828; }
.loading{ color:var(--muted); }

@media (max-width:640px){
  .grid,
  .card-actions,
  .sheet-actions{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn" type="button" aria-label="Back">&#8592;</button>
  <div class="topbar-title">Equipment Records</div>
</div>

<div class="wrap">
  <div class="project-box">
    <h1 class="project-name" id="projectName">Loading...</h1>
    <div class="project-meta" id="projectMeta">Please wait</div>
  </div>

  <div class="section-head">
    <h2 class="section-title">Equipment List</h2>
    <div class="count-pill" id="countPill">0 records</div>
  </div>

  <div class="actions">
    <button class="primary-btn" id="addBtn" type="button">Add Equipment Record</button>
    <button class="outline-btn" id="newProjectBtn" type="button">Add New Project</button>
  </div>

  <div id="loading" class="loading">Loading records...</div>
  <div id="error" class="error" style="display:none;"></div>
  <div id="empty" class="empty" style="display:none;">
    No equipment records yet.<br>
    Create the first one and then open details and images for that specific record.
  </div>
  <div id="list" class="list"></div>
</div>

<div class="modal" id="createModal">
  <div class="sheet">
    <h3 class="sheet-title">Add Equipment Record</h3>

    <label class="label" for="modalitySelect">Modality</label>
    <select id="modalitySelect" class="select">
      <option value="">Select modality</option>
      <option value="MRI">MRI</option>
      <option value="CT">CT</option>
      <option value="XRAY">XRAY</option>
      <option value="CARM">CARM</option>
      <option value="PETCT">PETCT</option>
      <option value="NM">NM</option>
      <option value="US">US</option>
      <option value="MAMMO">MAMMO</option>
      <option value="OTHER">OTHER</option>
    </select>

    <div class="sheet-actions">
      <button class="cancel-btn" id="cancelBtn" type="button">Cancel</button>
      <button class="save-btn" id="createBtn" type="button">Continue</button>
    </div>
  </div>
</div>

<script>
const APP_PREFIX = "espinEquipment_";
const AUTH_KEY = `${APP_PREFIX}auth`;
const EMAIL_KEY = `${APP_PREFIX}userEmail`;
const PROJECT_ID_KEY = `${APP_PREFIX}activeProjectId`;
const MODALITY_ID_KEY = `${APP_PREFIX}activeModalityId`;
const MODALITY_KEY = `${APP_PREFIX}activeModality`;

(() => {
  const auth = localStorage.getItem(AUTH_KEY);
  const email = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();

  if (auth !== "true" || !email) {
    location.replace("equipment-login.html");
    return;
  }
})();

const userEmail = String(localStorage.getItem(EMAIL_KEY) || "").toLowerCase().trim();
const params = new URLSearchParams(location.search);

const projectId =
  params.get("projectId") ||
  params.get("id") ||
  localStorage.getItem(PROJECT_ID_KEY) ||
  "";

if (!projectId) {
  alert("Project ID missing.");
  throw new Error("Missing projectId");
}

localStorage.setItem(PROJECT_ID_KEY, projectId);

const backBtn = document.getElementById("backBtn");
const addBtn = document.getElementById("addBtn");
const newProjectBtn = document.getElementById("newProjectBtn");
const createBtn = document.getElementById("createBtn");
const cancelBtn = document.getElementById("cancelBtn");
const createModal = document.getElementById("createModal");
const modalitySelect = document.getElementById("modalitySelect");

const projectNameEl = document.getElementById("projectName");
const projectMetaEl = document.getElementById("projectMeta");
const countPill = document.getElementById("countPill");
const loadingEl = document.getElementById("loading");
const errorEl = document.getElementById("error");
const emptyEl = document.getElementById("empty");
const listEl = document.getElementById("list");

let project = null;
let items = [];

function clean(v){
  return String(v || "").trim();
}

function esc(s){
  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function fmtDate(v){
  const d = new Date(v);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-US", {
    month:"short",
    day:"2-digit",
    year:"numeric"
  });
}

function getDetailsUrl(modalityId){
  const qp = new URLSearchParams({
    projectId,
    modalityId,
    source:"index",
    mode:"edit"
  });
  return `equipment-details.html?${qp.toString()}`;
}

function getCreateDetailsUrl(modality){
  const qp = new URLSearchParams({
    projectId,
    modality,
    source:"index",
    mode:"create"
  });
  return `equipment-details.html?${qp.toString()}`;
}

function getImagesUrl(modalityId){
  const qp = new URLSearchParams({ projectId, modalityId });
  return `equipmentimages.html?${qp.toString()}`;
}

function goBack(){
  if (projectId) {
    location.href = `equipmentprojects.html?projectId=${encodeURIComponent(projectId)}`;
    return;
  }
  location.href = "equipmentprojects.html";
}

function openCreateModal(){
  modalitySelect.value = "";
  createModal.classList.add("active");
}

function closeCreateModal(){
  createModal.classList.remove("active");
}

function renderProject(){
  projectNameEl.textContent =
    project?.project_name ||
    project?.name ||
    "Equipment Records";

  projectMetaEl.innerHTML = `
    <div>${esc(project?.site_address || project?.address || "—")}</div>
    <div>ZIP: ${esc(project?.zip_code || project?.zip || "—")}</div>
  `;
}

function getRowSerial(row){
  return (
    clean(row.mri_serial) ||
    clean(row.xray_serial) ||
    clean(row.pet_serial) ||
    clean(row.carm_serial) ||
    clean(row.serial_number) ||
    clean(row.data?.ct_serial) ||
    clean(row.data?.mri_serial) ||
    clean(row.data?.xray_serial) ||
    clean(row.data?.pet_serial) ||
    clean(row.data?.carm_serial) ||
    clean(row.data?.serial_number) ||
    ""
  );
}

function getDisplayTitle(row){
  const modality = clean(row.modality || "Equipment");
  const serial = getRowSerial(row);

  const identifier =
    clean(row.additional_identifier) ||
    clean(row.data?.additional_identifier);

  if (serial) return `${modality} — Serial ${serial}`;
  if (identifier) return `${modality} — ID ${identifier}`;
  return modality;
}

function renderList(){
  listEl.innerHTML = "";
  countPill.textContent = `${items.length} record${items.length === 1 ? "" : "s"}`;

  loadingEl.style.display = "none";
  errorEl.style.display = "none";
  emptyEl.style.display = items.length ? "none" : "block";

  if (!items.length) return;

  items.forEach(row => {
    const rowId = String(row.id || row.modality_id || "").trim();
    if (!rowId) return;

    const card = document.createElement("div");
    card.className = "card";

    const serial = getRowSerial(row) || "—";
    const identifier =
      clean(row.additional_identifier) ||
      clean(row.data?.additional_identifier) ||
      "—";

    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-title">${esc(getDisplayTitle(row))}</div>
          <div class="card-sub">Created ${esc(fmtDate(row.created_at))}</div>
        </div>
        <div class="badge">${esc(row.modality || "—")}</div>
      </div>

      <div class="grid">
        <div class="meta-box">
          <div class="meta-label">Serial Number</div>
          <div class="meta-value">${esc(serial)}</div>
        </div>
        <div class="meta-box">
          <div class="meta-label">Additional Identifier</div>
          <div class="meta-value">${esc(identifier)}</div>
        </div>
      </div>

      <div class="card-actions">
        <button class="secondary-btn" data-open-details="${esc(rowId)}" type="button">Open Details</button>
        <button class="outline-btn" data-open-images="${esc(rowId)}" type="button">Open Images</button>
      </div>
    `;

    card.querySelector("[data-open-details]").onclick = () => {
      localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, rowId);
      localStorage.setItem(`${MODALITY_KEY}_${projectId}`, String(row.modality || "").toUpperCase().trim());
      location.href = getDetailsUrl(rowId);
    };

    card.querySelector("[data-open-images]").onclick = () => {
      localStorage.setItem(`${MODALITY_ID_KEY}_${projectId}`, rowId);
      localStorage.setItem(`${MODALITY_KEY}_${projectId}`, String(row.modality || "").toUpperCase().trim());
      location.href = getImagesUrl(rowId);
    };

    listEl.appendChild(card);
  });
}

async function loadProjectAndItems(){
  loadingEl.style.display = "block";
  errorEl.style.display = "none";
  emptyEl.style.display = "none";
  listEl.innerHTML = "";

  try {
    const itemsRes = await fetch(`/api/equipment-modalities?projectId=${encodeURIComponent(projectId)}`, {
      headers:{ "x-user-email": userEmail }
    });

    const itemsOut = await itemsRes.json().catch(() => ({}));

    if (!itemsRes.ok) {
      throw new Error(itemsOut?.error || "Failed to load equipment records");
    }

    project = {
      project_name: itemsOut?.project?.project_name || "Equipment Records",
      site_address: itemsOut?.project?.site_address || "",
      zip_code: itemsOut?.project?.zip_code || ""
    };

    items = Array.isArray(itemsOut?.modalities)
      ? itemsOut.modalities
      : Array.isArray(itemsOut?.items)
      ? itemsOut.items
      : Array.isArray(itemsOut)
      ? itemsOut
      : [];

    renderProject();
    renderList();
  } catch (err) {
    console.error("equipmentindex load error:", err);
    loadingEl.style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = err.message || "Failed to load page";
  }
}

function continueToDetails(){
  const modality = clean(modalitySelect.value).toUpperCase();

  if (!modality) {
    alert("Select modality first.");
    return;
  }

  localStorage.removeItem(`${MODALITY_ID_KEY}_${projectId}`);
  localStorage.setItem(`${MODALITY_KEY}_${projectId}`, modality);

  closeCreateModal();
  location.href = getCreateDetailsUrl(modality);
}

backBtn.addEventListener("click", goBack);
addBtn.addEventListener("click", openCreateModal);
cancelBtn.addEventListener("click", closeCreateModal);
createBtn.addEventListener("click", continueToDetails);

newProjectBtn.addEventListener("click", () => {
  localStorage.removeItem(PROJECT_ID_KEY);
  localStorage.removeItem(MODALITY_ID_KEY);
  localStorage.removeItem(MODALITY_KEY);
  localStorage.removeItem(`${MODALITY_ID_KEY}_${projectId}`);
  localStorage.removeItem(`${MODALITY_KEY}_${projectId}`);
  location.href = "equipmentprojects.html";
});

createModal.addEventListener("click", (e) => {
  if (e.target === createModal) closeCreateModal();
});

loadProjectAndItems();
</script>
</body>
</html>
