<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ESPIN Medical Employee Call Desk</title><style>
:root{--bg:#071425;--panel:#0d1d31;--line:#203853;--blue:#2e8cff;--text:#edf5ff;--muted:#8fa8c3;--green:#47d7a2;--amber:#ffbe5c}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 75% -15%,#173f69,transparent 35%),var(--bg);color:var(--text);font:14px Inter,system-ui,sans-serif}.top{height:74px;padding:0 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.brand{display:flex;gap:10px;align-items:center}.mark{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;background:linear-gradient(135deg,#60d6ff,var(--blue));color:#061526;font-weight:900}.brand strong{letter-spacing:.1em}.brand small{display:block;color:var(--muted);font-size:10px}.btn{border:1px solid var(--line);background:#10263f;color:white;padding:9px 13px;border-radius:9px;font-weight:700;cursor:pointer}.btn.primary{background:linear-gradient(135deg,#2d8eff,#1766cf)}.btn.good{background:#123b35;border-color:#286b5a;color:#9cf2d4}.layout{max-width:1400px;margin:auto;padding:22px}.page{display:flex;justify-content:space-between;align-items:end;margin-bottom:16px}.page h1{margin:0}.page p{color:var(--muted);margin:5px 0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.stat,.card{background:linear-gradient(145deg,#102844,#0a1c30);border:1px solid var(--line);border-radius:14px}.stat{padding:15px}.stat span{font-size:11px;color:var(--muted);font-weight:800}.stat b{font-size:25px;display:block;margin-top:5px}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.head{padding:16px 18px;border-bottom:1px solid var(--line)}.head h2{font-size:15px;margin:0}.queue{max-height:650px;overflow:auto}.row{display:grid;grid-template-columns:32px 1fr 130px 110px;gap:12px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);cursor:pointer}.row:hover,.row.active{background:#12304f}.num{width:28px;height:28px;border-radius:8px;background:#163552;color:#9dccff;display:grid;place-items:center;font-weight:800}.row strong,.row small{display:block}.row small{color:var(--muted);margin-top:4px}.phone{color:#9ecaff}.tag{padding:4px 7px;border-radius:6px;background:#183957;color:#9dccff;font-size:10px;font-weight:800}.work{padding:18px}.work h2{margin:0;font-size:19px}.sub{color:var(--muted);margin:5px 0 15px}.callbox{background:#091a2c;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}.callbox strong,.callbox small{display:block}.callbox small{color:var(--muted)}.form{display:grid;gap:11px}.field{display:grid;gap:5px;color:#9fb4c9;font-size:12px}.field input,.field select,.field textarea{width:100%;background:#091a2c;border:1px solid var(--line);border-radius:9px;padding:10px;color:white}.field textarea{min-height:92px;resize:vertical}select option{background:#0d1d31}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.note{color:var(--muted);font-size:11px;text-align:center;margin-top:12px}.toast{position:fixed;right:20px;bottom:20px;background:#eaf6ff;color:#08203a;padding:12px 16px;border-radius:10px;font-weight:800;opacity:0;transform:translateY(70px);transition:.25s}.toast.show{opacity:1;transform:none}@media(max-width:850px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.row{grid-template-columns:32px 1fr 100px}.phone{display:none}}@media(max-width:480px){.layout{padding:14px 10px}.top{padding:0 12px}.stats{grid-template-columns:1fr 1fr}.top .btn{display:none}.actions{grid-template-columns:1fr}}
</style></head><body><header class="top"><div class="brand"><div class="mark">E</div><div><strong>ESPIN MEDICAL</strong><small>EMPLOYEE CALL DESK</small></div></div><button class="btn" onclick="location.href='Outreach_Hub_1.html'">Manager Hub</button></header><main class="layout"><div class="page"><div><h1>Good morning, Maria</h1><p>Complete today’s calls and save every outcome.</p></div><button class="btn primary" id="next">Next Uncalled →</button></div><section class="stats"><div class="stat"><span>REMAINING</span><b id="remaining">7</b></div><div class="stat"><span>COMPLETED</span><b id="completed">0</b></div><div class="stat"><span>CONNECTED</span><b id="connected">0</b></div><div class="stat"><span>FOLLOW-UPS</span><b id="followups">0</b></div></section><div class="grid"><section class="card"><div class="head"><h2>Assigned Call Queue</h2></div><div class="queue" id="queue"></div></section><aside class="card work"><div id="selected"></div><form class="form" id="form"><label class="field">Call outcome<select id="outcome" required><option value="">Select outcome…</option><option>Connected</option><option>Voicemail</option><option>Follow-Up</option><option>Callback</option><option>Interested</option><option>Wrong Contact</option><option>Do Not Call</option><option>No Answer</option></select></label><label class="field">Contact name / title<input id="contact" placeholder="Who did you speak with?"></label><label class="field">Next follow-up<input id="follow" type="date"></label><label class="field">Call notes<textarea id="notes" placeholder="What happened on the call?"></textarea></label><div class="actions"><button class="btn good" type="submit">✓ Save Activity</button><button class="btn" type="button" id="call">☎ Start Call</button></div></form><div class="note">Saved activity appears instantly in the Manager Hub on this browser.</div></aside></div></main><div class="toast" id="toast"></div><script>
const fs=[{id:1,n:'Swedish First Hill Campus',t:'Hospital',c:'Seattle, WA',p:'(206) 386-6000'},{id:2,n:'RAYUS Radiology – Bellevue',t:'Imaging Center',c:'Bellevue, WA',p:'(425) 637-9729'},{id:3,n:'OHSU Hospital',t:'Hospital',c:'Portland, OR',p:'(503) 494-8311'},{id:4,n:'UC Davis Medical Center',t:'Hospital',c:'Sacramento, CA',p:'(916) 734-2011'},{id:5,n:"St. Luke’s Boise Medical Center",t:'Hospital',c:'Boise, ID',p:'(208) 381-2222'},{id:6,n:'Sutter Imaging Sacramento',t:'Imaging Center',c:'Sacramento, CA',p:'(916) 865-1462'},{id:7,n:'Providence Cancer Institute',t:'Cancer Center',c:'Portland, OR',p:'(503) 215-6014'}];let id=1;const $=s=>document.querySelector(s);function logs(){try{return JSON.parse(localStorage.getItem('espinOutreachActivities')||'[]')}catch{return[]}}function chosen(){return fs.find(x=>x.id===id)}function toast(t){const x=$('#toast');x.textContent=t;x.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>x.classList.remove('show'),2300)}function render(){const a=logs(),latest=new Map();a.forEach(x=>{if(!latest.has(x.facilityId))latest.set(x.facilityId,x)});const v=[...latest.values()];$('#remaining').textContent=fs.length-v.length;$('#completed').textContent=v.length;$('#connected').textContent=v.filter(x=>['Connected','Interested'].includes(x.outcome)).length;$('#followups').textContent=v.filter(x=>x.followUp).length;$('#queue').innerHTML=fs.map((f,i)=>{const x=latest.get(f.id);return `<div class="row ${id===f.id?'active':''}" data-id="${f.id}"><span class="num">${i+1}</span><div><strong>${f.n}</strong><small>${f.t} · ${f.c}</small></div><span class="phone">${f.p}</span><span class="tag">${x?.outcome||'Not Called'}</span></div>`}).join('');const f=chosen();$('#selected').innerHTML=`<h2>${f.n}</h2><p class="sub">${f.t} · ${f.c}</p><div class="callbox"><div><small>Main switchboard</small><strong>${f.p}</strong></div><span class="tag">Ask for Imaging</span></div>`}$('#queue').onclick=e=>{const r=e.target.closest('.row');if(r){id=Number(r.dataset.id);render()}};$('#call').onclick=()=>toast('Call started — demonstration only');$('#next').onclick=()=>{const done=new Set(logs().map(x=>x.facilityId)),n=fs.find(x=>!done.has(x.id));if(n){id=n.id;render()}else toast('Queue complete')};$('#form').onsubmit=e=>{e.preventDefault();const outcome=$('#outcome').value;if(!outcome)return;const f=chosen(),a=logs(),now=new Date();a.unshift({id:Date.now(),facilityId:f.id,facility:f.n,employee:'Maria Santos',outcome,contact:$('#contact').value.trim(),followUp:$('#follow').value,notes:$('#notes').value.trim(),timestamp:now.toISOString(),timeLabel:now.toLocaleString()});localStorage.setItem('espinOutreachActivities',JSON.stringify(a));e.target.reset();render();toast('Activity saved and synced')};render();
</script></body></html>
